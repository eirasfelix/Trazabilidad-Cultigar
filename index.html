<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TRAZABILIDAD CULTIGAR - PRO</title>
    <style>
        body { font-family: sans-serif; background: #444; margin: 0; padding: 0; }
        .cabecera { background: white; padding: 8px; position: sticky; top: 0; z-index: 500; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .busqueda-nube-container { display: flex; gap: 5px; align-items: center; max-width: 98%; margin: 0 auto 5px auto; }
        .buscador { flex-grow: 1; padding: 10px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; }
        .resumen-stock { background: #e3f2fd; padding: 5px; margin: 2px auto; width: 98%; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; font-size: 11px; max-height: 60px; overflow-y: auto; border: 1px solid #2196F3; }
        .stock-item { background: white; padding: 2px 6px; border-radius: 4px; border: 1px solid #2196F3; font-weight: bold; color: #0d47a1; }
        .btn-nube { padding: 10px 8px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; font-size: 11px; }
        .btn-subir { background: #4CAF50; }
        .btn-bajar { background: #2196F3; }
        .mapa-real { background: white; margin: 10px auto; padding: 10px; border: 1px solid #000; display: block; width: 490px; position: relative; }
        .mesa { fill: white; stroke: black; stroke-width: 1.2; cursor: pointer; }
        .ocupada { fill: #c8e6c9; stroke: #2e7d32; }
        .resaltado { fill: #FF8C00 !important; }
        .texto-mesa { font-size: 9px; font-weight: bold; pointer-events: none; text-anchor: middle; fill: #000; }
        #infoPanel { position: fixed; top: 2%; left: 2%; width: 92%; height: 92%; background: #1a1a1a; color: white; padding: 15px; border-radius: 15px; display: none; border: 4px solid #4CAF50; z-index: 10000; box-shadow: 0 0 50px rgba(0,0,0,0.9); overflow-y: auto; }
        .tabla-lotes { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; background: #222; }
        .tabla-lotes th { background: #333; color: #4CAF50; padding: 8px; text-align: left; border-bottom: 2px solid #4CAF50; }
        .tabla-lotes td { padding: 8px; border-bottom: 1px solid #444; }
        .formulario-lote { background: #333; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px solid #555; }
        .formulario-lote input { width: 95%; padding: 10px; margin: 4px 0; border-radius: 5px; border: none; font-size: 16px; display: block; }
        .label-form { font-size: 11px; color: #aaa; margin-top: 8px; display: block; font-weight: bold; }
        .btn { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-guardar { background: #4CAF50; color: white; }
        .btn-pegar { background: #9C27B0; color: white; border: 2px dashed white; }
        .btn-mini { padding: 8px; border-radius: 4px; border: none; color: white; font-weight: bold; margin-bottom: 4px; cursor: pointer; font-size: 11px; width: 100%; display: block; }
        .btn-receta { background: #555; color: #fff; padding: 8px; font-size: 11px; width: auto; margin-right: 5px; margin-top: 5px; cursor: pointer; border-radius: 4px; border: 1px solid #777; font-weight: bold; }
    </style>
</head>
<body>

        <rect id="m23-61" class="mesa" x="255" y="155" width="38" height="100" onclick="abrirMesa('23-61')" /><text x="274" y="245" class="texto-mesa">23-61</text>

        <rect id="m14-52" class="mesa" x="210" y="540" width="38" height="145" onclick="abrirMesa('14-52')" /><text x="229" y="675" class="texto-mesa">14-52</text>
        <rect id="m15-53" class="mesa" x="255" y="540" width="38" height="145" onclick="abrirMesa('15-53')" /><text x="274" y="675" class="texto-mesa">15-53</text>
        <rect id="m16-54" class="mesa" x="300" y="540" width="38" height="145" onclick="abrirMesa('16-54')" /><text x="319" y="675" class="texto-mesa">16-54</text>

    <div id="infoPanel">
        <h2 id="tituloMesa" style="margin:0; color:#4CAF50;">Mesa</h2>
        
        <table class="tabla-lotes">
            <thead>
                <tr><th>Datos</th><th>Caja/Receta</th><th>F.Trabajo</th><th>Acción</th></tr>
            </thead>
            <tbody id="listaLotes"></tbody>
        </table>

        <div class="formulario-lote">
            <button class="btn btn-pegar" id="btnPegar" onclick="pegarDatos()" style="display:none; margin-bottom:15px;">📋 PEGAR PLANTA AQUÍ</button>

            <h3 style="margin:0 0 10px 0; font-size:14px; color:#4CAF50;">+ REGISTRO RÁPIDO:</h3>
            
            <span class="label-form">REFERENCIA</span><input type="text" id="f_ref">
            <span class="label-form">LOTE</span><input type="text" id="f_lote">
            <span class="label-form">CANTIDAD BANDEJAS</span><input type="number" id="f_cant">
            
            <span class="label-form">SUSTRATO / RECETA</span>
            <div>
                <button type="button" class="btn-receta" onclick="document.getElementById('f_sustrato').value='F8P16FC, 2AG, 0,75 TRIANUM'">TRIANUM</button>
                <button type="button" class="btn-receta" onclick="document.getElementById('f_sustrato').value='GRAMOSEMI CON PERLITA'">GRAMOSEMI PERL</button>
                <button type="button" class="btn-receta" onclick="document.getElementById('f_sustrato').value='SIRO ÁCIDO'">SIRO ÁCIDO</button>
            </div>
            <input type="text" id="f_sustrato">
            
            <span class="label-form">Nº CAJA JIFFY</span><input type="text" id="f_caja">
            <span class="label-form">FECHA ENRAIZADO</span><input type="date" id="f_enraizado">
            <span class="label-form">FECHA TRABAJO</span><input type="date" id="f_vivero">
            
            <button class="btn btn-guardar" onclick="guardarLote()">+ REGISTRAR EN MAPA</button>
        </div>

        <button class="btn" style="background:#cc0000; color:white;" onclick="cerrarPanel()">CERRAR PANEL</button>
        
        <div id="config-panel" style="margin-top:20px; padding:10px; border:1px solid #4CAF50; background:#e8f5e9; border-radius:8px; color:black;">
            <p style="margin:0 0 5px 0; font-size:11px; font-weight:bold;">🔐 ACCESO ADMIN:</p>
            <input type="password" id="input-token" placeholder="Pega el Token ghp_...">
            <button onclick="guardarConfig()" style="width:100%; margin-top:5px; background:#2e7d32; color:white; padding:8px; border:none; border-radius:4px; font-weight:bold;">ACTIVAR MI LLAVE</button>
        </div>
    </div>
</div>

<script>
    const GIST_ID = "dc4b1ac9b41655086c76352f03ccfafe";
    let db = JSON.parse(localStorage.getItem('cultigar_pro_final')) || {};
    let mesaActual = null;
    let memoriaCopiada = null; 
    let ultimosDatos = { ref: "", lote: "", sustrato: "", f_enraizado: "" };

    // Función para formatear fecha a DD/MM/AAAA
    function formatearFechaVista(fechaStr) {
        if(!fechaStr) return "";
        const partes = fechaStr.split('-');
        if(partes.length !== 3) return fechaStr;
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    function abrirMesa(id) {
        mesaActual = id;
        document.getElementById('tituloMesa').innerText = "Mesa " + id;
        document.getElementById('btnPegar').style.display = memoriaCopiada ? 'block' : 'none';
        
        if(ultimosDatos.ref) {
            document.getElementById('f_ref').value = ultimosDatos.ref;
            document.getElementById('f_lote').value = ultimosDatos.lote;
            document.getElementById('f_sustrato').value = ultimosDatos.sustrato;
            document.getElementById('f_enraizado').value = ultimosDatos.f_enraizado;
        }
        document.getElementById('f_vivero').value = new Date().toISOString().split('T')[0];
        renderLotes();
        document.getElementById('infoPanel').style.display = 'block';
    }

    function renderLotes() {
        let html = "";
        (db[mesaActual] || []).forEach((l, index) => {
            html += `<tr>
                <td><b>${l.ref}</b><br><small>L-${l.lote}</small></td>
                <td>Caja: ${l.caja}<br><small>${l.sustrato}</small></td>
                <td>${formatearFechaVista(l.f_vivero)}</td>
                <td>
                    <button onclick="copiarParaMover(${index})" class="btn-mini" style="background:#FF9800;">📦 MOVER</button>
                    <button onclick="borrarLote(${index})" class="btn-mini" style="background:red;">X</button>
                </td></tr>`;
        });
        document.getElementById('listaLotes').innerHTML = html || "<tr><td colspan='4' style='text-align:center;'>Vacia</td></tr>";
    }

    function copiarParaMover(index) {
        memoriaCopiada = db[mesaActual][index];
        db[mesaActual].splice(index, 1);
        if(db[mesaActual].length === 0) delete db[mesaActual];
        localStorage.setItem('cultigar_pro_final', JSON.stringify(db));
        alert("✅ Planta recogida. Abre otra mesa y dale a PEGAR.");
        renderLotes();
        actualizarMapa();
    }

    function pegarDatos() {
        if(!memoriaCopiada) return;
        if(!db[mesaActual]) db[mesaActual] = [];
        db[mesaActual].push(memoriaCopiada);
        memoriaCopiada = null;
        localStorage.setItem('cultigar_pro_final', JSON.stringify(db));
        subirANube();
        renderLotes();
        actualizarMapa();
        document.getElementById('btnPegar').style.display = 'none';
    }

    function borrarLote(index) {
        if(confirm("¿Seguro que quieres borrar este lote?")) {
            db[mesaActual].splice(index, 1);
            if(db[mesaActual].length === 0) delete db[mesaActual];
            localStorage.setItem('cultigar_pro_final', JSON.stringify(db));
            subirANube();
            renderLotes();
            actualizarMapa();
        }
    }

    function guardarLote() {
        let nuevo = {
            ref: document.getElementById('f_ref').value.toUpperCase(),
            lote: document.getElementById('f_lote').value.toUpperCase(),
            caja: document.getElementById('f_caja').value.toUpperCase(),
            sustrato: document.getElementById('f_sustrato').value.toUpperCase(),
            cant: document.getElementById('f_cant').value,
            f_enraizado: document.getElementById('f_enraizado').value,
            f_vivero: document.getElementById('f_vivero').value
        };
        if(!nuevo.ref) return alert("Falta la Referencia");
        ultimosDatos = { ref: nuevo.ref, lote: nuevo.lote, sustrato: nuevo.sustrato, f_enraizado: nuevo.f_enraizado };
        if(!db[mesaActual]) db[mesaActual] = [];
        db[mesaActual].push(nuevo);
        localStorage.setItem('cultigar_pro_final', JSON.stringify(db));
        subirANube();
        renderLotes();
        actualizarMapa();
        document.getElementById('f_caja').value = "";
        document.getElementById('f_cant').value = "";
    }

    async function subirANube() {
        const token = localStorage.getItem('github_token');
        if(!token) return;
        try {
            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({ files: { "cultigar_db.json": { content: JSON.stringify(db) } } })
            });
        } catch (e) { console.error(e); }
    }

    async function cargarDeNube() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}?cb=${Date.now()}`);
            const json = await res.json();
            db = JSON.parse(json.files["cultigar_db.json"].content);
            localStorage.setItem('cultigar_pro_final', JSON.stringify(db));
            actualizarMapa();
        } catch (e) { console.log("Error cargando"); }
    }

    function actualizarMapa() {
        let totales = {}; let granTotal = 0;
        document.querySelectorAll('.mesa').forEach(m => {
            let id = m.id.substring(1);
            if(db[id]) { 
                m.classList.add('ocupada'); 
                db[id].forEach(l => {
                    totales[l.ref] = (totales[l.ref] || 0) + parseInt(l.cant || 0);
                    granTotal += parseInt(l.cant || 0);
                });
            } else m.classList.remove('ocupada');
        });
        let res = `<div class="stock-item" style="background:#4CAF50; color:white">TOTAL: ${granTotal}</div>`;
        for(let r in totales) res += `<div class="stock-item">${r}: ${totales[r]}</div>`;
        document.getElementById('resumenStock').innerHTML = res || "Vivero Vacío";
    }

    function buscar() {
        let t = document.getElementById('inputBusqueda').value.toUpperCase();
        document.querySelectorAll('.mesa').forEach(m => m.classList.remove('resaltado'));
        if(!t) return;
        for(let id in db) {
            if(db[id].some(l => l.ref.includes(t) || l.lote.includes(t))) {
                let el = document.getElementById('m'+id); if(el) el.classList.add('resaltado');
            }
        }
    }

    function guardarConfig() {
        const t = document.getElementById('input-token').value.trim();
        if(t) {
            localStorage.setItem('github_token', t);
            alert("Llave activada. Reiniciando...");
            location.reload();
        }
    }
    
    function cerrarPanel() { document.getElementById('infoPanel').style.display = 'none'; }
    cargarDeNube();
</script>
</body>
</html>
