<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CULTIGAR - CEREBRO LOGÍSTICO</title>
    <style>
        :root {
            --bg-dark: #1e272e;
            --verde-cultigar: #27ae60;
            --rojo-fito: #c0392b;
            --naranja-fito: #e67e22;
            --azul-log: #2980b9;
            --purpura: #8e44ad;
            --blanco: #ffffff;
            --neon-ready: #39FF14;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); margin: 0; color: white; }

        /* HEADER Y BUSCADOR */
        .header-sticky {
            position: sticky; top: 0; background: white; padding: 10px; z-index: 1000;
            display: flex; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .input-busqueda { flex-grow: 1; padding: 12px; border-radius: 8px; border: 2px solid #ddd; font-size: 16px; color: #333; }
        .btn-nube { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }

        /* PESTAÑAS */
        .tabs-principales { display: flex; background: #2c3e50; padding: 5px; gap: 5px; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: #34495e; color: white; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--verde-cultigar); }

        /* PANTALLA MCDONALDS */
        .contenedor-pedidos {
            display: flex; gap: 15px; overflow-x: auto; padding: 15px; background: #121212;
            margin: 10px; border-radius: 10px; min-height: 80px;
        }
        .tarjeta-pedido {
            min-width: 180px; background: #2c3e50; border-left: 8px solid var(--azul-log);
            padding: 10px; border-radius: 8px; flex-shrink: 0; position: relative;
        }
        .tarjeta-pedido.urgente { border-left-color: var(--rojo-fito); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(192,57,43,0.7); } 70% { box-shadow: 0 0 0 10px rgba(192,57,43,0); } 100% { box-shadow: 0 0 0 0px rgba(192,57,43,0); } }

        /* MAPAS (Mantenemos tus 500px) */
        .seccion-mapa { background: #eee; margin: 15px auto; padding: 10px; width: 500px; border-radius: 10px; border: 3px solid #000; color: #333; }
        svg { display: block; margin: auto; background: white; }
        .mesa, .carro { fill: white; stroke: #333; stroke-width: 1.5; cursor: pointer; transition: 0.2s; }
        .mesa:hover { stroke-width: 3; stroke: #000; }
        .ocupada { fill: #a9dfbf !important; }
        .rejuntado { fill: var(--azul-log) !important; }
        .resaltado { fill: #f39c12 !important; stroke: #d35400; stroke-width: 4; }
        .listo-salida { fill: var(--neon-ready) !important; }
        .texto-id { font-size: 10px; font-weight: bold; fill: black; pointer-events: none; text-anchor: middle; }

        /* MODALES */
        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 95%; max-width: 500px; height: 85%; background: #1a1a1a;
            border-radius: 15px; display: none; z-index: 2000; padding: 20px; overflow-y: auto;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1500; }

        /* TABLAS E INPUTS */
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 12px; }
        th { border-bottom: 2px solid var(--verde-cultigar); padding: 8px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #333; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 11px; color: #aaa; text-transform: uppercase; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-guardar { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; margin-top: 5px; }

        /* HISTORIAL */
        .log-entry { padding: 8px; border-bottom: 1px solid #444; font-size: 12px; line-height: 1.4; }
        .log-date { color: var(--verde-cultigar); font-weight: bold; margin-right: 10px; }
    </style>
</head>
<body>

<div class="header-sticky">
    <input type="text" id="buscador" class="input-busqueda" placeholder="🔍 Buscar Variedad o Lote..." onkeyup="ejecutarBusqueda()">
    <button class="btn-nube" style="background: #27ae60;" onclick="subirDatos()">⬆</button>
    <button class="btn-nube" style="background: #2980b9;" onclick="bajarDatos()">⬇</button>
</div>

<div class="tabs-principales">
    <button class="tab-btn active" onclick="cambiarPestaña('p-mapas', this)">🗺️ MAPAS</button>
    <button class="tab-btn" onclick="cambiarPestaña('p-historial', this)">📜 HISTORIAL JEFATURA</button>
</div>

<div id="p-mapas" class="pestaña-cont">
    <h3 style="margin: 15px 0 0 20px; color: var(--naranja-fito); font-size: 14px;">🍟 PRÓXIMOS PEDIDOS (AUTOMÁTICO)</h3>
    <div id="pantallaMcdonalds" class="contenedor-pedidos"></div>

    <div class="seccion-mapa">
        <h3 style="text-align:center; margin:0; color:var(--verde-cultigar);">MAPA 1: TRAZABILIDAD</h3>
        <svg width="480" height="780" id="svg-trazabilidad"></svg>
    </div>

    <div class="seccion-mapa">
        <h3 style="text-align:center; margin:0; color:var(--azul-log);">MAPA 2: LOGÍSTICA / SALIDAS</h3>
        <svg width="480" height="880" id="svg-fito"></svg>
    </div>
</div>

<div id="p-historial" class="pestaña-cont" style="display:none; padding: 20px;">
    <h2>📜 Historial de Movimientos y Rejuntes</h2>
    <div id="listaHistorial" style="background: #121212; border-radius: 10px; padding: 10px;">
        </div>
</div>

<div class="overlay" id="overlay" onclick="cerrarModales()"></div>

<div id="modalMesa" class="modal">
    <h2 id="mesaTitulo" style="color: var(--verde-cultigar);">Mesa --</h2>
    <table>
        <thead><tr><th>Variedad</th><th>Lote</th><th>Bnd</th><th>Acción</th></tr></thead>
        <tbody id="tablaCuerpoMesa"></tbody>
    </table>
    <div class="form-group"><label>Variedad</label><input type="text" id="f_ref"></div>
    <div class="form-group"><label>Lote</label><input type="text" id="f_lote"></div>
    <div class="form-group"><label>Bandejas</label><input type="number" id="f_num_bandejas"></div>
    <button class="btn-guardar" style="background: var(--verde-cultigar);" onclick="guardarTraza()">💾 GUARDAR</button>
    <button class="btn-guardar" style="background: #555;" onclick="cerrarModales()">CERRAR</button>
</div>

<div id="modalFito" class="modal">
    <h2 id="logTitulo" style="color: var(--azul-log);">Logística --</h2>
    <div id="zonaRejunte" style="margin-bottom: 15px;"></div>
    <table>
        <thead><tr><th>Cliente</th><th>Bnd</th><th>Var/Lote</th><th>Acción</th></tr></thead>
        <tbody id="logCuerpoMesa"></tbody>
    </table>
    <div class="form-group"><label>Cliente</label><input type="text" id="l_cli" placeholder="Ej: AMILCAR"></div>
    <div class="form-group"><label>Bandejas</label><input type="number" id="l_bnd"></div>
    <div class="form-group"><label>Info Variedad/Lote</label><input type="text" id="l_lot"></div>
    <div style="display:flex; gap:5px;">
        <div class="form-group" style="flex:2;"><label>Fecha Entrega</label><input type="date" id="l_fecha"></div>
        <div class="form-group" style="flex:1;"><label>Urgente</label>
            <select id="l_urgente"><option value="no">No</option><option value="si">SÍ</option></select>
        </div>
    </div>
    <button class="btn-guardar" style="background: var(--azul-log);" onclick="guardarLog()">💾 AÑADIR PEDIDO</button>
    <button class="btn-guardar" style="background: #555;" onclick="cerrarModales()">CERRAR</button>
</div>

<script>
    const GIST_ID = "dc4b1ac9b41655086c76352f03ccfafe";
    let DB_TRAZA = JSON.parse(localStorage.getItem('culti_traza')) || {};
    let DB_FITO = JSON.parse(localStorage.getItem('culti_fito')) || {};
    let DB_HISTORIAL = JSON.parse(localStorage.getItem('culti_hist')) || [];
    
    let mesaSeleccionada = "";
    let rejunteMemoria = null; // La "bolsa" donde guardamos lo cortado

    // --- GEOMETRÍA (Tu diseño original) ---
    const GEOMETRIA = [
        {id:'10-48', x:10, y:70, w:40, h:140}, {id:'11-49', x:55, y:70, w:40, h:140},
        {id:'12-50', x:105, y:70, w:40, h:140}, {id:'13-51', x:150, y:70, w:40, h:140},
        {id:'7-45', x:15, y:220, w:40, h:65}, {id:'8-46', x:65, y:220, w:45, h:90},
        {id:'9-47', x:135, y:220, w:38, h:90}, {id:'4-42', x:10, y:325, w:45, h:200},
        {id:'5-43', x:65, y:325, w:45, h:200}, {id:'6-44', x:125, y:325, w:45, h:200},
        {id:'1-39', x:10, y:540, w:45, h:210}, {id:'2-40', x:65, y:540, w:45, h:210},
        {id:'3-41', x:125, y:580, w:45, h:170},
        {id:'22-63', x:210, y:70, w:38, h:75}, {id:'23-64', x:255, y:70, w:38, h:75},
        {id:'24-65', x:300, y:70, w:38, h:75}, {id:'22-60', x:210, y:155, w:38, h:100},
        {id:'23-61', x:255, y:155, w:38, h:100}, {id:'24-62', x:300, y:155, w:38, h:100},
        {id:'18-56', x:215, y:360, w:35, h:110}, {id:'19-57', x:255, y:325, w:38, h:200},
        {id:'20-58', x:300, y:325, w:38, h:200}, {id:'21-59', x:345, y:325, w:38, h:200},
        {id:'14-52', x:210, y:540, w:38, h:145}, {id:'15-53', x:255, y:540, w:38, h:145},
        {id:'16-54', x:300, y:540, w:38, h:145}, {id:'17-55', x:345, y:540, w:38, h:145}
    ];

    function inicializarMapas() {
        let trazHtml = "", fitoHtml = "";
        GEOMETRIA.forEach(m => {
            trazHtml += `<rect id="t-${m.id}" class="mesa" x="${m.x}" y="${m.y}" width="${m.w}" height="${m.h}" onclick="abrirTraza('${m.id}')"></rect><text x="${m.x + m.w/2}" y="${m.y + m.h - 5}" class="texto-id">${m.id}</text>`;
            fitoHtml += `<rect id="f-${m.id}" class="mesa" x="${m.x}" y="${m.y}" width="${m.w}" height="${m.h}" onclick="abrirFito('${m.id}')"></rect><text x="${m.x + m.w/2}" y="${m.y + m.h - 5}" class="texto-id">${m.id}</text>`;
        });
        // Pasillos de la derecha (1-14)
        for(let i=1; i<=14; i++) {
            let yPos = 70 + (14-i) * 46;
            trazHtml += `<rect id="t-${i}" class="mesa" x="395" y="${yPos}" width="75" height="38" onclick="abrirTraza('${i}')"></rect><text x="432" y="${yPos + 22}" class="texto-id">${i}</text>`;
            fitoHtml += `<rect id="f-${i}" class="mesa" x="395" y="${yPos}" width="75" height="38" onclick="abrirFito('${i}')"></rect><text x="432" y="${yPos + 22}" class="texto-id">${i}</text>`;
        }
        // Carros C1-C4
        ['C1','C2','C3','C4'].forEach((cid, idx) => {
            fitoHtml += `<rect id="f-${cid}" class="carro" x="${210 + (idx*45)}" y="720" width="38" height="60" onclick="abrirFito('${cid}')"></rect><text x="${229 + (idx*45)}" y="755" class="texto-id">${cid}</text>`;
        });
        document.getElementById('svg-trazabilidad').innerHTML = trazHtml;
        document.getElementById('svg-fito').innerHTML = fitoHtml;
        actualizarUI();
    }

    function actualizarUI() {
        actualizarColores();
        mostrarMcDonalds();
        mostrarHistorial();
    }

    // --- LÓGICA DE REJUNTE INTELIGENTE ---
    function iniciarCortarRejunte(idx) {
        let mesa = DB_TRAZA[mesaSeleccionada];
        let items = Array.isArray(mesa) ? mesa : mesa.items;
        let item = items[idx];

        let cant = prompt(`¿Cuántas bandejas quieres REJUNTAR de ${item.ref}?`, item.num_bandejas);
        if (!cant || cant <= 0) return;

        if (parseInt(cant) > parseInt(item.num_bandejas)) { alert("No hay tantas bandejas"); return; }

        // Guardamos en la memoria
        rejunteMemoria = {
            ref: item.ref,
            lote: item.lote,
            bnd: cant,
            origen: mesaSeleccionada
        };

        // Descontamos del Mapa 1
        item.num_bandejas = parseInt(item.num_bandejas) - parseInt(cant);
        if (item.num_bandejas <= 0) items.splice(idx, 1);

        persistir();
        mostrarTablaTraza();
        alert("¡Bandejas en el portapapeles! Ve al MAPA 2 para pegarlas.");
    }

    function pegarRejunte() {
        if (!rejunteMemoria) return;
        
        if (!DB_FITO[mesaSeleccionada]) DB_FITO[mesaSeleccionada] = { pedidos: [] };
        
        let cli = prompt("¿Para qué cliente es este rejunte?", "AMILCAR");
        if(!cli) return;

        DB_FITO[mesaSeleccionada].pedidos.push({
            cli: cli.toUpperCase(),
            bnd: rejunteMemoria.bnd,
            lot: `${rejunteMemoria.ref} (Lote: ${rejunteMemoria.lote})`,
            fecha: "",
            urgente: "no"
        });

        // REGISTRAR EN HISTORIAL
        registrarHistorial(`Rejunte: Se movieron ${rejunteMemoria.bnd} bnd de ${rejunteMemoria.ref} (Lote ${rejunteMemoria.lote}) desde Mesa ${rejunteMemoria.origen} hacia ${mesaSeleccionada} para el cliente ${cli.toUpperCase()}.`);

        rejunteMemoria = null;
        persistir();
        mostrarLog();
        actualizarUI();
    }

    // --- FUNCIONES CORE ---
    function abrirTraza(id) {
        mesaSeleccionada = id;
        mostrarTablaTraza();
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modalMesa').style.display = 'block';
    }

    function mostrarTablaTraza() {
        let mesa = DB_TRAZA[mesaSeleccionada] || { items: [] };
        let datos = Array.isArray(mesa) ? mesa : (mesa.items || []);
        let html = "";
        datos.forEach((r, i) => {
            html += `<tr><td>${r.ref}</td><td>${r.lote}</td><td>${r.num_bandejas}</td>
                <td><button onclick="iniciarCortarRejunte(${i})">✂️ CORTAR</button></td></tr>`;
        });
        document.getElementById('mesaTitulo').innerText = "Mesa " + mesaSeleccionada;
        document.getElementById('tablaCuerpoMesa').innerHTML = html || "<tr><td colspan='4'>Vacía</td></tr>";
    }

    function guardarTraza() {
        if (!DB_TRAZA[mesaSeleccionada]) DB_TRAZA[mesaSeleccionada] = { items: [], rej: false };
        if (Array.isArray(DB_TRAZA[mesaSeleccionada])) DB_TRAZA[mesaSeleccionada] = { items: DB_TRAZA[mesaSeleccionada], rej: false };
        
        let nuevo = {
            ref: document.getElementById('f_ref').value.toUpperCase(),
            lote: document.getElementById('f_lote').value,
            num_bandejas: document.getElementById('f_num_bandejas').value
        };
        DB_TRAZA[mesaSeleccionada].items.push(nuevo);
        persistir(); mostrarTablaTraza(); actualizarUI();
    }

    function abrirFito(id) {
        mesaSeleccionada = id;
        document.getElementById('logTitulo').innerText = "Logística " + id;
        mostrarLog();
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modalFito').style.display = 'block';
    }

    function mostrarLog() {
        let data = DB_FITO[mesaSeleccionada] || { pedidos: [] };
        let html = "";
        (data.pedidos || []).forEach((p, i) => {
            html += `<tr><td>${p.cli}</td><td>${p.bnd}</td><td>${p.lot}</td>
                <td><button onclick="DB_FITO['${mesaSeleccionada}'].pedidos.splice(${i},1); persistir(); mostrarLog(); actualizarUI();">🗑️</button></td></tr>`;
        });
        document.getElementById('logCuerpoMesa').innerHTML = html || "<tr><td colspan='4'>Sin pedidos</td></tr>";
        
        // Botón especial si hay algo en el portapapeles
        document.getElementById('zonaRejunte').innerHTML = rejunteMemoria ? 
            `<button class="btn-guardar" style="background:var(--purpura);" onclick="pegarRejunte()">📋 PEGAR REJUNTE (${rejunteMemoria.bnd} bnd)</button>` : "";
    }

    function guardarLog() {
        if (!DB_FITO[mesaSeleccionada]) DB_FITO[mesaSeleccionada] = { pedidos: [] };
        DB_FITO[mesaSeleccionada].pedidos.push({
            cli: document.getElementById('l_cli').value.toUpperCase(),
            bnd: document.getElementById('l_bnd').value,
            lot: document.getElementById('l_lot').value,
            fecha: document.getElementById('l_fecha').value,
            urgente: document.getElementById('l_urgente').value
        });
        persistir(); mostrarLog(); actualizarUI();
    }

    function mostrarMcDonalds() {
        const pan = document.getElementById('pantallaMcdonalds');
        pan.innerHTML = "";
        let pedidos = [];
        for(let id in DB_FITO) {
            if(DB_FITO[id].pedidos) {
                DB_FITO[id].pedidos.forEach(p => { if(p.fecha || p.urgente==='si') pedidos.push({...p, mesa: id}); });
            }
        }
        if(pedidos.length === 0) { pan.innerHTML = "<p style='color:#555;'>No hay avisos próximos...</p>"; return; }
        
        pedidos.sort((a,b) => (a.urgente === 'si' ? -1 : 1)).forEach(p => {
            pan.innerHTML += `<div class="tarjeta-pedido ${p.urgente==='si'?'urgente':''}" onclick="abrirFito('${p.mesa}')">
                <div style="font-weight:bold; border-bottom:1px solid #555;">${p.cli} <span style="float:right">#${p.mesa}</span></div>
                <div style="font-size:12px;">📦 ${p.bnd} bnd | ${p.lot}</div>
                <div style="font-size:10px; color:#aaa; margin-top:5px;">📅 ${p.fecha || 'Sin fecha'}</div>
            </div>`;
        });
    }

    function registrarHistorial(msg) {
        let fecha = new Date().toLocaleString('es-ES');
        DB_HISTORIAL.unshift({ fecha, msg });
        if(DB_HISTORIAL.length > 50) DB_HISTORIAL.pop(); // Guardamos últimos 50
        localStorage.setItem('culti_hist', JSON.stringify(DB_HISTORIAL));
    }

    function mostrarHistorial() {
        const cont = document.getElementById('listaHistorial');
        cont.innerHTML = DB_HISTORIAL.map(h => `<div class="log-entry"><span class="log-date">[${h.fecha}]</span> ${h.msg}</div>`).join('');
    }

    function actualizarColores() {
        document.querySelectorAll('#svg-trazabilidad .mesa').forEach(r => {
            let id = r.id.replace('t-', '');
            let d = DB_TRAZA[id];
            r.classList.remove('ocupada');
            if(d && (Array.isArray(d)?d:d.items)?.length > 0) r.classList.add('ocupada');
        });
        document.querySelectorAll('#svg-fito .mesa, #svg-fito .carro').forEach(r => {
            let id = r.id.replace('f-', '');
            r.style.fill = (DB_FITO[id]?.pedidos?.length > 0) ? "var(--neon-ready)" : "white";
        });
    }

    function cambiarPestaña(id, btn) {
        document.querySelectorAll('.pestaña-cont').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        btn.classList.add('active');
    }

    function persistir() {
        localStorage.setItem('culti_traza', JSON.stringify(DB_TRAZA));
        localStorage.setItem('culti_fito', JSON.stringify(DB_FITO));
        subirDatos();
    }

    function cerrarModales() { 
        document.getElementById('overlay').style.display = 'none'; 
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); 
    }

    async function subirDatos() {
        const token = localStorage.getItem('github_token'); if(!token) return;
        try {
            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({ files: { 
                    "cultigar_db.json": { content: JSON.stringify(DB_TRAZA) }, 
                    "cultigar_fito.json": { content: JSON.stringify(DB_FITO) },
                    "cultigar_hist.json": { content: JSON.stringify(DB_HISTORIAL) }
                }})
            });
        } catch(e) {}
    }

    async function bajarDatos() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}?cb=${Date.now()}`);
            const data = await res.json();
            if(data.files["cultigar_db.json"]) DB_TRAZA = JSON.parse(data.files["cultigar_db.json"].content);
            if(data.files["cultigar_fito.json"]) DB_FITO = JSON.parse(data.files["cultigar_fito.json"].content);
            if(data.files["cultigar_hist.json"]) DB_HISTORIAL = JSON.parse(data.files["cultigar_hist.json"].content);
            actualizarUI();
        } catch(e) {}
    }

    function ejecutarBusqueda() {
        const bus = document.getElementById('buscador').value.toUpperCase();
        document.querySelectorAll('.mesa').forEach(m => m.classList.remove('resaltado'));
        if(!bus) return;
        for(let id in DB_TRAZA) {
            let items = Array.isArray(DB_TRAZA[id]) ? DB_TRAZA[id] : DB_TRAZA[id].items;
            if(items.some(i => i.ref.includes(bus) || i.lote.includes(bus))) {
                document.getElementById('t-' + id).classList.add('resaltado');
            }
        }
    }

    window.onload = () => { inicializarMapas(); bajarDatos(); };
</script>
</body>
</html>
