<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CULTIGAR SISTEMA INTEGRAL - VERSIÓN EXTENDIDA</title>
    <style>
        :root { 
            --bg-dark: #2c3e50; 
            --verde-cultigar: #27ae60; 
            --rojo-fito: #c0392b; 
            --azul-nube: #2980b9;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg-dark); 
            margin: 0; color: white; padding-bottom: 60px; 
        }

        /* Cabecera */
        .header-sticky { 
            position: sticky; top: 0; background: white; padding: 12px; 
            z-index: 1000; display: flex; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
        }

        .input-busqueda { 
            flex-grow: 1; padding: 12px; border-radius: 8px; border: 2px solid #ccc; font-size: 16px; color: #333; outline: none;
        }

        .btn-nube { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-nube:hover { opacity: 0.8; transform: scale(1.05); }

        /* Contenedores de Mapas */
        .seccion-mapa { 
            background: #ffffff; margin: 25px auto; padding: 20px; width: 480px; 
            border-radius: 15px; border: 3px solid #000; box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        .titulo-mapa { text-align: center; color: #2c3e50; margin-top: 0; margin-bottom: 15px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }

        svg { display: block; margin: auto; background: white; }

        /* Estilo de Mesas */
        .mesa { fill: #ffffff; stroke: #333; stroke-width: 1.8; cursor: pointer; transition: 0.2s; }
        .mesa:hover { stroke: #000; stroke-width: 3.5; fill: #f0f0f0; }
        .texto-id { font-size: 11px; font-weight: bold; fill: #000; pointer-events: none; text-anchor: middle; font-family: Arial; }

        /* Clases de Estado */
        .ocupada { fill: #a9dfbf !important; stroke: #1e8449 !important; }
        .resaltado { fill: #f39c12 !important; stroke: #d35400 !important; stroke-width: 5; }
        
        /* Semáforo Fitos */
        .fito-blanco { fill: #ffffff !important; }
        .fito-amarillo { fill: #f1c40f !important; }
        .fito-naranja { fill: #e67e22 !important; }
        .fito-rojo { fill: #e74c3c !important; }
        .fito-verde { fill: #2ecc71 !important; }

        /* Modales */
        .modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 95%; max-width: 480px; height: 85%; background: #1a1a1a; 
            border: 5px solid #333; border-radius: 20px; display: none; z-index: 2000; padding: 25px; overflow-y: auto; box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 1500; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: #bbb; margin-bottom: 4px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; font-size: 14px; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 13px; color: #eee; }
        th { border-bottom: 3px solid var(--verde-cultigar); padding: 10px; text-align: left; color: var(--verde-cultigar); text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #333; }

        .btn-accion { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; color: white; cursor: pointer; margin-top: 8px; font-size: 15px; }
        .btn-peque { padding: 10px; border-radius: 6px; border: none; cursor: pointer; color: white; font-weight: bold; flex: 1; font-size: 12px; }
    </style>
</head>
<body>

<div class="header-sticky">
    <input type="text" id="buscador" class="input-busqueda" placeholder="🔍 Buscar variedad..." onkeyup="ejecutarBusqueda()">
    <button class="btn-nube" style="background: var(--verde-cultigar);" onclick="subirDatos()">⬆ SUBIR</button>
    <button class="btn-nube" style="background: var(--azul-nube);" onclick="bajarDatos()">⬇ BAJAR</button>
</div>

<div class="seccion-mapa">
    <h3 class="titulo-mapa">📦 TRAZABILIDAD DE MESAS</h3>
    <svg width="460" height="780" id="svg-trazabilidad"></svg>
</div>

<div class="seccion-mapa">
    <h3 class="titulo-mapa" style="color: var(--rojo-fito);">🧪 TRATAMIENTOS FITOS</h3>
    <svg width="460" height="780" id="svg-fito"></svg>
</div>

<div class="overlay" id="overlay" onclick="cerrarModales()"></div>

<div id="modalMesa" class="modal">
    <h2 id="mesaTitulo" style="color: var(--verde-cultigar); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px;">Mesa --</h2>
    
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button class="btn-peque" style="background: #8e44ad;" onclick="copiarContenido('TRAZA')">📋 COPIAR MESA</button>
        <button class="btn-peque" style="background: #2980b9;" onclick="pegarContenido('TRAZA')">📥 PEGAR AQUÍ</button>
    </div>

    <table>
        <thead><tr><th>Ref/Variedad</th><th>Lote</th><th>Caja CE</th><th>Acción</th></tr></thead>
        <tbody id="tablaCuerpoMesa"></tbody>
    </table>

    <div style="background: #252525; padding: 18px; border-radius: 12px; border: 1px solid #444; box-shadow: inset 0 0 10px #000;">
        <div class="form-group"><label>Variedad / Referencia</label><input type="text" id="f_ref"></div>
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 2;"><label>Lote</label><input type="text" id="f_lote"></div>
            <div class="form-group" style="flex: 1;"><label>Bnd</label><input type="number" id="f_bandejas"></div>
            <div class="form-group" style="flex: 1;"><label>Pl/Bnd</label><input type="number" id="f_por_bandeja" value="40"></div>
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;"><label>Nº Caja C.E.</label><input type="text" id="f_caja_ce"></div>
            <div class="form-group" style="flex: 1;"><label>Fecha C.E.</label><input type="date" id="f_fecha_ce"></div>
        </div>
        <button class="btn-accion" id="btnGuardarTraza" style="background: var(--verde-cultigar);" onclick="guardarRegistroTrazabilidad()">💾 GUARDAR EN ESTA MESA</button>
    </div>
    <button class="btn-accion" style="background: #444; margin-top: 15px;" onclick="cerrarModales()">CERRAR</button>
</div>

<div id="modalFito" class="modal">
    <h2 id="fitoTitulo" style="color: var(--rojo-fito); margin-top: 0;">Tratamientos Mesa --</h2>
    
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button class="btn-peque" style="background: #8e44ad;" onclick="copiarContenido('FITO')">📋 COPIAR FITO</button>
        <button class="btn-peque" style="background: #2980b9;" onclick="pegarContenido('FITO')">📥 PEGAR FITO</button>
    </div>

    <table>
        <thead><tr><th>Producto</th><th>Estado</th><th>Fecha</th><th>Elim.</th></tr></thead>
        <tbody id="fitoCuerpoMesa"></tbody>
    </table>
    
    <div class="form-group"><label>Nombre del Producto</label><input type="text" id="fi_prod"></div>
    <div class="form-group"><label>Estado Semáforo</label>
        <select id="fi_estado">
            <option value="blanco">⚪ Blanco (Libre)</option>
            <option value="amarillo">🟡 Amarillo (Tratado)</option>
            <option value="naranja">🟠 Naranja (Plazo Seguridad)</option>
            <option value="rojo">🔴 Rojo (PROHIBIDO SALIDA)</option>
            <option value="verde">🟢 Verde (Apto Envío)</option>
        </select>
    </div>
    <div class="form-group"><label>Fecha Aplicación</label><input type="date" id="fi_fecha"></div>
    <button class="btn-accion" style="background: var(--rojo-fito);" onclick="guardarRegistroFito()">💾 REGISTRAR FITOSANITARIO</button>
    <button class="btn-accion" style="background: #444; margin-top: 15px;" onclick="cerrarModales()">CERRAR</button>
</div>

<script>
    // --- PARÁMETROS CRÍTICOS ---
    const GIST_ID = "dc4b1ac9b41655086c76352f03ccfafe";
    let DB_TRAZA = JSON.parse(localStorage.getItem('culti_traza')) || {};
    let DB_FITO = JSON.parse(localStorage.getItem('culti_fito')) || {};
    let mesaSeleccionada = "";
    let indexEdicion = null;
    let PORTAPAPELES_TRAZA = null;
    let PORTAPAPELES_FITO = null;

    // GEOMETRÍA COMPLETA SIN RECORTES
    const GEOMETRIA = [
        {id:'10-48', x:10, y:70, w:40, h:140}, {id:'11-49', x:55, y:70, w:40, h:140},
        {id:'12-50', x:105, y:70, w:40, h:140}, {id:'13-51', x:150, y:70, w:40, h:140},
        {id:'7-45', x:15, y:220, w:40, h:65}, {id:'8-46', x:65, y:220, w:45, h:90},
        {id:'9-47', x:135, y:220, w:38, h:90}, {id:'4-42', x:10, y:325, w:45, h:200},
        {id:'5-43', x:65, y:325, w:45, h:200}, {id:'6-44', x:125, y:325, w:45, h:200},
        {id:'1-39', x:10, y:540, w:45, h:210}, {id:'2-40', x:65, y:540, w:45, h:210},
        {id:'3-41', x:125, y:580, w:45, h:170},
        {id:'22-63', x:210, y:70, w:38, h:75}, {id:'23-64', x:255, y:70, w:38, h:75},
        {id:'24-65', x:300, y:70, w:38, h:75}, {id:'22-60', x:210, y:155, w:38, h:100},
        {id:'23-61', x:255, y:155, w:38, h:100}, {id:'24-62', x:300, y:155, w:38, h:100},
        {id:'18-56', x:215, y:360, w:35, h:110}, {id:'19-57', x:255, y:325, w:38, h:200},
        {id:'20-58', x:300, y:325, w:38, h:200}, {id:'21-59', x:345, y:325, w:38, h:200},
        {id:'14-52', x:210, y:540, w:38, h:145}, {id:'15-53', x:255, y:540, w:38, h:145},
        {id:'16-54', x:300, y:540, w:38, h:145}, {id:'17-55', x:345, y:540, w:38, h:145}
    ];

    function inicializarMapas() {
        let tHtml = "", fHtml = "";
        // Render Mesas Centrales
        GEOMETRIA.forEach(m => {
            tHtml += `<rect id="t-${m.id}" class="mesa" x="${m.x}" y="${m.y}" width="${m.w}" height="${m.h}" onclick="abrirTraza('${m.id}')"></rect><text x="${m.x + m.w/2}" y="${m.y + m.h - 5}" class="texto-id">${m.id}</text>`;
            fHtml += `<rect id="f-${m.id}" class="mesa" x="${m.x}" y="${m.y}" width="${m.w}" height="${m.h}" onclick="abrirFito('${m.id}')"></rect><text x="${m.x + m.w/2}" y="${m.y + m.h - 5}" class="texto-id">${m.id}</text>`;
        });
        // Render Mesas Pasillo Lateral (1 a 14)
        for(let i=1; i<=14; i++) {
            let yPos = 70 + (14-i) * 46;
            tHtml += `<rect id="t-${i}" class="mesa" x="380" y="${yPos}" width="70" height="38" onclick="abrirTraza('${i}')"></rect><text x="415" y="${yPos + 22}" class="texto-id">${i}</text>`;
            fHtml += `<rect id="f-${i}" class="mesa" x="380" y="${yPos}" width="70" height="38" onclick="abrirFito('${i}')"></rect><text x="415" y="${yPos + 22}" class="texto-id">${i}</text>`;
        }
        document.getElementById('svg-trazabilidad').innerHTML = tHtml;
        document.getElementById('svg-fito').innerHTML = fHtml;
        actualizarColoresMapas();
    }

    // --- LOGICA DE NUBE (SIN RECORTES) ---
    async function subirDatos() {
        const token = prompt("Token GitHub:");
        if(!token) return;
        try {
            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    files: { 
                        "cultigar_db.json": { content: JSON.stringify(DB_TRAZA) }, 
                        "cultigar_fito.json": { content: JSON.stringify(DB_FITO) } 
                    } 
                })
            });
            alert("✅ DATOS SUBIDOS A LA NUBE CON ÉXITO");
        } catch(e) { console.error(e); alert("❌ ERROR AL SUBIR"); }
    }

    async function bajarDatos() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}?cb=${Date.now()}`);
            const data = await res.json();
            DB_TRAZA = JSON.parse(data.files["cultigar_db.json"].content);
            DB_FITO = JSON.parse(data.files["cultigar_fito.json"].content);
            persistir(); 
            actualizarColoresMapas(); 
            alert("✅ DATOS ACTUALIZADOS DESDE LA NUBE");
        } catch(e) { console.error(e); alert("❌ ERROR AL DESCARGAR"); }
    }

    // --- COPIA Y PEGA ---
    function copiarContenido(tipo) {
        if(tipo === 'TRAZA') {
            PORTAPAPELES_TRAZA = JSON.parse(JSON.stringify(DB_TRAZA[mesaSeleccionada] || []));
            alert("Mesa " + mesaSeleccionada + " copiada.");
        } else {
            PORTAPAPELES_FITO = JSON.parse(JSON.stringify(DB_FITO[mesaSeleccionada] || []));
            alert("Fitos mesa " + mesaSeleccionada + " copiados.");
        }
    }

    function pegarContenido(tipo) {
        if(tipo === 'TRAZA' && PORTAPAPELES_TRAZA) {
            DB_TRAZA[mesaSeleccionada] = JSON.parse(JSON.stringify(PORTAPAPELES_TRAZA));
            mostrarTablaTraza();
        } else if(tipo === 'FITO' && PORTAPAPELES_FITO) {
            DB_FITO[mesaSeleccionada] = JSON.parse(JSON.stringify(PORTAPAPELES_FITO));
            mostrarTablaFito();
        }
        persistir(); 
        actualizarColoresMapas();
    }

    // --- TRAZABILIDAD (MÓDULO) ---
    function abrirTraza(id) {
        mesaSeleccionada = id;
        mostrarTablaTraza();
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modalMesa').style.display = 'block';
    }

    function mostrarTablaTraza() {
        let html = "", bT = 0, pT = 0;
        let registros = DB_TRAZA[mesaSeleccionada] || [];
        registros.forEach((r, i) => {
            bT += parseInt(r.bandejas || 0);
            pT += (parseInt(r.bandejas) * parseInt(r.porBandeja || 40));
            html += `<tr>
                <td><b>${r.ref}</b></td>
                <td>${r.lote}</td>
                <td>${r.caja_ce || '-'}</td>
                <td>
                    <button onclick="editT(${i})">✏️</button>
                    <button onclick="delT(${i})">🗑️</button>
                </td>
            </tr>`;
        });
        document.getElementById('mesaTitulo').innerHTML = `Mesa ${mesaSeleccionada} <span style="font-size:14px; float:right;">📦 ${bT} | 🌱 ${pT}</span>`;
        document.getElementById('tablaCuerpoMesa').innerHTML = html || "<tr><td colspan='4'>SIN DATOS</td></tr>";
    }

    function guardarRegistroTrazabilidad() {
        const reg = {
            ref: document.getElementById('f_ref').value.toUpperCase(),
            lote: document.getElementById('f_lote').value,
            bandejas: document.getElementById('f_bandejas').value,
            porBandeja: document.getElementById('f_por_bandeja').value,
            caja_ce: document.getElementById('f_caja_ce').value,
            fecha_ce: document.getElementById('f_fecha_ce').value
        };
        if(!DB_TRAZA[mesaSeleccionada]) DB_TRAZA[mesaSeleccionada] = [];
        if(indexEdicion !== null) {
            DB_TRAZA[mesaSeleccionada][indexEdicion] = reg;
            indexEdicion = null;
        } else {
            DB_TRAZA[mesaSeleccionada].push(reg);
        }
        persistir(); mostrarTablaTraza(); actualizarColoresMapas(); limpiarForm();
    }

    function editT(i) {
        indexEdicion = i;
        const r = DB_TRAZA[mesaSeleccionada][i];
        document.getElementById('f_ref').value = r.ref;
        document.getElementById('f_lote').value = r.lote;
        document.getElementById('f_bandejas').value = r.bandejas;
        document.getElementById('f_por_bandeja').value = r.porBandeja;
        document.getElementById('f_caja_ce').value = r.caja_ce || "";
        document.getElementById('f_fecha_ce').value = r.fecha_ce || "";
        document.getElementById('btnGuardarTraza').innerText = "💾 ACTUALIZAR DATOS";
    }

    function delT(i) { if(confirm("¿Eliminar lote seleccionado?")) { DB_TRAZA[mesaSeleccionada].splice(i, 1); persistir(); mostrarTablaTraza(); actualizarColoresMapas(); } }

    // --- FITOS (MÓDULO) ---
    function abrirFito(id) {
        mesaSeleccionada = id;
        document.getElementById('fitoTitulo').innerText = "Tratamientos Mesa " + id;
        document.getElementById('fi_fecha').value = new Date().toISOString().split('T')[0];
        mostrarTablaFito();
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modalFito').style.display = 'block';
    }

    function mostrarTablaFito() {
        let html = "";
        (DB_FITO[mesaSeleccionada] || []).forEach((r, i) => {
            html += `<tr><td>${r.p}</td><td>${r.e}</td><td>${r.f}</td><td><button onclick="delF(${i})">🗑️</button></td></tr>`;
        });
        document.getElementById('fitoCuerpoMesa').innerHTML = html;
    }

    function guardarRegistroFito() {
        if(!DB_FITO[mesaSeleccionada]) DB_FITO[mesaSeleccionada] = [];
        DB_FITO[mesaSeleccionada].push({
            p: document.getElementById('fi_prod').value.toUpperCase(),
            e: document.getElementById('fi_estado').value,
            f: document.getElementById('fi_fecha').value
        });
        persistir(); mostrarTablaFito(); actualizarColoresMapas();
    }

    function delF(i) { if(confirm("¿Borrar?")) { DB_FITO[mesaSeleccionada].splice(i,1); persistir(); mostrarTablaFito(); actualizarColoresMapas(); } }

    // --- SISTEMA ---
    function persistir() {
        localStorage.setItem('culti_traza', JSON.stringify(DB_TRAZA));
        localStorage.setItem('culti_fito', JSON.stringify(DB_FITO));
    }
    
    function actualizarColoresMapas() {
        // Mapa Traza
        document.querySelectorAll('#svg-trazabilidad .mesa').forEach(m => {
            const id = m.id.replace('t-', '');
            m.classList.toggle('ocupada', DB_TRAZA[id] && DB_TRAZA[id].length > 0);
        });
        // Mapa Fitos
        document.querySelectorAll('#svg-fito .mesa').forEach(m => {
            const id = m.id.replace('f-', '');
            m.setAttribute('class', 'mesa');
            if(DB_FITO[id] && DB_FITO[id].length > 0) {
                m.classList.add('fito-' + DB_FITO[id][DB_FITO[id].length-1].e);
            }
        });
    }

    function ejecutarBusqueda() {
        const query = document.getElementById('buscador').value.toUpperCase();
        document.querySelectorAll('.mesa').forEach(m => m.classList.remove('resaltado'));
        if(!query) return;
        for(let m in DB_TRAZA) {
            if(DB_TRAZA[m].some(r => r.ref.includes(query))) {
                const el = document.getElementById('t-' + m);
                if(el) el.classList.add('resaltado');
            }
        }
    }

    function limpiarForm() {
        ['f_ref','f_lote','f_bandejas','f_caja_ce','f_fecha_ce'].forEach(id => document.getElementById(id).value = "");
        document.getElementById('f_por_bandeja').value = 40;
        document.getElementById('btnGuardarTraza').innerText = "💾 GUARDAR EN ESTA MESA";
    }

    function cerrarModales() {
        document.getElementById('overlay').style.display = 'none';
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        indexEdicion = null; limpiarForm();
    }

    window.onload = inicializarMapas;
</script>
</body>
</html>
