<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA CULTIGAR PRO - CONTROL TOTAL</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #444; 
            margin: 0; 
            padding: 0; 
            padding-bottom: 100px; 
        }
        .cabecera { 
            background: white; 
            padding: 8px; 
            position: sticky; 
            top: 0; 
            z-index: 500; 
            text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.3); 
        }
        .busqueda-nube-container { 
            display: flex; 
            gap: 5px; 
            align-items: center; 
            max-width: 98%; 
            margin: 0 auto 5px auto; 
        }
        .buscador { 
            flex-grow: 1; 
            padding: 10px; 
            font-size: 16px; 
            border-radius: 8px; 
            border: 1px solid #ccc; 
        }
        .btn-nube { 
            padding: 10px 8px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            color: white; 
            font-size: 11px; 
        }
        .btn-subir { background: #4CAF50; }
        .btn-bajar { background: #2196F3; }
        
        .mapa-real { 
            background: white; 
            margin: 10px auto; 
            padding: 10px; 
            border: 1px solid #000; 
            display: block; 
            width: 490px; 
            position: relative; 
        }
        .mesa { 
            fill: white; 
            stroke: black; 
            stroke-width: 1.2; 
            cursor: pointer; 
        }
        .texto-mesa { 
            font-size: 9px; 
            font-weight: bold; 
            pointer-events: none; 
            text-anchor: middle; 
            fill: #000; 
        }
        
        /* Estados Mapa 1 */
        .ocupada { fill: #c8e6c9 !important; stroke: #2e7d32; }
        .resaltado { fill: #FF8C00 !important; }
        
        /* Estados Mapa 2 */
        .fito-blanco { fill: white !important; }
        .fito-amarillo { fill: #fff176 !important; }
        .fito-naranja { fill: #ffb74d !important; }
        .fito-rojo { fill: #ef5350 !important; }
        .fito-verde { fill: #81c784 !important; }

        .panel-flotante { 
            position: fixed; 
            top: 2%; 
            left: 2%; 
            width: 92%; 
            height: 92%; 
            background: #1a1a1a; 
            color: white; 
            padding: 15px; 
            border-radius: 15px; 
            display: none; 
            z-index: 10000; 
            overflow-y: auto; 
            box-shadow: 0 0 50px rgba(0,0,0,0.9); 
        }
        .tabla-lotes { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
            font-size: 12px; 
            background: #222; 
        }
        .tabla-lotes th { 
            background: #333; 
            color: #4CAF50; 
            padding: 8px; 
            text-align: left; 
            border-bottom: 2px solid #4CAF50; 
        }
        .tabla-lotes td { 
            padding: 8px; 
            border-bottom: 1px solid #444; 
        }
        
        .formulario-lote { 
            background: #333; 
            padding: 15px; 
            border-radius: 10px; 
            margin-top: 15px; 
            border: 1px solid #555; 
        }
        .formulario-lote input, .formulario-lote select { 
            width: 95%; 
            padding: 10px; 
            margin: 4px 0; 
            border-radius: 5px; 
            border: none; 
            font-size: 16px; 
            display: block; 
        }
        .label-form { 
            font-size: 11px; 
            color: #aaa; 
            margin-top: 8px; 
            display: block; 
            font-weight: bold; 
        }
        .btn { 
            padding: 15px; 
            border-radius: 8px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
            margin-top: 10px; 
        }
        .btn-receta { 
            background: #555; 
            color: #fff; 
            padding: 6px; 
            font-size: 10px; 
            cursor: pointer; 
            border-radius: 4px; 
            border: 1px solid #777; 
            margin: 2px; 
        }
    </style>
</head>

    </div>
    <div class="formulario-lote">
        <button class="btn" id="btnPegar" onclick="pegarDatos()" style="display:none; background:#9C27B0; color:white;">📋 PEGAR PLANTA AQUÍ</button>
        <h3 style="color:#4CAF50; font-size:14px;">+ NUEVO REGISTRO:</h3>
        <span class="label-form">VARIEDAD/REF</span>
        <input type="text" id="f_ref">
        <span class="label-form">LOTE</span>
        <input type="text" id="f_lote">
        <span class="label-form">CANTIDAD</span>
        <input type="number" id="f_cant">
        <span class="label-form">RECETAS RÁPIDAS:</span>
        <div style="margin-bottom:10px;">
            <button class="btn-receta" onclick="ponerReceta('F8P16 TRIANUM')">TRIANUM</button>
            <button class="btn-receta" onclick="ponerReceta('TURBA/PERLITA')">TURBA</button>
            <button class="btn-receta" onclick="ponerReceta('COCO PURA')">COCO</button>
            <button class="btn-receta" onclick="ponerReceta('JIFFY CAJA')">JIFFY</button>
        </div>
        <input type="text" id="f_sustrato" placeholder="Sustrato...">
        <span class="label-form">FECHA ENRAIZADO</span>
        <input type="date" id="f_vivero">
        <button class="btn" style="background:#4CAF50; color:white;" onclick="guardarLote()">💾 GUARDAR EN MAPA 1</button>
    </div>
    <button class="btn" style="background:#555; color:white;" onclick="cerrarPanel()">CERRAR</button>
</div>

<div id="panelFito" class="panel-flotante" style="border: 4px solid #c62828;">
    <h2 id="fitoMesaNom" style="color:#ef5350; margin:0;">Historial Fito</h2>
    <table class="tabla-lotes">
        <thead>
            <tr style="color:#ef5350;">
                <th>Producto</th>
                <th>Estado</th>
                <th>Fecha</th>
                <th>X</th>
            </tr>
        </thead>
        <tbody id="fitoTablaBody"></tbody>
    </table>
    <div class="formulario-lote">
        <span class="label-form">PRODUCTO APLICADO</span>
        <input type="text" id="f_prod">
        <span class="label-form">ESTADO/PLAZO</span>
        <select id="f_estado">
            <option value="blanco">⚪ Blanco (Limpio/Sin tratar)</option>
            <option value="amarillo">🟡 Amarillo (Tratado - Reciente)</option>
            <option value="naranja">🟠 Naranja (Plazo de Seguridad)</option>
            <option value="rojo">🔴 Rojo (¡PROHIBIDO PASO!)</option>
            <option value="verde">🟢 Verde (Apto para envío)</option>
        </select>
        <span class="label-form">FECHA</span>
        <input type="date" id="f_fecha">
        <button class="btn" style="background:#c62828; color:white;" onclick="guardarFito()">💾 REGISTRAR EN MAPA 2</button>
    </div>
    <button class="btn" style="background:#555; color:white;" onclick="document.getElementById('panelFito').style.display='none'">CERRAR</button>
</div>

<script>
    const GIST_ID = "dc4b1ac9b41655086c76352f03ccfafe";
    let db = JSON.parse(localStorage.getItem('cultigar_pro_final')) || {};
    let dbFito = JSON.parse(localStorage.getItem('db_fito_vPRO')) || {};
    let mesaActual = null;
    let fitoActual = null;
    let memoria = null;

    function ponerReceta(t){ 
        document.getElementById('f_sustrato').value = t; 
    }

    // --- MAPA 1 ---
    function abrirMesa(id) {
        mesaActual = id;
        document.getElementById('tituloMesa').innerText = "Mesa " + id;
        document.getElementById('btnPegar').style.display = memoria ? 'block' : 'none';
        document.getElementById('f_vivero').value = new Date().toISOString().split('T')[0];
        renderLotes();
        document.getElementById('infoPanel').style.display = 'block';
    }

    function renderLotes() {
        let h = "";
        (db[mesaActual] || []).forEach((l, i) => {
            h += `<tr><td>${l.ref}<br><small>L-${l.lote}</small></td><td>${l.sustrato}</td><td>${l.f_vivero}</td>
            <td><button onclick="copiar(${i})">📦</button><button onclick="borrar(${i})">🗑️</button></td></tr>`;
        });
        document.getElementById('listaLotes').innerHTML = h || "<tr><td colspan='4'>Mesa vacía</td></tr>";
    }

    function guardarLote() {
        let n = { 
            ref: document.getElementById('f_ref').value.toUpperCase(), 
            lote: document.getElementById('f_lote').value, 
            sustrato: document.getElementById('f_sustrato').value, 
            f_vivero: document.getElementById('f_vivero').value,
            cant: document.getElementById('f_cant').value
        };
        if(!db[mesaActual]) db[mesaActual] = [];
        db[mesaActual].push(n);
        localStorage.setItem('cultigar_pro_final', JSON.stringify(db));
        subirTodo(); 
        renderLotes(); 
        actualizarGraficos();
    }

    function copiar(i){ 
        memoria = db[mesaActual][i]; 
        db[mesaActual].splice(i,1); 
        renderLotes(); 
        actualizarGraficos(); 
    }

    function pegarDatos(){ 
        if(!db[mesaActual]) db[mesaActual] = []; 
        db[mesaActual].push(memoria); 
        memoria = null; 
        renderLotes(); 
        actualizarGraficos(); 
    }

    function borrar(i){ 
        if(confirm("¿Borrar registro?")){ 
            db[mesaActual].splice(i,1); 
            renderLotes(); 
            actualizarGraficos(); 
        } 
    }

    // --- MAPA 2 ---
    function abrirFito(id) {
        fitoActual = id;
        document.getElementById('fitoMesaNom').innerText = "Fito Mesa " + id;
        document.getElementById('f_fecha').value = new Date().toISOString().split('T')[0];
        renderFitoHistorial();
        document.getElementById('panelFito').style.display = 'block';
    }

    function renderFitoHistorial() {
        let h = "";
        (dbFito[fitoActual] || []).forEach((r, i) => {
            h += `<tr><td>${r.p}</td><td>${r.e.toUpperCase()}</td><td>${r.f}</td><td><button onclick="borrarFito(${i})">🗑️</button></td></tr>`;
        });
        document.getElementById('fitoTablaBody').innerHTML = h;
    }

    function guardarFito() {
        if(!dbFito[fitoActual]) dbFito[fitoActual] = [];
        dbFito[fitoActual].push({ 
            p: document.getElementById('f_prod').value.toUpperCase(), 
            e: document.getElementById('f_estado').value, 
            f: document.getElementById('f_fecha').value 
        });
        localStorage.setItem('db_fito_vPRO', JSON.stringify(dbFito));
        subirTodo(); 
        renderFitoHistorial(); 
        actualizarGraficos();
    }

    function borrarFito(i){ 
        dbFito[fitoActual].splice(i,1); 
        renderFitoHistorial(); 
        actualizarGraficos(); 
    }

    // --- NUBE Y REFRESH ---
    async function subirTodo() {
        const t = localStorage.getItem('github_token');
        if(!t) return;
        try {
            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${t}` },
                body: JSON.stringify({ files: { 
                    "cultigar_db.json": { content: JSON.stringify(db) },
                    "cultigar_fito.json": { content: JSON.stringify(dbFito) }
                }})
            });
        } catch(e) { console.error("Error nube"); }
    }

    async function cargarTodo() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}?cb=${Date.now()}`);
            const j = await res.json();
            db = JSON.parse(j.files["cultigar_db.json"].content);
            dbFito = JSON.parse(j.files["cultigar_fito.json"].content);
            localStorage.setItem('cultigar_pro_final', JSON.stringify(db));
            localStorage.setItem('db_fito_vPRO', JSON.stringify(dbFito));
            actualizarGraficos();
        } catch(e) { console.error("Error carga"); }
    }

    function actualizarGraficos() {
        document.querySelectorAll('rect').forEach(r => {
            if(r.id.startsWith('m')) {
                let id = r.id.substring(1);
                (db[id] && db[id].length > 0) ? r.classList.add('ocupada') : r.classList.remove('ocupada');
            }
            if(r.id.startsWith('ft-')) {
                let id = r.id.replace('ft-', '');
                r.setAttribute('class', 'mesa fito-blanco');
                if(dbFito[id] && dbFito[id].length > 0) {
                    r.setAttribute('class', 'mesa fito-' + dbFito[id][dbFito[id].length-1].e);
                }
            }
        });
    }

    function buscar() {
        let t = document.getElementById('inputBusqueda').value.toUpperCase();
        document.querySelectorAll('.mesa').forEach(m => m.classList.remove('resaltado'));
        if(!t) return;
        for(let id in db) {
            if(db[id].some(l => l.ref.includes(t))) {
                let el = document.getElementById('m'+id); 
                if(el) el.classList.add('resaltado');
            }
        }
    }

    function cerrarPanel(){ 
        document.getElementById('infoPanel').style.display='none'; 
    }

    window.onload = cargarTodo;
</script>
</body>
</html>
