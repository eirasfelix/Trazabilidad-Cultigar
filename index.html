<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CULTIGAR PRO - Logística y Fitos</title>
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --card-bg: #2d2d2d;
            --verde-ok: #27ae60;
            --alerta-naranja: #f39c12;
            --peligro-rojo: #e74c3c;
            --azul-pedido: #3498db;
            --texto: #ecf0f1;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-dark); 
            color: var(--texto); 
            margin: 0; 
            padding-bottom: 50px;
            touch-action: manipulation;
        }

        /* Cabecera Táctil */
        .header {
            background: #fff;
            padding: 15px;
            display: flex;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .btn-accion {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            font-size: 14px;
        }

        /* Mapas */
        .contenedor-mapa {
            background: #444;
            margin: 15px auto;
            padding: 10px;
            width: 95%;
            max-width: 500px;
            border-radius: 15px;
            border: 2px solid #666;
            overflow: hidden;
        }

        svg { display: block; margin: auto; background: #fff; border-radius: 5px; }

        /* Estilos de Mesas */
        .mesa { cursor: pointer; stroke-width: 2; transition: all 0.3s; }
        
        /* Animación Alerta 7 días */
        @keyframes parpadeo {
            0% { fill: #fff; }
            50% { fill: var(--alerta-naranja); }
            100% { fill: #fff; }
        }
        .alerta-proximo { animation: parpadeo 1.5s infinite; }
        
        .mesa-rejuntada { fill: var(--verde-ok) !important; }
        .mesa-con-pedido { fill: var(--azul-pedido) !important; }
        
        /* Bordes Fito */
        .borde-fito-rojo { stroke: var(--peligro-rojo) !important; stroke-width: 6 !important; }
        .borde-fito-verde { stroke: var(--verde-ok) !important; stroke-width: 6 !important; }

        .texto-id { font-size: 9px; font-weight: bold; fill: #000; pointer-events: none; text-anchor: middle; }
        .texto-plantas { font-size: 8px; fill: #d35400; pointer-events: none; text-anchor: middle; font-weight: bold; }

        /* Modales Táctiles Grandes */
        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 95%; height: 90%;
            background: var(--card-bg);
            border-radius: 20px;
            display: none;
            z-index: 2000;
            padding: 20px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            z-index: 1500;
        }

        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab { 
            flex: 1; padding: 15px; background: #444; text-align: center; 
            border-radius: 10px; font-weight: bold; font-size: 14px;
        }
        .tab.active { background: var(--azul-pedido); }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #bbb; font-size: 14px; }
        input, select, textarea {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: #1a1a1a; color: white; font-size: 18px; box-sizing: border-box;
        }

        .btn-guardar {
            width: 100%; padding: 20px; border-radius: 15px; border: none;
            font-size: 18px; font-weight: bold; color: white; cursor: pointer;
            margin-bottom: 10px;
        }

        .historial-item {
            background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 13px;
        }
    </style>
</head>
<body>

<div class="header">
    <button class="btn-accion" style="background: #27ae60;" onclick="bajarDatos()">⬇ CARGAR DATOS</button>
    <button class="btn-accion" style="background: #34495e;" onclick="abrirHistorial()">📋 VER HISTORIALES</button>
</div>

<div class="contenedor-mapa">
    <h2 style="text-align:center; color: var(--azul-pedido); margin-top:0;">MAPA 2: LOGÍSTICA</h2>
    <svg width="480" height="780" id="svg-logistica"></svg>
</div>

<div class="overlay" id="overlay" onclick="cerrarModales()"></div>

<div id="modalMesa" class="modal">
    <div class="tabs">
        <div id="tab-log" class="tab active" onclick="switchTab('log')">📦 PEDIDO</div>
        <div id="tab-fito" class="tab" onclick="switchTab('fito')">🛡️ FITO</div>
    </div>

    <div id="sec-log">
        <h2 id="tituloMesa" style="margin:0 0 15px 0;">Mesa --</h2>
        <div class="form-group">
            <label>Cliente (Escritura libre)</label>
            <input type="text" id="log_cliente" placeholder="Ej: LIONEL">
        </div>
        <div class="form-group">
            <label>Fecha Entrega (Aviso parpadeo 7 días antes)</label>
            <input type="date" id="log_fecha">
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>Bnd. Finales (Rejunte)</label>
                <input type="number" id="log_bnd_real" placeholder="0">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Alveolos/Bnd</label>
                <input type="number" id="log_alv" value="40">
            </div>
        </div>
        <div class="form-group">
            <label>Lote Maestro / Mezcla</label>
            <input type="text" id="log_lote" placeholder="Lote actual o 'MIX'">
        </div>
        <button class="btn-guardar" style="background: var(--verde-ok);" onclick="guardarLogistica()">💾 FINALIZAR REJUNTE</button>
        <button class="btn-guardar" style="background: var(--peligro-rojo);" onclick="vaciarMesa()">🚚 MARCAR COMO CARGADA (HISTORIAL)</button>
    </div>

    <div id="sec-fito" style="display: none;">
        <div class="form-group"><label>Aplicador</label><input type="text" id="fi_user"></div>
        <div class="form-group"><label>Producto Comercial</label><input type="text" id="fi_prod"></div>
        <div class="form-group"><label>Nº Registro</label><input type="text" id="fi_reg"></div>
        <div class="form-group"><label>Equipo (Mochila/Carro...)</label><input type="text" id="fi_equipo"></div>
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;"><label>Dosis</label><input type="text" id="fi_dosis"></div>
            <div class="form-group" style="flex: 1;"><label>Días Seguridad</label><input type="number" id="fi_seg"></div>
        </div>
        <button class="btn-guardar" style="background: #8e44ad;" onclick="guardarFito()">🛡️ REGISTRAR TRATAMIENTO</button>
    </div>

    <button class="btn-guardar" style="background: #555;" onclick="cerrarModales()">CERRAR</button>
</div>

<div id="modalHistorial" class="modal">
    <h2>HISTORIAL DE VENTAS</h2>
    <div id="listaVentas"></div>
    <hr>
    <h2>HISTORIAL DE FITOS</h2>
    <div id="listaFitos"></div>
    <button class="btn-guardar" style="background: #555;" onclick="cerrarModales()">CERRAR</button>
</div>

<script>
    const GIST_ID = "dc4b1ac9b41655086c76352f03ccfafe"; // Usa el tuyo real
    let DB_LOG = JSON.parse(localStorage.getItem('culti_log')) || {};
    let HIST_VENTAS = JSON.parse(localStorage.getItem('hist_ventas')) || [];
    let HIST_FITOS = JSON.parse(localStorage.getItem('hist_fitos')) || [];
    let mesaSel = "";

    const GEOMETRIA = [
        {id:'10-48', x:10, y:70, w:40, h:140}, {id:'11-49', x:55, y:70, w:40, h:140},
        {id:'12-50', x:105, y:70, w:40, h:140}, {id:'13-51', x:150, y:70, w:40, h:140},
        {id:'7-45', x:15, y:220, w:40, h:65}, {id:'8-46', x:65, y:220, w:45, h:90},
        {id:'9-47', x:135, y:220, w:38, h:90}, {id:'4-42', x:10, y:325, w:45, h:200},
        {id:'5-43', x:65, y:325, w:45, h:200}, {id:'6-44', x:125, y:325, w:45, h:200},
        {id:'1-39', x:10, y:540, w:45, h:210}, {id:'2-40', x:65, y:540, w:45, h:210},
        {id:'3-41', x:125, y:580, w:45, h:170},
        {id:'22-63', x:210, y:70, w:38, h:75}, {id:'23-64', x:255, y:70, w:38, h:75},
        {id:'24-65', x:300, y:70, w:38, h:75}, {id:'22-60', x:210, y:155, w:38, h:100},
        {id:'23-61', x:255, y:155, w:38, h:100}, {id:'24-62', x:300, y:155, w:38, h:100},
        {id:'18-56', x:215, y:360, w:35, h:110}, {id:'19-57', x:255, y:325, w:38, h:200},
        {id:'20-58', x:300, y:325, w:38, h:200}, {id:'21-59', x:345, y:325, w:38, h:200},
        {id:'14-52', x:210, y:540, w:38, h:145}, {id:'15-53', x:255, y:540, w:38, h:145},
        {id:'16-54', x:300, y:540, w:38, h:145}, {id:'17-55', x:345, y:540, w:38, h:145}
    ];

    function dibujarMapa() {
        let html = "";
        GEOMETRIA.forEach(m => {
            html += `<rect id="m-${m.id}" class="mesa" x="${m.x}" y="${m.y}" width="${m.w}" height="${m.h}" fill="white" stroke="#333" onclick="abrirMesa('${m.id}')"></rect>
                     <text x="${m.x + m.w/2}" y="${m.y + 12}" class="texto-id">${m.id}</text>
                     <text id="pts-${m.id}" x="${m.x + m.w/2}" y="${m.y + 25}" class="texto-plantas"></text>`;
        });
        document.getElementById('svg-logistica').innerHTML = html;
        actualizarColores();
    }

    function abrirMesa(id) {
        mesaSel = id;
        document.getElementById('tituloMesa').innerText = "Mesa " + id;
        const d = DB_LOG[id] || {};
        document.getElementById('log_cliente').value = d.cliente || "";
        document.getElementById('log_fecha').value = d.fecha || "";
        document.getElementById('log_bnd_real').value = d.bnd || "";
        document.getElementById('log_lote').value = d.lote || "";
        
        switchTab('log');
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modalMesa').style.display = 'block';
    }

    function guardarLogistica() {
        DB_LOG[mesaSel] = {
            cliente: document.getElementById('log_cliente').value.toUpperCase(),
            fecha: document.getElementById('log_fecha').value,
            bnd: document.getElementById('log_bnd_real').value,
            alv: document.getElementById('log_alv').value,
            lote: document.getElementById('log_lote').value,
            rejuntado: true,
            fito_borde: DB_LOG[mesaSel]?.fito_borde || 'gris'
        };
        persistir();
        cerrarModales();
    }

    function guardarFito() {
        const seg = parseInt(document.getElementById('fi_seg').value) || 0;
        const fitoData = {
            mesa: mesaSel,
            fecha: new Date().toLocaleDateString(),
            vence: new Date(Date.now() + seg * 86400000).toISOString(),
            prod: document.getElementById('fi_prod').value,
            reg: document.getElementById('fi_reg').value,
            user: document.getElementById('fi_user').value
        };
        HIST_FITOS.push(fitoData);
        if(!DB_LOG[mesaSel]) DB_LOG[mesaSel] = {};
        DB_LOG[mesaSel].fito_borde = 'rojo';
        DB_LOG[mesaSel].fito_vence = fitoData.vence;
        persistir();
        cerrarModales();
    }

    function vaciarMesa() {
        if(DB_LOG[mesaSel]) {
            HIST_VENTAS.push({...DB_LOG[mesaSel], mesa: mesaSel, fecha_venta: new Date().toLocaleDateString()});
            delete DB_LOG[mesaSel];
            persistir();
            cerrarModales();
        }
    }

    function actualizarColores() {
        const hoy = new Date();
        GEOMETRIA.forEach(m => {
            const rect = document.getElementById('m-' + m.id);
            const txt = document.getElementById('pts-' + m.id);
            const d = DB_LOG[m.id];
            
            rect.setAttribute('class', 'mesa');
            txt.innerText = "";

            if(d) {
                // Relleno por Pedido y Alerta 7 días
                if(d.rejuntado) rect.classList.add('mesa-rejuntada');
                else if(d.cliente) rect.classList.add('mesa-con-pedido');

                if(d.fecha && !d.rejuntado) {
                    const fEntrega = new Date(d.fecha);
                    const diff = (fEntrega - hoy) / (1000*60*60*24);
                    if(diff <= 7) rect.classList.add('alerta-proximo');
                }

                // Texto Plantas
                if(d.bnd) txt.innerText = "[" + (d.bnd * d.alv) + "]";

                // Borde Fito
                if(d.fito_vence) {
                    if(new Date(d.fito_vence) > hoy) rect.classList.add('borde-fito-rojo');
                    else rect.classList.add('borde-fito-verde');
                }
            }
        });
    }

    function persistir() {
        localStorage.setItem('culti_log', JSON.stringify(DB_LOG));
        localStorage.setItem('hist_ventas', JSON.stringify(HIST_VENTAS));
        localStorage.setItem('hist_fitos', JSON.stringify(HIST_FITOS));
        actualizarColores();
    }

    function switchTab(t) {
        document.getElementById('sec-log').style.display = t === 'log' ? 'block' : 'none';
        document.getElementById('sec-fito').style.display = t === 'fito' ? 'block' : 'none';
        document.getElementById('tab-log').className = 'tab' + (t==='log'?' active':'');
        document.getElementById('tab-fito').className = 'tab' + (t==='fito'?' active':'');
    }

    function cerrarModales() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('modalMesa').style.display = 'none';
        document.getElementById('modalHistorial').style.display = 'none';
    }

    function abrirHistorial() {
        let hV = "", hF = "";
        HIST_VENTAS.forEach(v => hV += `<div class="historial-item"><b>${v.fecha_venta}</b>: Mesa ${v.mesa} -> ${v.cliente} (${v.bnd} bnd)</div>`);
        HIST_FITOS.forEach(f => hF += `<div class="historial-item"><b>${f.fecha}</b>: Mesa ${f.mesa} -> ${f.prod} (Reg: ${f.reg})</div>`);
        document.getElementById('listaVentas').innerHTML = hV || "Sin ventas";
        document.getElementById('listaFitos').innerHTML = hF || "Sin fitos";
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modalHistorial').style.display = 'block';
    }

    window.onload = () => { dibujarMapa(); };
</script>
</body>
</html>
