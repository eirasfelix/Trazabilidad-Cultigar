<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CULTIGAR PRO - OPERACIÓN FITO FULL</title>
    <style>
        body { font-family: sans-serif; background: #333; margin: 0; color: white; padding-bottom: 50px; }
        .cabecera { background: white; padding: 10px; position: sticky; top: 0; z-index: 500; text-align: center; color: black; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .selector-modo { display: flex; gap: 8px; justify-content: center; margin-bottom: 5px; }
        .btn-modo { flex: 1; max-width: 180px; padding: 12px; border-radius: 25px; border: 2px solid #2e7d32; cursor: pointer; font-weight: bold; font-size: 13px; }
        .activo { background: #2e7d32; color: white; }
        .inactivo { background: white; color: #2e7d32; }

        .busqueda-nube { display: flex; gap: 5px; align-items: center; margin-top: 5px; padding: 0 10px; }
        .buscador { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        
        .resumen-stock { background: #e3f2fd; padding: 8px; margin: 5px auto; width: 92%; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; font-size: 12px; color: #0d47a1; border: 1px solid #2196F3; }

        .mapa-real { background: white; margin: 10px auto; padding: 15px; width: 480px; position: relative; border-radius: 8px; }
        .mesa { fill: #fcfcfc; stroke: #333; stroke-width: 1.2; cursor: pointer; transition: 0.2s; }
        .ocupada { fill: #c8e6c9 !important; stroke: #2e7d32; }
        .resaltado { fill: #FF8C00 !important; stroke: #e65100; stroke-width: 3; }
        
        /* Capas de Texto */
        .txt-id { font-size: 9px; font-weight: bold; fill: black; text-anchor: middle; pointer-events: none; }
        .txt-m2 { font-size: 9px; fill: #007bff; font-weight: bold; text-anchor: middle; pointer-events: none; display: none; }
        .txt-fuera { font-size: 8px; fill: #666; display: none; pointer-events: none; }

        /* Colores Fito */
        .fito-verde { fill: #a5d6a7 !important; }
        .fito-naranja { fill: #ffcc80 !important; }
        .fito-rojo { fill: #ef9a9a !important; }
        .fito-azul { fill: #90caf9 !important; }

        #infoPanel { position: fixed; top: 2%; left: 2%; width: 92%; height: 92%; background: #1a1a1a; padding: 15px; border-radius: 15px; display: none; z-index: 10000; border: 4px solid #2e7d32; overflow-y: auto; }
        .form-caja { background: #262626; padding: 15px; border-radius: 10px; border: 1px solid #444; margin-top: 15px; }
        .input-std { width: 92%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; background: #eee; font-size: 16px; color: black; }
        
        .btn-accion { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; color: white; }
        .btn-color { width: 50px; height: 50px; border-radius: 50%; border: 3px solid white; cursor: pointer; display: inline-block; margin: 5px; }
        
        .tabla-lotes { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        .tabla-lotes th { background: #333; color: #4CAF50; padding: 8px; text-align: left; }
        .tabla-lotes td { padding: 8px; border-bottom: 1px solid #444; }
    </style>
</head>
<body>

<div class="cabecera">
    <div class="selector-modo">
        <button id="m_traza" class="btn-modo activo" onclick="setPlano('traza')">📍 MODO LOTES</button>
        <button id="m_fito" class="btn-modo inactivo" onclick="setPlano('fito')">🧪 MODO FITO</button>
    </div>
    <div class="busqueda-nube">
        <input type="text" id="busq" class="buscador" placeholder="🔍 Buscar variedad..." onkeyup="buscar()">
        <button onclick="subirANube()" style="background:#4CAF50; border:none; padding:10px; border-radius:5px; color:white;">⬆</button>
        <button onclick="cargarDeNube()" style="background:#2196F3; border:none; padding:10px; border-radius:5px; color:white;">⬇</button>
    </div>
    <div id="resumenStock" class="resumen-stock">Cargando datos...</div>
</div>

</div>

<div id="infoPanel">
    <h1 id="titMesa" style="color:#4CAF50; margin:0;">Mesa</h1>
    <p id="subInfo" style="background:#333; padding:5px; border-radius:5px; display:inline-block;">Superficie: 0 m²</p>

    <div id="p_traza">
        <button id="btnPegar" class="btn-accion" style="background:#9C27B0; display:none;" onclick="pegarMovimiento()">📋 PEGAR PLANTA AQUÍ</button>
        <table class="tabla-lotes">
            <thead><tr><th>Lote/Variedad</th><th>Caja/Receta</th><th>Acción</th></tr></thead>
            <tbody id="listaLotes"></tbody>
        </table>
        <div class="form-caja">
            <h3 style="margin:0; color:#4CAF50;">+ NUEVO REGISTRO</h3>
            <input type="text" id="f_ref" class="input-std" placeholder="VARIEDAD">
            <input type="text" id="f_lote" class="input-std" placeholder="LOTE">
            <input type="number" id="f_cant" class="input-std" placeholder="Nº BANDEJAS">
            <input type="text" id="f_sust" class="input-std" placeholder="RECETA / SUSTRATO">
            <input type="text" id="f_caja" class="input-std" placeholder="Nº CAJA">
            <input type="date" id="f_fecha" class="input-std">
            <button class="btn-accion" style="background:#4CAF50;" onclick="guardarLote()">💾 GUARDAR EN MAPA</button>
        </div>
    </div>

    <div id="p_fito" style="display:none;">
        <div class="form-caja">
            <h3 style="margin:0; color:#2196F3;">🧪 OPERACIÓN FITO</h3>
            <label>Estado visual de la mesa:</label><br>
            <div class="btn-color fito-verde" onclick="marcarMesa('verde')"></div>
            <div class="btn-color fito-naranja" onclick="marcarMesa('naranja')"></div>
            <div class="btn-color fito-rojo" onclick="marcarMesa('rojo')"></div>
            <div class="btn-color fito-azul" onclick="marcarMesa('azul')"></div>
            
            <input type="text" id="fi_app" class="input-std" placeholder="Persona Aplicadora">
            <input type="text" id="fi_prod" class="input-std" placeholder="Producto y Nº Registro">
            <input type="text" id="fi_prob" class="input-std" placeholder="Problema (Trips, Hongo...)">
            <input type="text" id="fi_dos" class="input-std" placeholder="Dosis Aplicada">
            <button class="btn-accion" style="background:#2196F3;" onclick="guardarFito()">💾 REGISTRAR TRATAMIENTO</button>
        </div>
    </div>

    <button class="btn-accion" style="background:#666;" onclick="cerrarPanel()">❌ VOLVER AL MAPA</button>

    <div style="margin-top:20px; border-top:1px solid #444; padding-top:10px;">
        <input type="password" id="itoken" placeholder="Token GitHub ghp_..." style="width:60%; padding:10px;">
        <button onclick="saveToken()" style="background:#FF9800; border:none; padding:10px; border-radius:5px; color:white; font-weight:bold;">ACTIVAR NUBE</button>
    </div>
</div>

<script>
    const GIST_ID = "dc4b1ac9b41655086c76352f03ccfafe";
    let db = JSON.parse(localStorage.getItem('cul_db')) || {};
    let fito = JSON.parse(localStorage.getItem('cul_fito')) || {};
    let mesaAct = null;
    let modo = 'traza';
    let memoria = null;

    function setPlano(m) {
        modo = m;
        const esFito = (m === 'fito');
        document.getElementById('m_traza').className = esFito ? 'btn-modo inactivo' : 'btn-modo activo';
        document.getElementById('m_fito').className = esFito ? 'btn-modo activo' : 'btn-modo inactivo';
        
        document.querySelectorAll('.txt-id').forEach(t => t.style.display = esFito ? 'none' : 'block');
        document.querySelectorAll('.txt-m2').forEach(t => t.style.display = esFito ? 'block' : 'none');
        document.querySelectorAll('.txt-fuera').forEach(t => t.style.display = esFito ? 'block' : 'none');
        actualizarMapa();
    }

    function abrirMesa(id, m2) {
        mesaAct = id;
        document.getElementById('titMesa').innerText = "Mesa " + id;
        document.getElementById('subInfo').innerText = "Superficie: " + m2 + " m²";
        
        document.getElementById('p_traza').style.display = (modo === 'traza') ? 'block' : 'none';
        document.getElementById('p_fito').style.display = (modo === 'fito') ? 'block' : 'none';
        document.getElementById('btnPegar').style.display = memoria ? 'block' : 'none';
        
        document.getElementById('fi_app').value = localStorage.getItem('last_app') || "";
        document.getElementById('fi_prod').value = localStorage.getItem('last_prod') || "";

        renderLotes();
        document.getElementById('infoPanel').style.display = 'block';
    }

    function guardarLote() {
        let l = { ref: document.getElementById('f_ref').value.toUpperCase(), lote: document.getElementById('f_lote').value, cant: parseInt(document.getElementById('f_cant').value)||0, sust: document.getElementById('f_sust').value, caja: document.getElementById('f_caja').value, fecha: document.getElementById('f_fecha').value };
        if(!db[mesaAct]) db[mesaAct] = [];
        db[mesaAct].push(l);
        save(); renderLotes(); actualizarMapa();
    }

    function renderLotes() {
        let h = ""; (db[mesaAct] || []).forEach((l, i) => {
            h += `<tr><td><b>${l.ref}</b><br><small>L-${l.lote}</small></td><td>${l.caja}<br><small>${l.sust}</small></td><td><button onclick="iniciarMover(${i})" style="background:#FF9800; border:none; color:white; padding:5px; border-radius:3px;">📦</button> <button onclick="borrarLote(${i})" style="background:red; border:none; color:white; padding:5px; border-radius:3px;">X</button></td></tr>`;
        });
        document.getElementById('listaLotes').innerHTML = h || "<tr><td colspan='3'>Sin planta</td></tr>";
    }

    function iniciarMover(i) {
        memoria = db[mesaAct][i];
        db[mesaAct].splice(i, 1);
        if(db[mesaAct].length === 0) delete db[mesaAct];
        save(); alert("Copiado. Ve a otra mesa y pulsa PEGAR."); renderLotes();
    }

    function pegarMovimiento() {
        if(!db[mesaAct]) db[mesaAct] = [];
        db[mesaAct].push(memoria);
        memoria = null;
        save(); renderLotes(); actualizarMapa();
    }

    function marcarMesa(col) {
        if(!fito[mesaAct]) fito[mesaAct] = {};
        fito[mesaAct].color = col;
        save(); actualizarMapa();
    }

    function guardarFito() {
        const d = { app: document.getElementById('fi_app').value, prod: document.getElementById('fi_prod').value, prob: document.getElementById('fi_prob').value, dos: document.getElementById('fi_dos').value, fecha: new Date().toLocaleDateString() };
        fito[mesaAct].data = d;
        localStorage.setItem('last_app', d.app);
        localStorage.setItem('last_prod', d.prod);
        save(); alert("Tratamiento registrado");
    }

    function save() {
        localStorage.setItem('cul_db', JSON.stringify(db));
        localStorage.setItem('cul_fito', JSON.stringify(fito));
        subirANube();
    }

    function actualizarMapa() {
        let totalB = 0;
        document.querySelectorAll('.mesa').forEach(m => {
            let id = m.id.substring(1);
            m.className.baseVal = 'mesa';
            if(db[id]) { m.classList.add('ocupada'); db[id].forEach(l => totalB += l.cant); }
            if(modo === 'fito' && fito[id] && fito[id].color) { m.classList.add('fito-' + fito[id].color); }
        });
        document.getElementById('resumenStock').innerHTML = `<div class="stock-item">BANDEJAS TOTALES: ${totalB}</div>`;
    }

    async function subirANube() {
        const token = localStorage.getItem('gh_token');
        if(!token) return;
        const body = { files: { "cultigar_db.json": { content: JSON.stringify({traza: db, fito: fito}) } } };
        await fetch(`https://api.github.com/gists/${GIST_ID}`, { method: 'PATCH', headers: { 'Authorization': `token ${token}` }, body: JSON.stringify(body) });
    }

    async function cargarDeNube() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}?cb=${Date.now()}`);
            const j = await res.json();
            const d = JSON.parse(j.files["cultigar_db.json"].content);
            db = d.traza || {}; fito = d.fito || {};
            actualizarMapa();
        } catch(e) {}
    }

    function saveToken() { localStorage.setItem('gh_token', document.getElementById('itoken').value); location.reload(); }
    function borrarLote(i) { if(confirm("¿Borrar planta?")) { db[mesaAct].splice(i,1); if(db[mesaAct].length==0) delete db[mesaAct]; save(); renderLotes(); actualizarMapa(); } }
    function cerrarPanel() { document.getElementById('infoPanel').style.display = 'none'; }
    function buscar() { /* Lógica de resaltado por texto */ }

    cargarDeNube();
</script>
</body>
</html>
