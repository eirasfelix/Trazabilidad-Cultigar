<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CULTIGAR - SISTEMA INTEGRAL PRO</title>
    <style>
        :root {
            --bg-dark: #2c3e50;
            --verde-cultigar: #27ae60;
            --rojo-fito: #c0392b;
            --azul-log: #2980b9;
            --purpura-multi: #af7ac5;
            --blanco: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-dark); 
            margin: 0; 
            color: white;
            padding-bottom: 50px;
        }

        .header-sticky {
            position: sticky;
            top: 0;
            background: white;
            padding: 10px;
            z-index: 1000;
            display: flex;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .input-busqueda {
            flex-grow: 1;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #ddd;
            font-size: 16px;
        }

        .btn-nube {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }

        .seccion-mapa {
            background: #eee;
            margin: 20px auto;
            padding: 15px;
            width: 500px;
            border-radius: 10px;
            border: 3px solid #000;
        }

        .titulo-mapa {
            text-align: center;
            padding: 10px;
            margin: 0;
            font-weight: bold;
            text-transform: uppercase;
        }

        svg {
            display: block;
            margin: auto;
            background: white;
        }

        .mesa {
            fill: white;
            stroke: #333;
            stroke-width: 1.5;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mesa:hover {
            stroke: #000;
            stroke-width: 3;
        }

        .texto-id {
            font-size: 10px;
            font-weight: bold;
            fill: black;
            pointer-events: none;
            text-anchor: middle;
        }

        /* Estados Mapa 1 */
        .ocupada { fill: #a9dfbf !important; }
        .resaltado { fill: #f39c12 !important; stroke: #d35400; stroke-width: 4; }
        
        /* Estados Mapa 2 */
        .mesa-pedido { fill: var(--azul-log) !important; }
        .mesa-multi { fill: var(--purpura-multi) !important; }
        .mesa-rejuntada { fill: var(--verde-cultigar) !important; }
        
        @keyframes parpadeo {
            0% { opacity: 1; }
            50% { fill: #f39c12; }
            100% { opacity: 1; }
        }
        .alerta-entrega { animation: parpadeo 1s infinite; }

        /* Bordes de Fito */
        .borde-fito-peligro { stroke: #c0392b !important; stroke-width: 6 !important; }
        .borde-fito-ok { stroke: #27ae60 !important; stroke-width: 6 !important; }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 450px;
            height: 85%;
            background: #1a1a1a;
            border: 4px solid #444;
            border-radius: 15px;
            display: none;
            z-index: 2000;
            padding: 20px;
            overflow-y: auto;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            z-index: 1500;
        }

        .tabs-fito { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: #333; border: none; color: white; cursor: pointer; border-radius: 5px; }
        .tab-btn.active { background: var(--azul-log); }

        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 11px; color: #aaa; margin-bottom: 3px; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border-radius: 5px; border: none; font-size: 14px; box-sizing: border-box; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 11px; background: #222; }
        th { border-bottom: 2px solid var(--verde-cultigar); padding: 5px; text-align: left; color: var(--verde-cultigar); }
        td { padding: 5px; border-bottom: 1px solid #333; }

        .btn-guardar { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; font-size: 14px; margin-bottom: 5px; }
        .btn-cerrar { background: #555; margin-top: 10px; }

        .historial-item {
            background: #222; padding: 10px; border-radius: 5px; margin-bottom: 8px;
            border-left: 4px solid var(--azul-log); font-size: 12px;
        }
    </style>
</head>
<body>

<div class="header-sticky">
    <input type="text" id="buscador" class="input-busqueda" placeholder="🔍 Buscar Variedad..." onkeyup="ejecutarBusqueda()">
    <button class="btn-nube" style="background: #27ae60;" onclick="subirDatos()">⬆</button>
    <button class="btn-nube" style="background: #2980b9;" onclick="bajarDatos()">⬇</button>
    <button class="btn-nube" style="background: #666;" onclick="abrirHistorialGeneral()">📋</button>
</div>

<div class="seccion-mapa">
    <h3 class="titulo-mapa" style="color: var(--verde-cultigar);">Mapa 1: Trazabilidad</h3>
    <svg width="480" height="780" id="svg-trazabilidad"></svg>
</div>

<div class="seccion-mapa">
    <h3 class="titulo-mapa" style="color: var(--azul-log);">Mapa 2: Logística y Fitos</h3>
    <svg width="480" height="780" id="svg-fito"></svg>
</div>

<div class="overlay" id="overlay" onclick="cerrarModales()"></div>

<div id="modalMesa" class="modal">
    <h2 id="mesaTitulo" style="color: var(--verde-cultigar); font-size: 18px;">Mesa --</h2>
    <table>
        <thead><tr><th>Ref</th><th>Lote</th><th>Bnd</th><th>Acción</th></tr></thead>
        <tbody id="tablaCuerpoMesa"></tbody>
    </table>
    <div class="form-group"><label>Variedad / Referencia</label><input type="text" id="f_ref"></div>
    <div class="form-group"><label>Lote</label><input type="text" id="f_lote"></div>
    <div style="display: flex; gap: 10px;">
        <div class="form-group" style="flex: 1;"><label>Nº Bandejas</label><input type="number" id="f_num_bandejas"></div>
        <div class="form-group" style="flex: 1;"><label>Tipo de Bandeja</label><input type="text" id="f_tipo_bandeja" list="opciones_bandeja">
            <datalist id="opciones_bandeja"><option value="40"><option value="60"><option value="84"></datalist>
        </div>
    </div>
    <button class="btn-guardar" style="background: var(--verde-cultigar);" onclick="guardarRegistroTrazabilidad()">💾 AÑADIR/EDITAR REGISTRO</button>
    <button class="btn-guardar btn-cerrar" onclick="cerrarModales()">CERRAR</button>
</div>

<div id="modalFito" class="modal">
    <div class="tabs-fito">
        <button id="btnTabLog" class="tab-btn active" onclick="cambiarTabFito('log')">📦 LOGÍSTICA</button>
        <button id="btnTabFito" class="tab-btn" onclick="cambiarTabFito('fito')">🛡️ FITO</button>
    </div>

    <div id="panelLogistica">
        <h2 id="logTitulo" style="color: var(--azul-log); font-size: 18px; margin: 0 0 10px 0;">Pedidos Mesa --</h2>
        <table>
            <thead><tr><th>Cliente</th><th>Bnd</th><th>Lote</th><th>Estado</th><th>Acción</th></tr></thead>
            <tbody id="cuerpoTablaLogistica"></tbody>
        </table>
        <hr style="border: 1px solid #444;">
        <div class="form-group"><label>Cliente</label><input type="text" id="l_cliente"></div>
        <div class="form-group"><label>Fecha Carga</label><input type="date" id="l_fecha"></div>
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;"><label>Bnd</label><input type="number" id="l_bnd"></div>
            <div class="form-group" style="flex: 1;"><label>Lote Final</label><input type="text" id="l_lote"></div>
        </div>
        <div style="display: flex; gap: 5px;">
            <button class="btn-guardar" style="background: var(--azul-log); flex: 2;" onclick="guardarLogistica()">💾 GUARDAR PEDIDO</button>
            <button id="btnRejunte" class="btn-guardar" style="background: var(--verde-cultigar); flex: 1;" onclick="toggleRejunteMesa()">✅ LISTO</button>
        </div>
    </div>

    <div id="panelFito" style="display: none;">
        <h2 id="fitoTitulo" style="color: var(--rojo-fito); font-size: 18px; margin: 0 0 10px 0;">Historial Fito</h2>
        <table>
            <thead><tr><th>Fecha</th><th>Producto</th><th>Seguridad</th><th>Acción</th></tr></thead>
            <tbody id="cuerpoTablaFitoMesa"></tbody>
        </table>
        <hr style="border: 1px solid #444;">
        <div class="form-group"><label>Producto y Nº Reg</label><input type="text" id="fi_prod"></div>
        <div class="form-group"><label>Aplicador / Equipo</label><input type="text" id="fi_user"></div>
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;"><label>Dosis</label><input type="text" id="fi_dosis"></div>
            <div class="form-group" style="flex: 1;"><label>Plazo (Días)</label><input type="number" id="fi_plazo"></div>
        </div>
        <button id="btnGuardarFito" class="btn-guardar" style="background: #8e44ad;" onclick="guardarRegistroFito()">🛡️ REGISTRAR TRATAMIENTO</button>
    </div>
    
    <button class="btn-guardar btn-cerrar" onclick="cerrarModales()">CERRAR</button>
</div>

<div id="modalHistorial" class="modal">
    <h2 style="color: var(--azul-log);">ARCHIVO HISTÓRICO DE CARGAS</h2>
    <div id="listaHistorial"></div>
    <button class="btn-guardar btn-cerrar" onclick="cerrarModales()">CERRAR</button>
</div>

<script>
    const GIST_ID = "dc4b1ac9b41655086c76352f03ccfafe";
    let DB_TRAZA = JSON.parse(localStorage.getItem('culti_traza')) || {};
    let DB_LOG = JSON.parse(localStorage.getItem('culti_log')) || {};
    let DB_FITO = JSON.parse(localStorage.getItem('culti_fito')) || {};
    let H_GENERAL = JSON.parse(localStorage.getItem('culti_hist')) || [];
    
    let mesaSeleccionada = "";
    let indexEdicion = null;
    let indexEdicionLog = null;
    let indexEdicionFito = null;

    const GEOMETRIA = [
        {id:'10-48', x:10, y:70, w:40, h:140}, {id:'11-49', x:55, y:70, w:40, h:140},
        {id:'12-50', x:105, y:70, w:40, h:140}, {id:'13-51', x:150, y:70, w:40, h:140},
        {id:'7-45', x:15, y:220, w:40, h:65}, {id:'8-46', x:65, y:220, w:45, h:90},
        {id:'9-47', x:135, y:220, w:38, h:90}, {id:'4-42', x:10, y:325, w:45, h:200},
        {id:'5-43', x:65, y:325, w:45, h:200}, {id:'6-44', x:125, y:325, w:45, h:200},
        {id:'1-39', x:10, y:540, w:45, h:210}, {id:'2-40', x:65, y:540, w:45, h:210},
        {id:'3-41', x:125, y:580, w:45, h:170},
        {id:'22-63', x:210, y:70, w:38, h:75}, {id:'23-64', x:255, y:70, w:38, h:75},
        {id:'24-65', x:300, y:70, w:38, h:75}, {id:'22-60', x:210, y:155, w:38, h:100},
        {id:'23-61', x:255, y:155, w:38, h:100}, {id:'24-62', x:300, y:155, w:38, h:100},
        {id:'18-56', x:215, y:360, w:35, h:110}, {id:'19-57', x:255, y:325, w:38, h:200},
        {id:'20-58', x:300, y:325, w:38, h:200}, {id:'21-59', x:345, y:325, w:38, h:200},
        {id:'14-52', x:210, y:540, w:38, h:145}, {id:'15-53', x:255, y:540, w:38, h:145},
        {id:'16-54', x:300, y:540, w:38, h:145}, {id:'17-55', x:345, y:540, w:38, h:145}
    ];

    function inicializarMapas() {
        let trazHtml = "", fitoHtml = "";
        GEOMETRIA.concat(Array.from({length:14},(_,i)=>({id:(i+1).toString(), isExtra:true}))).forEach(m => {
            let x, y, w, h;
            if(m.isExtra) { w=75; h=38; x=395; y=70+(14-parseInt(m.id))*46; }
            else { x=m.x; y=m.y; w=m.w; h=m.h; }
            trazHtml += `<rect id="t-${m.id}" class="mesa" x="${x}" y="${y}" width="${w}" height="${h}" onclick="abrirTraza('${m.id}')"></rect><text x="${x+w/2}" y="${y+h-5}" class="texto-id">${m.id}</text>`;
            fitoHtml += `<rect id="f-${m.id}" class="mesa" x="${x}" y="${y}" width="${w}" height="${h}" onclick="abrirFito('${m.id}')"></rect><text x="${x+w/2}" y="${y+12}" class="texto-id">${m.id}</text>`;
        });
        document.getElementById('svg-trazabilidad').innerHTML = trazHtml;
        document.getElementById('svg-fito').innerHTML = fitoHtml;
        actualizarColoresMapas();
    }

    // --- LOGICA TRAZABILIDAD (MAPA 1) ---
    function abrirTraza(id) {
        mesaSeleccionada = id; indexEdicion = null;
        mostrarTablaTraza();
        document.getElementById('overlay').style.display='block';
        document.getElementById('modalMesa').style.display='block';
    }
    function mostrarTablaTraza() {
        let h = ""; (DB_TRAZA[mesaSeleccionada] || []).forEach((r, i) => {
            h += `<tr><td>${r.ref}</td><td>${r.lote}</td><td>${r.num_bandejas}</td><td><button onclick="prepararEdicion(${i})">✏️</button> <button onclick="borrarTraza(${i})">🗑️</button></td></tr>`;
        });
        document.getElementById('tablaCuerpoMesa').innerHTML = h || "<tr><td colspan='4'>Vacía</td></tr>";
    }
    function guardarRegistroTrazabilidad() {
        let r = { ref: document.getElementById('f_ref').value.toUpperCase(), lote: document.getElementById('f_lote').value, num_bandejas: document.getElementById('f_num_bandejas').value, tipo_bandeja: document.getElementById('f_tipo_bandeja').value };
        if(!DB_TRAZA[mesaSeleccionada]) DB_TRAZA[mesaSeleccionada] = [];
        if(indexEdicion !== null) DB_TRAZA[mesaSeleccionada][indexEdicion] = r; else DB_TRAZA[mesaSeleccionada].push(r);
        persistir(); mostrarTablaTraza(); actualizarColoresMapas();
    }

    // --- LOGICA LOGISTICA Y FITOS (MAPA 2) ---
    function abrirFito(id) {
        mesaSeleccionada = id; indexEdicionLog = null; indexEdicionFito = null;
        limpiarFormLog(); limpiarFormFito();
        cambiarTabFito('log'); renderTablaLogistica(); renderTablaFitoMesa();
        document.getElementById('overlay').style.display='block';
        document.getElementById('modalFito').style.display='block';
    }

    function cambiarTabFito(tab) {
        document.getElementById('panelLogistica').style.display = tab==='log'?'block':'none';
        document.getElementById('panelFito').style.display = tab==='fito'?'block':'none';
        document.getElementById('btnTabLog').className = 'tab-btn '+(tab==='log'?'active':'');
        document.getElementById('btnTabFito').className = 'tab-btn '+(tab==='fito'?'active':'');
    }

    function renderTablaLogistica() {
        let h = ""; const peds = DB_LOG[mesaSeleccionada]?.pedidos || [];
        peds.forEach((p, i) => {
            h += `<tr><td>${p.cliente}</td><td>${p.bnd}</td><td>${p.lote}</td><td>En Mesa</td><td><button onclick="editarPedidoLog(${i})">✏️</button> <button onclick="cargarPedidoIndividual(${i})">🚚</button> <button onclick="borrarPedidoLog(${i})">🗑️</button></td></tr>`;
        });
        document.getElementById('cuerpoTablaLogistica').innerHTML = h || "<tr><td colspan='5'>Vacía</td></tr>";
        let rej = DB_LOG[mesaSeleccionada]?.rejuntado;
        document.getElementById('btnRejunte').style.background = rej ? "var(--verde-cultigar)" : "#555";
        document.getElementById('btnRejunte').innerText = rej ? "✅ REJUNTADO" : "⬜ REJUNTAR";
    }

    function guardarLogistica() {
        if(!DB_LOG[mesaSeleccionada]) DB_LOG[mesaSeleccionada] = { pedidos: [], rejuntado: false };
        let p = { cliente: document.getElementById('l_cliente').value.toUpperCase(), fecha: document.getElementById('l_fecha').value, bnd: document.getElementById('l_bnd').value, lote: document.getElementById('l_lote').value };
        if(indexEdicionLog !== null) DB_LOG[mesaSeleccionada].pedidos[indexEdicionLog] = p; else DB_LOG[mesaSeleccionada].pedidos.push(p);
        persistir(); renderTablaLogistica(); actualizarColoresMapas(); limpiarFormLog();
    }

    function toggleRejunteMesa() {
        if(!DB_LOG[mesaSeleccionada]) return;
        DB_LOG[mesaSeleccionada].rejuntado = !DB_LOG[mesaSeleccionada].rejuntado;
        persistir(); renderTablaLogistica(); actualizarColoresMapas();
    }

    function editarPedidoLog(i) {
        indexEdicionLog = i; let p = DB_LOG[mesaSeleccionada].pedidos[i];
        document.getElementById('l_cliente').value = p.cliente; document.getElementById('l_fecha').value = p.fecha;
        document.getElementById('l_bnd').value = p.bnd; document.getElementById('l_lote').value = p.lote;
    }

    function cargarPedidoIndividual(i) {
        let p = DB_LOG[mesaSeleccionada].pedidos[i];
        H_GENERAL.unshift({...p, mesa: mesaSeleccionada, f_salida: new Date().toLocaleDateString()});
        DB_LOG[mesaSeleccionada].pedidos.splice(i, 1);
        if(DB_LOG[mesaSeleccionada].pedidos.length===0) delete DB_LOG[mesaSeleccionada];
        persistir(); renderTablaLogistica(); actualizarColoresMapas();
    }

    function renderTablaFitoMesa() {
        let h = ""; const hoy = new Date();
        (DB_FITO[mesaSeleccionada] || []).forEach((r, i) => {
            const dias = Math.ceil((new Date(r.vence) - hoy)/(1000*60*60*24));
            h += `<tr><td>${r.f}</td><td>${r.p}</td><td style="color:${dias>0?'#e74c3c':'#27ae60'}">${dias>0?dias+'d':'OK'}</td><td><button onclick="editarFito(${i})">✏️</button> <button onclick="borrarFito(${i})">🗑️</button></td></tr>`;
        });
        document.getElementById('cuerpoTablaFitoMesa').innerHTML = h || "<tr><td colspan='4'>Sin registros</td></tr>";
    }

    function guardarRegistroFito() {
        if(!DB_FITO[mesaSeleccionada]) DB_FITO[mesaSeleccionada] = [];
        const plazo = parseInt(document.getElementById('fi_plazo').value) || 0;
        const v = new Date(); v.setDate(v.getDate() + plazo);
        let f = { p: document.getElementById('fi_prod').value.toUpperCase(), u: document.getElementById('fi_user').value, d: document.getElementById('fi_dosis').value, pl: plazo, f: new Date().toLocaleDateString(), vence: v.toISOString() };
        if(indexEdicionFito !== null) DB_FITO[mesaSeleccionada][indexEdicionFito] = f; else DB_FITO[mesaSeleccionada].push(f);
        persistir(); renderTablaFitoMesa(); actualizarColoresMapas(); limpiarFormFito();
    }

    function editarFito(i) {
        indexEdicionFito = i; let r = DB_FITO[mesaSeleccionada][i];
        document.getElementById('fi_prod').value = r.p; document.getElementById('fi_user').value = r.u;
        document.getElementById('fi_dosis').value = r.d; document.getElementById('fi_plazo').value = r.pl;
        document.getElementById('btnGuardarFito').innerText = "💾 ACTUALIZAR FITO";
    }

    // --- COMUNES ---
    function actualizarColoresMapas() {
        const hoy = new Date(); const prox = new Date(); prox.setDate(hoy.getDate()+7);
        document.querySelectorAll('#svg-trazabilidad .mesa').forEach(r => {
            r.classList.toggle('ocupada', DB_TRAZA[r.id.replace('t-','')]?.length > 0);
        });
        document.querySelectorAll('#svg-fito .mesa').forEach(r => {
            const id = r.id.replace('f-',''); const l = DB_LOG[id]; const fit = DB_FITO[id] || [];
            r.setAttribute('class', 'mesa'); r.removeAttribute('style');
            if(l && l.pedidos.length > 0) {
                if(l.rejuntado) r.classList.add('mesa-rejuntada');
                else if(l.pedidos.length > 1) r.classList.add('mesa-multi');
                else r.classList.add('mesa-pedido');
                if(l.pedidos.some(p=>p.fecha && new Date(p.fecha)<=prox) && !l.rejuntado) r.classList.add('alerta-entrega');
            }
            if(fit.length > 0) r.classList.add(new Date(fit[fit.length-1].vence) > hoy ? 'borde-fito-peligro' : 'borde-fito-ok');
        });
    }

    function persistir() {
        localStorage.setItem('culti_traza', JSON.stringify(DB_TRAZA));
        localStorage.setItem('culti_log', JSON.stringify(DB_LOG));
        localStorage.setItem('culti_fito', JSON.stringify(DB_FITO));
        localStorage.setItem('culti_hist', JSON.stringify(H_GENERAL));
        subirDatos();
    }

    async function subirDatos() {
        const tok = localStorage.getItem('github_token'); if(!tok) return;
        try { await fetch(`https://api.github.com/gists/${GIST_ID}`, { method: 'PATCH', headers: { 'Authorization': `token ${tok}` }, body: JSON.stringify({ files: { "cultigar_db.json": { content: JSON.stringify(DB_TRAZA) }, "cultigar_log.json": { content: JSON.stringify(DB_LOG) }, "cultigar_fito.json": { content: JSON.stringify(DB_FITO) }, "cultigar_hist.json": { content: JSON.stringify(H_GENERAL) } }}) }); } catch(e){}
    }

    async function bajarDatos() {
        try { const res = await fetch(`https://api.github.com/gists/${GIST_ID}?cb=${Date.now()}`); const d = await res.json();
            if(d.files["cultigar_db.json"]) DB_TRAZA = JSON.parse(d.files["cultigar_db.json"].content);
            if(d.files["cultigar_log.json"]) DB_LOG = JSON.parse(d.files["cultigar_log.json"].content);
            if(d.files["cultigar_fito.json"]) DB_FITO = JSON.parse(d.files["cultigar_fito.json"].content);
            if(d.files["cultigar_hist.json"]) H_GENERAL = JSON.parse(d.files["cultigar_hist.json"].content);
            actualizarColoresMapas();
        } catch(e){}
    }

    function ejecutarBusqueda() {
        let b = document.getElementById('buscador').value.toUpperCase();
        document.querySelectorAll('#svg-trazabilidad .mesa').forEach(m => m.classList.remove('resaltado'));
        if(!b) return;
        for(let m in DB_TRAZA) if(DB_TRAZA[m].some(r => r.ref.includes(b))) document.getElementById('t-'+m)?.classList.add('resaltado');
    }

    function limpiarFormLog() { ['l_cliente', 'l_fecha', 'l_bnd', 'l_lote'].forEach(i => document.getElementById(i).value=""); }
    function limpiarFormFito() { ['fi_prod', 'fi_user', 'fi_dosis', 'fi_plazo'].forEach(i => document.getElementById(i).value=""); document.getElementById('btnGuardarFito').innerText="🛡️ REGISTRAR"; }
    function cerrarModales() { document.getElementById('overlay').style.display='none'; document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    function borrarPedidoLog(i) { if(confirm("¿Borrar?")) { DB_LOG[mesaSeleccionada].pedidos.splice(i,1); if(!DB_LOG[mesaSeleccionada].pedidos.length) delete DB_LOG[mesaSeleccionada]; persistir(); renderTablaLogistica(); actualizarColoresMapas(); } }
    function borrarFito(i) { if(confirm("¿Borrar?")) { DB_FITO[mesaSeleccionada].splice(i,1); persistir(); renderTablaFitoMesa(); actualizarColoresMapas(); } }
    function borrarTraza(i) { if(confirm("¿Borrar?")) { DB_TRAZA[mesaSeleccionada].splice(i,1); persistir(); mostrarTablaTraza(); actualizarColoresMapas(); } }
    function prepararEdicion(i) { indexEdicion=i; let r=DB_TRAZA[mesaSeleccionada][i]; document.getElementById('f_ref').value=r.ref; document.getElementById('f_lote').value=r.lote; document.getElementById('f_num_bandejas').value=r.num_bandejas; document.getElementById('f_tipo_bandeja').value=r.tipo_bandeja; }
    function abrirHistorialGeneral() { let h=""; H_GENERAL.forEach(x=>h+=`<div class="historial-item"><b>${x.f_salida}</b>: Mesa ${x.mesa} → ${x.cliente} (${x.bnd} bnd)</div>`); document.getElementById('listaHistorial').innerHTML=h||"Vacío"; document.getElementById('overlay').style.display='block'; document.getElementById('modalHistorial').style.display='block'; }

    window.onload = () => { inicializarMapas(); bajarDatos(); };
</script>
</body>
</html>
