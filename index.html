<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TRAZABILIDAD CULTIGAR - FULL MAP</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #333; margin: 0; padding: 0; color: #eee; }
        .cabecera { background: white; padding: 10px; position: sticky; top: 0; z-index: 500; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); color: #333; }
        .busqueda-nube-container { display: flex; gap: 8px; align-items: center; max-width: 95%; margin: 0 auto 8px auto; }
        .buscador { flex-grow: 1; padding: 12px; font-size: 16px; border-radius: 8px; border: 2px solid #ddd; outline: none; }
        .buscador:focus { border-color: #2196F3; }
        .resumen-stock { background: #e3f2fd; padding: 8px; margin: 5px auto; width: 95%; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; font-size: 12px; color: #0d47a1; border: 1px solid #bbdefb; }
        .stock-item { background: white; padding: 3px 8px; border-radius: 4px; border: 1px solid #2196F3; font-weight: bold; }
        
        .mapa-scroll { width: 100%; overflow-x: auto; padding: 20px 0; }
        .mapa-real { background: white; margin: 0 auto; padding: 20px; border: 2px solid #000; display: block; width: 480px; position: relative; border-radius: 4px; }
        
        .mesa { fill: #f9f9f9; stroke: #333; stroke-width: 1.5; cursor: pointer; transition: all 0.2s; }
        .mesa:hover { fill: #e0e0e0; stroke-width: 2.5; }
        .ocupada { fill: #81c784 !important; stroke: #2e7d32; }
        .resaltado { fill: #ff9800 !important; stroke: #e65100; stroke-width: 3; }
        .texto-mesa { font-size: 10px; font-weight: bold; pointer-events: none; text-anchor: middle; fill: #333; }

        #infoPanel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; overflow-y: auto; }
        .panel-contenido { background: #1a1a1a; margin: 20px auto; width: 90%; max-width: 500px; padding: 20px; border-radius: 15px; border: 3px solid #4CAF50; }
        
        .tabla-lotes { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .tabla-lotes th { border-bottom: 2px solid #4CAF50; padding: 10px; text-align: left; color: #4CAF50; }
        .tabla-lotes td { padding: 10px; border-bottom: 1px solid #333; font-size: 14px; }
        
        .formulario-lote { background: #262626; padding: 15px; border-radius: 10px; border: 1px solid #444; }
        .label-form { font-size: 12px; color: #888; margin-top: 10px; display: block; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 6px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; font-size: 16px; }
        
        .btn { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-guardar { background: #4CAF50; color: white; }
        .btn-editar-mode { background: #2196F3 !important; }
        .btn-mini { padding: 5px 10px; border-radius: 4px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 11px; margin-right: 2px; }
        .btn-receta { background: #444; color: #4CAF50; border: 1px solid #4CAF50; padding: 8px; font-size: 12px; margin-top: 5px; cursor: pointer; width: auto; border-radius: 4px; }
    </style>
</head>
<body>

<div class="cabecera">
    <div class="busqueda-nube-container">
        <input type="text" id="inputBusqueda" class="buscador" placeholder="🔍 Buscar variedad o lote..." onkeyup="buscar()">
        <button onclick="subirANube()" class="btn-mini" style="background:#4CAF50; height:45px">⬆ SUBIR</button>
        <button onclick="cargarDeNube()" class="btn-mini" style="background:#2196F3; height:45px">⬇ BAJAR</button>
    </div>
    <div id="resumenStock" class="resumen-stock">Cargando datos...</div>
</div>

<div class="mapa-scroll">
    <div class="mapa-real">
        <svg width="450" height="750" viewBox="0 0 450 750">
            <rect id="m10-48" class="mesa" x="10" y="50" width="40" height="140" onclick="abrirMesa('10-48')" /><text x="30" y="180" class="texto-mesa">10-48</text>
            <rect id="m11-49" class="mesa" x="55" y="50" width="40" height="140" onclick="abrirMesa('11-49')" /><text x="75" y="180" class="texto-mesa">11-49</text>
            <rect id="m12-50" class="mesa" x="105" y="50" width="40" height="140" onclick="abrirMesa('12-50')" /><text x="125" y="180" class="texto-mesa">12-50</text>
            <rect id="m13-51" class="mesa" x="150" y="50" width="40" height="140" onclick="abrirMesa('13-51')" /><text x="170" y="180" class="texto-mesa">13-51</text>
            
            <rect id="m7-45" class="mesa" x="15" y="200" width="40" height="80" onclick="abrirMesa('7-45')" /><text x="35" y="270" class="texto-mesa">7-45</text>
            <rect id="m8-46" class="mesa" x="65" y="200" width="45" height="90" onclick="abrirMesa('8-46')" /><text x="87" y="280" class="texto-mesa">8-46</text>
            <rect id="m9-47" class="mesa" x="135" y="200" width="40" height="90" onclick="abrirMesa('9-47')" /><text x="155" y="280" class="texto-mesa">9-47</text>
            
            <rect id="m4-42" class="mesa" x="10" y="310" width="45" height="180" onclick="abrirMesa('4-42')" /><text x="32" y="480" class="texto-mesa">4-42</text>
            <rect id="m5-43" class="mesa" x="65" y="310" width="45" height="180" onclick="abrirMesa('5-43')" /><text x="87" y="480" class="texto-mesa">5-43</text>
            <rect id="m6-44" class="mesa" x="125" y="310" width="45" height="180" onclick="abrirMesa('6-44')" /><text x="147" y="480" class="texto-mesa">6-44</text>
            
            <rect id="m1-39" class="mesa" x="10" y="510" width="45" height="200" onclick="abrirMesa('1-39')" /><text x="32" y="700" class="texto-mesa">1-39</text>
            <rect id="m2-40" class="mesa" x="65" y="510" width="45" height="200" onclick="abrirMesa('2-40')" /><text x="87" y="700" class="texto-mesa">2-40</text>
            <rect id="m3-41" class="mesa" x="125" y="540" width="45" height="170" onclick="abrirMesa('3-41')" /><text x="147" y="700" class="texto-mesa">3-41</text>

            <rect id="m27-65" class="mesa" x="205" y="50" width="40" height="140" onclick="abrirMesa('27-65')" /><text x="225" y="180" class="texto-mesa">27-65</text>
            <rect id="m28-66" class="mesa" x="205" y="210" width="40" height="200" onclick="abrirMesa('28-66')" /><text x="225" y="400" class="texto-mesa">28-66</text>
            <rect id="m29-67" class="mesa" x="205" y="430" width="40" height="210" onclick="abrirMesa('29-67')" /><text x="225" y="630" class="texto-mesa">29-67</text>

            <rect id="m23-61" class="mesa" x="260" y="50" width="40" height="140" onclick="abrirMesa('23-61')" /><text x="280" y="180" class="texto-mesa">23-61</text>
            <rect id="m24-62" class="mesa" x="305" y="50" width="40" height="140" onclick="abrirMesa('24-62')" /><text x="325" y="180" class="texto-mesa">24-62</text>
            <rect id="m25-63" class="mesa" x="355" y="50" width="40" height="140" onclick="abrirMesa('25-63')" /><text x="375" y="180" class="texto-mesa">25-63</text>
            <rect id="m26-64" class="mesa" x="400" y="50" width="40" height="140" onclick="abrirMesa('26-64')" /><text x="420" y="180" class="texto-mesa">26-64</text>

            <rect id="m20-58" class="mesa" x="265" y="200" width="40" height="80" onclick="abrirMesa('20-58')" /><text x="285" y="270" class="texto-mesa">20-58</text>
            <rect id="m21-59" class="mesa" x="320" y="200" width="45" height="90" onclick="abrirMesa('21-59')" /><text x="342" y="280" class="texto-mesa">21-59</text>
            <rect id="m22-60" class="mesa" x="390" y="200" width="40" height="90" onclick="abrirMesa('22-60')" /><text x="410" y="280" class="texto-mesa">22-60</text>

            <rect id="m17-55" class="mesa" x="265" y="310" width="45" height="180" onclick="abrirMesa('17-55')" /><text x="287" y="480" class="texto-mesa">17-55</text>
            <rect id="m18-56" class="mesa" x="325" y="310" width="45" height="180" onclick="abrirMesa('18-56')" /><text x="347" y="480" class="texto-mesa">18-56</text>
            <rect id="m19-57" class="mesa" x="385" y="310" width="45" height="180" onclick="abrirMesa('19-57')" /><text x="407" y="480" class="texto-mesa">19-57</text>

            <rect id="m14-52" class="mesa" x="265" y="510" width="45" height="200" onclick="abrirMesa('14-52')" /><text x="287" y="700" class="texto-mesa">14-52</text>
            <rect id="m15-53" class="mesa" x="325" y="510" width="45" height="200" onclick="abrirMesa('15-53')" /><text x="347" y="700" class="texto-mesa">15-53</text>
            <rect id="m16-54" class="mesa" x="385" y="510" width="45" height="200" onclick="abrirMesa('16-54')" /><text x="407" y="700" class="texto-mesa">16-54</text>
        </svg>
    </div>
</div>

<div id="infoPanel">
    <div class="panel-contenido">
        <h2 id="tituloMesa" style="color:#4CAF50; margin-top:0;">Mesa X</h2>
        
        <table class="tabla-lotes">
            <thead>
                <tr><th>Datos</th><th>Acción</th></tr>
            </thead>
            <tbody id="listaLotes"></tbody>
        </table>

        <div class="formulario-lote">
            <h3 id="formTitle" style="margin:0; color:#4CAF50; font-size:14px;">+ NUEVO REGISTRO</h3>
            <input type="hidden" id="editIndex" value="-1">
            
            <span class="label-form">Variedad / Referencia</span>
            <input type="text" id="f_ref" placeholder="Ej: ARANDANO">
            
            <span class="label-form">Lote</span>
            <input type="text" id="f_lote" placeholder="Nº Lote">
            
            <span class="label-form">Nº Bandejas</span>
            <input type="number" id="f_cant">
            
            <span class="label-form">Receta Sustrato</span>
            <button type="button" class="btn-receta" onclick="document.getElementById('f_sustrato').value='F8P16FC, 2AG, 0,75 TRIANUM'">TRIANUM</button>
            <input type="text" id="f_sustrato">
            
            <span class="label-form">Nº Caja Jiffy / Fecha</span>
            <input type="text" id="f_caja" placeholder="Caja">
            <input type="date" id="f_vivero">

            <button id="btnGuardar" class="btn btn-guardar" onclick="guardarLote()">REGISTRAR EN MESA</button>
            <button id="btnCancelarEdit" class="btn" style="background:#555; display:none;" onclick="resetFormulario()">CANCELAR EDICIÓN</button>
        </div>
        
        <button class="btn" style="background:#cc0000; margin-top:20px;" onclick="cerrarPanel()">CERRAR PANEL</button>
    </div>
</div>

<script>
    const GIST_ID = "dc4b1ac9b41655086c76352f03ccfafe";
    let db = JSON.parse(localStorage.getItem('cultigar_db')) || {};
    let mesaActual = null;

    function abrirMesa(id) {
        mesaActual = id.replace('m', '');
        document.getElementById('tituloMesa').innerText = "Mesa " + mesaActual;
        resetFormulario();
        renderLotes();
        document.getElementById('infoPanel').style.display = 'block';
    }

    function renderLotes() {
        let html = "";
        let lotes = db[mesaActual] || [];
        lotes.forEach((l, i) => {
            html += `<tr>
                <td><b>${l.ref}</b> - ${l.cant} b.<br><small>Lote: ${l.lote} | Caja: ${l.caja}</small></td>
                <td style="white-space:nowrap">
                    <button class="btn-mini" style="background:#2196F3" onclick="prepararEdicion(${i})">EDIT</button>
                    <button class="btn-mini" style="background:red" onclick="borrarLote(${i})">X</button>
                </td>
            </tr>`;
        });
        document.getElementById('listaLotes').innerHTML = html || "<tr><td colspan='2'>Mesa vacía</td></tr>";
    }

    function prepararEdicion(index) {
        let l = db[mesaActual][index];
        document.getElementById('editIndex').value = index;
        document.getElementById('f_ref').value = l.ref;
        document.getElementById('f_lote').value = l.lote;
        document.getElementById('f_cant').value = l.cant;
        document.getElementById('f_sustrato').value = l.sustrato;
        document.getElementById('f_caja').value = l.caja;
        document.getElementById('f_vivero').value = l.f_vivero;

        document.getElementById('formTitle').innerText = "📝 EDITANDO LOTE";
        document.getElementById('btnGuardar').innerText = "💾 ACTUALIZAR CAMBIOS";
        document.getElementById('btnGuardar').classList.add('btn-editar-mode');
        document.getElementById('btnCancelarEdit').style.display = 'block';
    }

    function resetFormulario() {
        document.getElementById('editIndex').value = "-1";
        document.querySelectorAll('.formulario-lote input:not([type=hidden])').forEach(i => i.value = "");
        document.getElementById('f_vivero').value = new Date().toISOString().split('T')[0];
        document.getElementById('formTitle').innerText = "+ NUEVO REGISTRO";
        document.getElementById('btnGuardar').innerText = "REGISTRAR EN MESA";
        document.getElementById('btnGuardar').classList.remove('btn-editar-mode');
        document.getElementById('btnCancelarEdit').style.display = 'none';
    }

    function guardarLote() {
        let idx = parseInt(document.getElementById('editIndex').value);
        let nuevo = {
            ref: document.getElementById('f_ref').value.toUpperCase(),
            lote: document.getElementById('f_lote').value.toUpperCase(),
            cant: document.getElementById('f_cant').value,
            sustrato: document.getElementById('f_sustrato').value,
            caja: document.getElementById('f_caja').value,
            f_vivero: document.getElementById('f_vivero').value
        };
        if(!nuevo.ref) return alert("Escribe la variedad");
        if(!db[mesaActual]) db[mesaActual] = [];
        
        if(idx > -1) db[mesaActual][idx] = nuevo;
        else db[mesaActual].push(nuevo);

        localStorage.setItem('cultigar_db', JSON.stringify(db));
        renderLotes();
        resetFormulario();
        actualizarMapa();
        subirANube();
    }

    function borrarLote(i) {
        if(confirm("¿Borrar este lote?")) {
            db[mesaActual].splice(i, 1);
            if(db[mesaActual].length === 0) delete db[mesaActual];
            localStorage.setItem('cultigar_db', JSON.stringify(db));
            renderLotes();
            actualizarMapa();
            subirANube();
        }
    }

    function buscar() {
        let bus = document.getElementById('inputBusqueda').value.toUpperCase();
        document.querySelectorAll('.mesa').forEach(m => m.classList.remove('resaltado'));
        if(!bus) return;
        for(let mesa in db) {
            if(db[mesa].some(l => l.ref.includes(bus) || l.lote.includes(bus))) {
                document.getElementById('m'+mesa).classList.add('resaltado');
            }
        }
    }

    function actualizarMapa() {
        let stock = {}; let total = 0;
        document.querySelectorAll('.mesa').forEach(m => {
            let id = m.id.replace('m', '');
            if(db[id]) {
                m.classList.add('ocupada');
                db[id].forEach(l => {
                    stock[l.ref] = (stock[l.ref] || 0) + parseInt(l.cant || 0);
                    total += parseInt(l.cant || 0);
                });
            } else { m.classList.remove('ocupada'); }
        });
        let html = `<div class="stock-item" style="background:#4CAF50; color:white">TOTAL: ${total} b.</div>`;
        for(let v in stock) html += `<div class="stock-item">${v}: ${stock[v]}</div>`;
        document.getElementById('resumenStock').innerHTML = html;
    }

    async function subirANube() {
        const token = localStorage.getItem('github_token');
        if(!token) return;
        try {
            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({ files: { "cultigar_db.json": { content: JSON.stringify(db) } } })
            });
        } catch(e) {}
    }

    async function cargarDeNube() {
        try {
            const r = await fetch(`https://api.github.com/gists/${GIST_ID}?cb=${Date.now()}`);
            const j = await r.json();
            db = JSON.parse(j.files["cultigar_db.json"].content);
            localStorage.setItem('cultigar_db', JSON.stringify(db));
            actualizarMapa();
        } catch(e) {}
    }

    function cerrarPanel() { document.getElementById('infoPanel').style.display = 'none'; }
    
    cargarDeNube();
</script>
</body>
</html>
