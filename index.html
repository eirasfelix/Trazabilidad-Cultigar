<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CULTIGAR - SISTEMA INTEGRAL PRO</title>
    <style>
        :root {
            --bg-dark: #2c3e50;
            --verde-cultigar: #27ae60;
            --rojo-fito: #c0392b;
            --naranja-fito: #e67e22;
            --azul-log: #2980b9;
            --purpura: #af7ac5;
            --blanco: #ffffff;
            --neon-ready: #39FF14;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-dark); 
            margin: 0; 
            color: white;
            padding-bottom: 50px;
        }

        .header-sticky {
            position: sticky;
            top: 0;
            background: white;
            padding: 10px;
            z-index: 1000;
            display: flex;
            gap: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            align-items: center;
        }

        .input-busqueda {
            flex-grow: 1;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #ddd;
            font-size: 16px;
            color: #333;
        }

        .btn-alerta-principal {
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            color: white;
            min-width: 120px;
            transition: 0.3s;
            background: #7f8c8d;
        }
        .urgencia-alta { background: var(--rojo-fito) !important; animation: parpadeo 1.5s infinite; }
        .urgencia-media { background: var(--naranja-fito) !important; }
        @keyframes parpadeo { 0% {opacity: 1;} 50% {opacity: 0.6;} 100% {opacity: 1;} }

        .btn-nube {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }

        /* --- ESTILO BOTÓN HISTORIAL --- */
        .btn-historial {
            background: var(--purpura);
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            font-size: 18px;
        }

        .seccion-mapa {
            background: #eee;
            margin: 20px auto;
            padding: 15px;
            width: 500px;
            border-radius: 10px;
            border: 3px solid #000;
        }

        .titulo-mapa {
            text-align: center;
            padding: 10px;
            margin: 0;
            font-weight: bold;
            text-transform: uppercase;
        }

        svg {
            display: block;
            margin: auto;
            background: white;
        }

        .mesa, .carro {
            fill: white;
            stroke: #333;
            stroke-width: 1.5;
            cursor: pointer;
            transition: all 0.2s;
        }

        .carro { stroke-dasharray: 4; }

        .mesa:hover, .carro:hover {
            stroke: #000;
            stroke-width: 3;
        }

        .texto-id {
            font-size: 10px;
            font-weight: bold;
            fill: black;
            pointer-events: none;
            text-anchor: middle;
        }

        .ocupada { fill: #a9dfbf !important; }
        .rejuntado { fill: var(--azul-log) !important; }
        .resaltado { fill: #f39c12 !important; stroke: #d35400; stroke-width: 4; }
        .listo-salida { fill: var(--neon-ready) !important; }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            max-width: 500px;
            height: 90%;
            background: #1a1a1a;
            border: 4px solid #444;
            border-radius: 15px;
            display: none;
            z-index: 2000;
            padding: 20px;
            overflow-y: auto;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            z-index: 1500;
        }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; color: #aaa; margin-bottom: 3px; text-transform: uppercase; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #222;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 12px; }
        th { border-bottom: 2px solid var(--verde-cultigar); padding: 8px; text-align: left; color: var(--verde-cultigar); }
        td { padding: 8px; border-bottom: 1px solid #333; }

        .btn-guardar { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; font-size: 16px; margin-bottom: 5px; }
        .btn-cerrar { background: #555; margin-top: 10px; }
        .btn-accion { padding: 5px; cursor: pointer; border: none; border-radius: 3px; background: #444; color: white; }

        .flex-row { display: flex; gap: 10px; }
        .flex-row .form-group { flex: 1; }
        
        .badge-dias { padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; }

        /* --- ESTILOS ITEMS HISTORIAL --- */
        .item-historial {
            background: #222;
            padding: 10px;
            margin-bottom: 8px;
            border-left: 5px solid var(--purpura);
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="header-sticky">
    <input type="text" id="buscador" class="input-busqueda" placeholder="🔍 Buscar Variedad..." onkeyup="ejecutarBusqueda()">
    <button id="btnAlerta" class="btn-alerta-principal" onclick="abrirAvisosGlobal()">📅 SIN DATOS</button>
    <button class="btn-historial" onclick="abrirHistorial()">📜</button>
    <button class="btn-nube" style="background: #27ae60;" onclick="subirDatos()">⬆</button>
    <button class="btn-nube" style="background: #2980b9;" onclick="bajarDatos()">⬇</button>
</div>

<div class="seccion-mapa">
    <h3 class="titulo-mapa" style="color: var(--verde-cultigar);">Mapa 1: Trazabilidad</h3>
    <svg width="480" height="780" id="svg-trazabilidad"></svg>
</div>

<div class="seccion-mapa">
    <h3 class="titulo-mapa" style="color: var(--azul-log);">Mapa 2: Logística y Fitos</h3>
    <svg width="480" height="880" id="svg-fito"></svg>
</div>

<div class="overlay" id="overlay" onclick="cerrarModales()"></div>

<div id="modalMesa" class="modal">
    <h2 id="mesaTitulo" style="color: var(--verde-cultigar); font-size: 18px;">Mesa --</h2>
    <div id="zonaPegarTraza"></div>
    <table>
        <thead><tr><th>Ref</th><th>Lote</th><th>Bnd</th><th>Acción</th></tr></thead>
        <tbody id="tablaCuerpoMesa"></tbody>
    </table>
    <div class="form-group"><label>Variedad</label><input type="text" id="f_ref"></div>
    <div class="form-group"><label>Lote</label><input type="text" id="f_lote"></div>
    <div class="flex-row">
        <div class="form-group"><label>Nº Bnd</label><input type="number" id="f_num_bandejas"></div>
        <div class="form-group"><label>Tipo</label><input type="text" id="f_tipo_bandeja" list="op_bnd"><datalist id="op_bnd"><option value="40"><option value="60"><option value="84"></datalist></div>
    </div>
    <div style="display:flex; gap:5px;">
        <button id="btnGuardarTraza" class="btn-guardar" style="background: var(--verde-cultigar); flex:2;" onclick="guardarRegistroTrazabilidad()">💾 GUARDAR</button>
        <button id="btnRejuntarTraza" class="btn-guardar" style="background: #555; flex:1;" onclick="toggleRejuntarTraza()">⬜ REJUNTAR</button>
    </div>
    <button class="btn-guardar btn-cerrar" onclick="cerrarModales()">CERRAR</button>
</div>

<div id="modalFito" class="modal">
    <div id="tabsFito" style="display:flex; gap:5px; margin-bottom:15px;">
        <button id="btLog" class="btn-guardar" style="background:#2980b9; flex:1; padding:10px;" onclick="switchTab('log')">📦 LOGÍSTICA</button>
        <button id="btFit" class="btn-guardar" style="background:#555; flex:1; padding:10px;" onclick="switchTab('fit')">🛡️ FITOS</button>
    </div>
    <div id="panelLog">
        <h2 id="logTitulo" style="color: #2980b9; font-size: 18px;">Logística</h2>
        <div id="zonaPegarLog"></div>
        <table><thead><tr><th>Cliente</th><th>Bnd</th><th>Lote</th><th>Acción</th></tr></thead><tbody id="logCuerpoMesa"></tbody></table>
        <div class="form-group"><label>Cliente / Variedad</label><input type="text" id="l_cli"></div>
        <div class="form-group"><label>Bandejas</label><input type="number" id="l_bnd"></div>
        <div class="form-group"><label>Lote</label><input type="text" id="l_lot"></div>
        <button id="btnGuardarLog" class="btn-guardar" style="background:#2980b9;" onclick="guardarLog()">💾 AÑADIR PEDIDO</button>
    </div>
    <div id="panelFit" style="display:none;">
        <h2 style="color: var(--rojo-fito); font-size: 18px;">🛡️ Nuevo Tratamiento</h2>
        <div class="flex-row">
            <div class="form-group"><label>Nombre Comercial</label><input type="text" id="fi_nomcom"></div>
            <div class="form-group"><label>Nº Registro</label><input type="text" id="fi_nreg"></div>
        </div>
        <div class="form-group"><label>Tipo de Plaga</label><input type="text" id="fi_plaga"></div>
        <div class="flex-row">
            <div class="form-group"><label>Aplicador</label><input type="text" id="fi_aplicador"></div>
            <div class="form-group"><label>Equipo</label><input type="text" id="fi_equipo"></div>
        </div>
        <div class="flex-row">
            <div class="form-group"><label>Dosis</label><input type="text" id="fi_dosis"></div>
            <div class="form-group"><label>m²</label><input type="number" id="fi_m2"></div>
        </div>
        <div class="flex-row">
            <div class="form-group"><label>Plazo Seguridad</label><input type="number" id="fi_plazo"></div>
            <div class="form-group"><label>Color Manual</label>
                <select id="fi_color_manual">
                    <option value="AUTO">Automático</option>
                    <option value="RED">Rojo</option>
                    <option value="ORANGE">Naranja</option>
                    <option value="GREEN">Verde</option>
                </select>
            </div>
        </div>
        <button id="btnGuardarFito" class="btn-guardar" style="background:var(--rojo-fito);" onclick="guardarFitoPro()">🛡️ REGISTRAR</button>
        <table style="margin-top:20px;">
            <thead><tr><th>Fecha</th><th>Producto</th><th>Vence</th><th>Acción</th></tr></thead>
            <tbody id="fitoCuerpoMesaPro"></tbody>
        </table>
    </div>
    <button class="btn-guardar btn-cerrar" onclick="cerrarModales()">CERRAR</button>
</div>

<div id="modalHistorial" class="modal">
    <h2 style="color: var(--purpura);">📜 Historial de Ventas Realizadas</h2>
    <div style="background: #222; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
        <h3 style="font-size: 14px; margin-top: 0;">Registrar Nueva Venta Manual</h3>
        <div class="form-group"><label>Cliente</label><input type="text" id="h_cli"></div>
        <div class="form-group"><label>Variedad</label><input type="text" id="h_var"></div>
        <div class="form-group"><label>Cantidad (Bnd)</label><input type="number" id="h_cant"></div>
        <button class="btn-guardar" style="background: var(--verde-cultigar);" onclick="guardarHistorialVenta()">💾 REGISTRAR VENTA</button>
    </div>
    <div id="cuerpoHistorial"></div>
    <button class="btn-guardar btn-cerrar" onclick="cerrarModales()">CERRAR</button>
</div>

<div id="modalAvisos" class="modal">
    <h2 style="color: var(--purpura); font-size: 18px;">📅 Próximos Pedidos</h2>
    <div id="panelListaAvisos">
        <table>
            <thead><tr><th>Días</th><th>Cliente</th><th>Variedad</th><th>Cant.</th><th>Fecha</th><th>Mapa</th></tr></thead>
            <tbody id="cuerpoAvisosGlobal"></tbody>
        </table>
        <button class="btn-guardar" style="background: var(--azul-log);" onclick="mostrarImportador()">📝 EDITAR LISTA</button>
    </div>
    <div id="panelImportador" style="display:none;">
        <textarea id="txtImportar" rows="10" style="width:100%; background:#222; color:white;"></textarea>
        <button class="btn-guardar" style="background: var(--verde-cultigar);" onclick="procesarImportacion()">✅ GUARDAR LISTA</button>
        <button class="btn-guardar" style="background: #555;" onclick="ocultarImportador()">VOLVER</button>
    </div>
    <button class="btn-guardar btn-cerrar" onclick="cerrarModales()">CERRAR</button>
</div>

<script>
    const GIST_ID = "dc4b1ac9b41655086c76352f03ccfafe";
    let DB_TRAZA = JSON.parse(localStorage.getItem('culti_traza')) || {};
    let DB_FITO = JSON.parse(localStorage.getItem('culti_fito')) || {};
    let DB_PEDIDOS = JSON.parse(localStorage.getItem('culti_pedidos')) || [];
    // NUEVA DB HISTORIAL
    let DB_HISTORIAL = JSON.parse(localStorage.getItem('culti_historial')) || [];

    let mesaSeleccionada = "";
    let indexEdicion = null;
    let indexFitoEdicion = null;
    let portapapeles = null;

    // --- GEOMETRIA SAGRADA (SIN TOCAR) ---
    const GEOMETRIA = [
        {id:'10-48', x:10, y:70, w:40, h:140}, {id:'11-49', x:55, y:70, w:40, h:140},
        {id:'12-50', x:105, y:70, w:40, h:140}, {id:'13-51', x:150, y:70, w:40, h:140},
        {id:'7-45', x:15, y:220, w:40, h:65}, {id:'8-46', x:65, y:220, w:45, h:90},
        {id:'9-47', x:135, y:220, w:38, h:90}, {id:'4-42', x:10, y:325, w:45, h:200},
        {id:'5-43', x:65, y:325, w:45, h:200}, {id:'6-44', x:125, y:325, w:45, h:200},
        {id:'1-39', x:10, y:540, w:45, h:210}, {id:'2-40', x:65, y:540, w:45, h:210},
        {id:'3-41', x:125, y:580, w:45, h:170},
        {id:'22-63', x:210, y:70, w:38, h:75}, {id:'23-64', x:255, y:70, w:38, h:75},
        {id:'24-65', x:300, y:70, w:38, h:75}, {id:'22-60', x:210, y:155, w:38, h:100},
        {id:'23-61', x:255, y:155, w:38, h:100}, {id:'24-62', x:300, y:155, w:38, h:100},
        {id:'18-56', x:215, y:360, w:35, h:110}, {id:'19-57', x:255, y:325, w:38, h:200},
        {id:'20-58', x:300, y:325, w:38, h:200}, {id:'21-59', x:345, y:325, w:38, h:200},
        {id:'14-52', x:210, y:540, w:38, h:145}, {id:'15-53', x:255, y:540, w:38, h:145},
        {id:'16-54', x:300, y:540, w:38, h:145}, {id:'17-55', x:345, y:540, w:38, h:145}
    ];

    function inicializarMapas() {
        let trazHtml = "", fitoHtml = "";
        GEOMETRIA.forEach(m => {
            trazHtml += `<rect id="t-${m.id}" class="mesa" x="${m.x}" y="${m.y}" width="${m.w}" height="${m.h}" onclick="abrirTraza('${m.id}')"></rect><text x="${m.x + m.w/2}" y="${m.y + m.h - 5}" class="texto-id">${m.id}</text>`;
            fitoHtml += `<rect id="f-${m.id}" class="mesa" x="${m.x}" y="${m.y}" width="${m.w}" height="${m.h}" onclick="abrirFito('${m.id}')"></rect><text x="${m.x + m.w/2}" y="${m.y + m.h - 5}" class="texto-id">${m.id}</text>`;
        });
        for(let i=1; i<=14; i++) {
            let yPos = 70 + (14-i) * 46;
            trazHtml += `<rect id="t-${i}" class="mesa" x="395" y="${yPos}" width="75" height="38" onclick="abrirTraza('${i}')"></rect><text x="432" y="${yPos + 22}" class="texto-id">${i}</text>`;
            fitoHtml += `<rect id="f-${i}" class="mesa" x="395" y="${yPos}" width="75" height="38" onclick="abrirFito('${i}')"></rect><text x="432" y="${yPos + 22}" class="texto-id">${i}</text>`;
        }
        const mesasCarro = ['14-52', '15-53', '16-54', '17-55'];
        mesasCarro.forEach((id, idx) => {
            let m = GEOMETRIA.find(g => g.id === id);
            fitoHtml += `<rect id="f-C${idx+1}" class="carro" x="${m.x}" y="${m.y + m.h + 20}" width="${m.w}" height="60" onclick="abrirFito('C${idx+1}')"></rect>
                         <text x="${m.x + m.w/2}" y="${m.y + m.h + 55}" class="texto-id">🛒 C${idx+1}</text>`;
        });
        document.getElementById('svg-trazabilidad').innerHTML = trazHtml;
        document.getElementById('svg-fito').innerHTML = fitoHtml;
        actualizarColoresMapas();
        actualizarBotonAlerta();
    }

    // --- NUEVAS FUNCIONES HISTORIAL ---
    function abrirHistorial() {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modalHistorial').style.display = 'block';
        pintarHistorial();
    }

    function guardarHistorialVenta() {
        const cli = document.getElementById('h_cli').value;
        const vari = document.getElementById('h_var').value;
        const cant = document.getElementById('h_cant').value;
        if(!cli || !vari) return;

        DB_HISTORIAL.push({ cli: cli.toUpperCase(), var: vari.toUpperCase(), cant: cant, fecha: new Date().toLocaleString() });
        localStorage.setItem('culti_historial', JSON.stringify(DB_HISTORIAL));
        document.getElementById('h_cli').value = ""; document.getElementById('h_var').value = ""; document.getElementById('h_cant').value = "";
        pintarHistorial();
        subirDatos();
    }

    function pintarHistorial() {
        let html = "";
        [...DB_HISTORIAL].reverse().forEach(v => {
            html += `<div class="item-historial">
                        <strong>${v.cli}</strong> - ${v.var} (${v.cant} bnd.)<br>
                        <small style="color:#888;">${v.fecha}</small>
                     </div>`;
        });
        document.getElementById('cuerpoHistorial').innerHTML = html || "<p style='text-align:center;'>Historial vacío</p>";
    }

    // --- EL RESTO DE TUS FUNCIONES (SIN TOCAR) ---
    function abrirTraza(id) { mesaSeleccionada = id; indexEdicion = null; mostrarTablaTraza(); document.getElementById('overlay').style.display = 'block'; document.getElementById('modalMesa').style.display = 'block'; }
    function mostrarTablaTraza() {
        let html = ""; let mesa = DB_TRAZA[mesaSeleccionada] || { items: [], rej: false };
        let datos = Array.isArray(mesa) ? mesa : (mesa.items || []);
        datos.forEach((r, i) => { html += `<tr><td>${r.ref}</td><td>${r.lote}</td><td>${r.num_bandejas}</td><td style="display:flex; gap:3px;"><button class="btn-accion" onclick="editarTraza(${i})">✏️</button><button class="btn-accion" onclick="borrarTraza(${i})">🗑️</button></td></tr>`; });
        document.getElementById('mesaTitulo').innerText = "Mesa " + mesaSeleccionada;
        document.getElementById('tablaCuerpoMesa').innerHTML = html || "<tr><td colspan='4'>Mesa vacía</td></tr>";
    }
    function guardarRegistroTrazabilidad() {
        if(!DB_TRAZA[mesaSeleccionada]) DB_TRAZA[mesaSeleccionada] = { items: [], rej: false };
        let nuevo = { ref: document.getElementById('f_ref').value.toUpperCase(), lote: document.getElementById('f_lote').value, num_bandejas: document.getElementById('f_num_bandejas').value };
        DB_TRAZA[mesaSeleccionada].items.push(nuevo);
        persistir(); mostrarTablaTraza(); actualizarColoresMapas(); cerrarModales();
    }
    function persistir() {
        localStorage.setItem('culti_traza', JSON.stringify(DB_TRAZA));
        localStorage.setItem('culti_fito', JSON.stringify(DB_FITO));
        localStorage.setItem('culti_pedidos', JSON.stringify(DB_PEDIDOS));
        subirDatos();
    }
    function cerrarModales() {
        document.getElementById('overlay').style.display = 'none';
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    }
    function actualizarColoresMapas() {
        document.querySelectorAll('#svg-trazabilidad .mesa').forEach(r => {
            let id = r.id.replace('t-', ''); let d = DB_TRAZA[id];
            r.classList.remove('ocupada', 'rejuntado');
            if(d && (Array.isArray(d) ? d.length : d.items?.length > 0)) r.classList.add(d.rej ? 'rejuntado' : 'ocupada');
        });
    }
    function ejecutarBusqueda() {
        let b = document.getElementById('buscador').value.toUpperCase();
        document.querySelectorAll('.mesa').forEach(m => m.classList.remove('resaltado'));
        if(!b) return;
        for(let m in DB_TRAZA) {
            let items = Array.isArray(DB_TRAZA[m]) ? DB_TRAZA[m] : DB_TRAZA[m].items;
            if(items?.some(r => r.ref.includes(b))) document.getElementById('t-'+m)?.classList.add('resaltado');
        }
    }
    async function subirDatos() {
        const token = localStorage.getItem('github_token'); if(!token) return;
        try {
            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({ files: { 
                    "cultigar_db.json": { content: JSON.stringify(DB_TRAZA) },
                    "cultigar_fito.json": { content: JSON.stringify(DB_FITO) },
                    "cultigar_pedidos.json": { content: JSON.stringify(DB_PEDIDOS) },
                    "cultigar_historial.json": { content: JSON.stringify(DB_HISTORIAL) }
                }})
            });
        } catch(e) {}
    }
    async function bajarDatos() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}?cb=${Date.now()}`);
            const data = await res.json();
            if(data.files["cultigar_db.json"]) DB_TRAZA = JSON.parse(data.files["cultigar_db.json"].content);
            if(data.files["cultigar_historial.json"]) DB_HISTORIAL = JSON.parse(data.files["cultigar_historial.json"].content);
            actualizarColoresMapas();
        } catch(e) {}
    }

    window.onload = () => { inicializarMapas(); bajarDatos(); };
</script>
</body>
</html>
