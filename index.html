<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CULTIGAR - SISTEMA INTEGRAL PRO</title>
    <style>
        :root {
            --bg-dark: #2c3e50;
            --verde-cultigar: #27ae60;
            --rojo-fito: #c0392b;
            --blanco: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-dark); 
            margin: 0; 
            color: white;
            padding-bottom: 50px;
        }

        .header-sticky {
            position: sticky;
            top: 0;
            background: white;
            padding: 10px;
            z-index: 1000;
            display: flex;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .input-busqueda {
            flex-grow: 1;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #ddd;
            font-size: 16px;
        }

        .btn-nube {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }

        /* Contenedores de Mapas */
        .seccion-mapa {
            background: #eee;
            margin: 20px auto;
            padding: 15px;
            width: 500px;
            border-radius: 10px;
            border: 3px solid #000;
        }

        .titulo-mapa {
            text-align: center;
            padding: 10px;
            margin: 0;
            font-weight: bold;
            text-transform: uppercase;
        }

        svg {
            display: block;
            margin: auto;
            background: white;
        }

        /* Estilos de Mesas */
        .mesa {
            fill: white;
            stroke: #333;
            stroke-width: 1.5;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mesa:hover {
            stroke: #000;
            stroke-width: 3;
        }

        .texto-id {
            font-size: 10px;
            font-weight: bold;
            fill: black;
            pointer-events: none;
            text-anchor: middle;
        }

        /* Estados Visuales */
        .ocupada { fill: #a9dfbf !important; } /* Verde suave */
        .resaltado { fill: #f39c12 !important; stroke: #d35400; stroke-width: 4; }
        
        .fito-blanco { fill: #ffffff !important; }
        .fito-amarillo { fill: #f1c40f !important; }
        .fito-naranja { fill: #e67e22 !important; }
        .fito-rojo { fill: #e74c3c !important; }
        .fito-verde { fill: #2ecc71 !important; }

        /* Paneles Modales */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 450px;
            height: 80%;
            background: #1a1a1a;
            border: 4px solid #444;
            border-radius: 15px;
            display: none;
            z-index: 2000;
            padding: 20px;
            overflow-y: auto;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            z-index: 1500;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
            box-sizing: border-box;
        }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 13px; }
        th { border-bottom: 2px solid var(--verde-cultigar); padding: 8px; text-align: left; color: var(--verde-cultigar); }
        td { padding: 8px; border-bottom: 1px solid #333; }

        .btn-guardar { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; font-size: 16px; }
        .btn-cerrar { background: #555; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header-sticky">
    <input type="text" id="buscador" class="input-busqueda" placeholder="🔍 Buscar Variedad..." onkeyup="ejecutarBusqueda()">
    <button class="btn-nube" style="background: #27ae60;" onclick="subirDatos()">⬆</button>
    <button class="btn-nube" style="background: #2980b9;" onclick="bajarDatos()">⬇</button>
</div>

<div class="seccion-mapa">
    <h3 class="titulo-mapa" style="color: var(--verde-cultigar);">Mapa 1: Trazabilidad</h3>
    <svg width="480" height="780" id="svg-trazabilidad"></svg>
</div>

<div class="seccion-mapa">
    <h3 class="titulo-mapa" style="color: var(--rojo-fito);">Mapa 2: Fitosonitarios</h3>
    <svg width="480" height="780" id="svg-fito"></svg>
</div>

<div class="overlay" id="overlay" onclick="cerrarModales()"></div>

<div id="modalMesa" class="modal">
    <h2 id="mesaTitulo" style="color: var(--verde-cultigar);">Mesa --</h2>
    <table>
        <thead><tr><th>Ref</th><th>Lote</th><th>Fecha</th><th>Acción</th></tr></thead>
        <tbody id="tablaCuerpoMesa"></tbody>
    </table>
    <div class="form-group">
        <label>Variedad / Referencia</label>
        <input type="text" id="f_ref">
    </div>
    <div class="form-group">
        <label>Lote</label>
        <input type="text" id="f_lote">
    </div>
    <div class="form-group">
        <label>Sustrato / Receta</label>
        <input type="text" id="f_sus">
    </div>
    <div class="form-group">
        <label>Fecha Inicio</label>
        <input type="date" id="f_fecha">
    </div>
    <button class="btn-guardar" style="background: var(--verde-cultigar);" onclick="guardarRegistroTrazabilidad()">💾 AÑADIR REGISTRO</button>
    <button class="btn-guardar btn-cerrar" onclick="cerrarModales()">CERRAR</button>
</div>

<div id="modalFito" class="modal">
    <h2 id="fitoTitulo" style="color: var(--rojo-fito);">Fito --</h2>
    <table id="tablaHistorialFito">
        <thead><tr><th>Producto</th><th>Estado</th><th>Fecha</th></tr></thead>
        <tbody id="fitoCuerpoMesa"></tbody>
    </table>
    <div class="form-group">
        <label>Producto Aplicado</label>
        <input type="text" id="fi_prod">
    </div>
    <div class="form-group">
        <label>Estado / Semáforo</label>
        <select id="fi_estado">
            <option value="blanco">⚪ Blanco (Sin tratar)</option>
            <option value="amarillo">🟡 Amarillo (Tratado)</option>
            <option value="naranja">🟠 Naranja (Plazo de seguridad)</option>
            <option value="rojo">🔴 Rojo (¡ENTRADA PROHIBIDA!)</option>
            <option value="verde">🟢 Verde (Apto para envío)</option>
        </select>
    </div>
    <div class="form-group">
        <label>Fecha de Aplicación</label>
        <input type="date" id="fi_fecha">
    </div>
    <button class="btn-guardar" style="background: var(--rojo-fito);" onclick="guardarRegistroFito()">💾 REGISTRAR TRATAMIENTO</button>
    <button class="btn-guardar btn-cerrar" onclick="cerrarModales()">CERRAR</button>
</div>

<script>
    const GIST_ID = "dc4b1ac9b41655086c76352f03ccfafe";
    let DB_TRAZA = JSON.parse(localStorage.getItem('culti_traza')) || {};
    let DB_FITO = JSON.parse(localStorage.getItem('culti_fito')) || {};
    let mesaSeleccionada = "";

    // CONFIGURACIÓN DE MESAS SEGÚN CAPTURAS
    const GEOMETRIA = [
        // Bloque Izquierdo
        {id:'10-48', x:10, y:70, w:40, h:140}, {id:'11-49', x:55, y:70, w:40, h:140},
        {id:'12-50', x:105, y:70, w:40, h:140}, {id:'13-51', x:150, y:70, w:40, h:140},
        {id:'7-45', x:15, y:220, w:40, h:65}, {id:'8-46', x:65, y:220, w:45, h:90},
        {id:'9-47', x:135, y:220, w:38, h:90}, {id:'4-42', x:10, y:325, w:45, h:200},
        {id:'5-43', x:65, y:325, w:45, h:200}, {id:'6-44', x:125, y:325, w:45, h:200},
        {id:'1-39', x:10, y:540, w:45, h:210}, {id:'2-40', x:65, y:540, w:45, h:210},
        {id:'3-41', x:125, y:580, w:45, h:170},
        // Bloque Central
        {id:'22-63', x:210, y:70, w:38, h:75}, {id:'23-64', x:255, y:70, w:38, h:75},
        {id:'24-65', x:300, y:70, w:38, h:75}, {id:'22-60', x:210, y:155, w:38, h:100},
        {id:'23-61', x:255, y:155, w:38, h:100}, {id:'24-62', x:300, y:155, w:38, h:100},
        {id:'18-56', x:215, y:360, w:35, h:110}, {id:'19-57', x:255, y:325, w:38, h:200},
        {id:'20-58', x:300, y:325, w:38, h:200}, {id:'21-59', x:345, y:325, w:38, h:200},
        {id:'14-52', x:210, y:540, w:38, h:145}, {id:'15-53', x:255, y:540, w:38, h:145},
        {id:'16-54', x:300, y:540, w:38, h:145}, {id:'17-55', x:345, y:540, w:38, h:145}
    ];

    function inicializarMapas() {
        let trazHtml = "", fitoHtml = "";
        
        // 1. Dibujar Mesas
        GEOMETRIA.forEach(m => {
            trazHtml += `<rect id="t-${m.id}" class="mesa" x="${m.x}" y="${m.y}" width="${m.w}" height="${m.h}" onclick="abrirTraza('${m.id}')"></rect>
                         <text x="${m.x + m.w/2}" y="${m.y + m.h - 5}" class="texto-id">${m.id}</text>`;
            fitoHtml += `<rect id="f-${m.id}" class="mesa" x="${m.x}" y="${m.y}" width="${m.w}" height="${m.h}" onclick="abrirFito('${m.id}')"></rect>
                         <text x="${m.x + m.w/2}" y="${m.y + m.h - 5}" class="texto-id">${m.id}</text>`;
        });

     // 2. Dibujar Túneles (1 al 14) - CORREGIDO ID PARA DATOS ANTIGUOS
        for(let i=1; i<=14; i++) {
            let yPos = 70 + (14-i) * 46;
            trazHtml += `<rect id="t-${i}" class="mesa" x="395" y="${yPos}" width="75" height="38" onclick="abrirTraza('${i}')"></rect>
                         <text x="432" y="${yPos + 22}" class="texto-id">${i}</text>`;
            fitoHtml += `<rect id="f-${i}" class="mesa" x="395" y="${yPos}" width="75" height="38" onclick="abrirFito('${i}')"></rect>
                         <text x="432" y="${yPos + 22}" class="texto-id">${i}</text>`;
        }

        document.getElementById('svg-trazabilidad').innerHTML = trazHtml;
        document.getElementById('svg-fito').innerHTML = fitoHtml;
        actualizarColoresMapas();
    }

    // --- FUNCIONES DE APERTURA ---
    function abrirTraza(id) {
        mesaSeleccionada = id;
        document.getElementById('mesaTitulo').innerText = "Mesa " + id;
        document.getElementById('f_fecha').value = new Date().toISOString().split('T')[0];
        mostrarTablaTraza();
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modalMesa').style.display = 'block';
    }

    function abrirFito(id) {
        mesaSeleccionada = id;
        document.getElementById('fitoTitulo').innerText = "Tratamientos Mesa " + id;
        document.getElementById('fi_fecha').value = new Date().toISOString().split('T')[0];
        mostrarTablaFito();
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modalFito').style.display = 'block';
    }

    // --- GESTIÓN DE DATOS ---
    function guardarRegistroTrazabilidad() {
        if(!DB_TRAZA[mesaSeleccionada]) DB_TRAZA[mesaSeleccionada] = [];
        DB_TRAZA[mesaSeleccionada].push({
            ref: document.getElementById('f_ref').value.toUpperCase(),
            lote: document.getElementById('f_lote').value,
            sus: document.getElementById('f_sus').value,
            fec: document.getElementById('f_fecha').value
        });
        persistir();
        mostrarTablaTraza();
        actualizarColoresMapas();
    }

    function guardarRegistroFito() {
        if(!DB_FITO[mesaSeleccionada]) DB_FITO[mesaSeleccionada] = [];
        DB_FITO[mesaSeleccionada].push({
            p: document.getElementById('fi_prod').value.toUpperCase(),
            e: document.getElementById('fi_estado').value,
            f: document.getElementById('fi_fecha').value
        });
        persistir();
        mostrarTablaFito();
        actualizarColoresMapas();
    }

function mostrarTablaTraza() {
        let html = "";
        let datos = DB_TRAZA[mesaSeleccionada] || [];
        datos.forEach((r, i) => {
            let fechaLimpia = (r.fec && r.fec !== "undefined") ? r.fec : ""; 
            html += `<tr>
                <td>${r.ref}</td>
                <td>${r.lote}</td>
                <td>${fechaLimpia}</td>
                <td style="display:flex; gap:5px;">
                    <button onclick="editarPlanta(${i})" title="Editar">✏️</button>
                    <button onclick="copiarPlanta(${i})" title="Mover">📦</button>
                    <button onclick="borrarTraza(${i})" title="Borrar">🗑️</button>
                </td>
            </tr>`;
        });
        document.getElementById('tablaCuerpoMesa').innerHTML = html || "<tr><td colspan='4' style='text-align:center; padding:10px;'>Mesa vacía</td></tr>";
        actualizarBotonPegar();
    }

    function mostrarTablaFito() {
        let html = "";
        (DB_FITO[mesaSeleccionada] || []).forEach(r => {
            html += `<tr><td>${r.p}</td><td>${r.e.toUpperCase()}</td><td>${r.f}</td></tr>`;
        });
        document.getElementById('fitoCuerpoMesa').innerHTML = html;
    }

    function borrarTraza(index) {
        if(confirm("⚠️ ¿Estás seguro de que quieres BORRAR este lote?")) {
            DB_TRAZA[mesaSeleccionada].splice(index, 1);
            persistir();
            mostrarTablaTraza();
            actualizarColoresMapas();
        }
    }

    function editarPlanta(index) {
        let registro = DB_TRAZA[mesaSeleccionada][index];
        document.getElementById('f_ref').value = registro.ref;
        document.getElementById('f_lote').value = registro.lote;
        document.getElementById('f_sus').value = registro.sus || "";
        document.getElementById('f_fecha').value = registro.fec;
        DB_TRAZA[mesaSeleccionada].splice(index, 1);
        mostrarTablaTraza();
        alert("📝 Datos cargados arriba. Modifícalos y pulsa 'AÑADIR REGISTRO' para terminar.");
    }

    function persistir() {
        localStorage.setItem('culti_traza', JSON.stringify(DB_TRAZA));
        localStorage.setItem('culti_fito', JSON.stringify(DB_FITO));
        subirDatos();
    }

    function actualizarColoresMapas() {
        document.querySelectorAll('#svg-trazabilidad .mesa').forEach(rect => {
            let id = rect.id.replace('t-', '');
            if(DB_TRAZA[id] && DB_TRAZA[id].length > 0) rect.classList.add('ocupada');
            else rect.classList.remove('ocupada');
        });
        document.querySelectorAll('#svg-fito .mesa').forEach(rect => {
            let id = rect.id.replace('f-', '');
            rect.setAttribute('class', 'mesa'); 
            if(DB_FITO[id] && DB_FITO[id].length > 0) {
                let ultimoEstado = DB_FITO[id][DB_FITO[id].length - 1].e;
                rect.classList.add('fito-' + ultimoEstado);
            }
        });
    }

    async function subirDatos() {
        const token = localStorage.getItem('github_token');
        if(!token) return;
        try {
            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({ files: { 
                    "cultigar_db.json": { content: JSON.stringify(DB_TRAZA) },
                    "cultigar_fito.json": { content: JSON.stringify(DB_FITO) }
                }})
            });
        } catch(e) {}
    }

    async function bajarDatos() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}?cb=${Date.now()}`);
            const data = await res.json();
            let fT = data.files["cultigar_db.json"] || Object.values(data.files)[0];
            let fF = data.files["cultigar_fito.json"] || Object.values(data.files)[1];
            if(fT) DB_TRAZA = JSON.parse(fT.content);
            if(fF) DB_FITO = JSON.parse(fF.content);
            localStorage.setItem('culti_traza', JSON.stringify(DB_TRAZA));
            localStorage.setItem('culti_fito', JSON.stringify(DB_FITO));
            actualizarColoresMapas();
        } catch(e) {}
    }

    function ejecutarBusqueda() {
        let busq = document.getElementById('buscador').value.toUpperCase();
        document.querySelectorAll('#svg-trazabilidad .mesa').forEach(m => m.classList.remove('resaltado'));
        if(!busq) return;
        for(let mesa in DB_TRAZA) {
            if(DB_TRAZA[mesa].some(reg => reg.ref.includes(busq))) {
                const el = document.getElementById('t-' + mesa);
                if(el) el.classList.add('resaltado');
            }
        }
    }

    function cerrarModales() {
        document.getElementById('overlay').style.display = 'none';
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    }

    let portapapeles = null;

    function copiarPlanta(index) {
        portapapeles = DB_TRAZA[mesaSeleccionada][index];
        DB_TRAZA[mesaSeleccionada].splice(index, 1);
        persistir();
        mostrarTablaTraza();
        actualizarColoresMapas();
        alert("Lote copiado. Abre otra mesa y pulsa PEGAR.");
    }

    function pegarPlanta() {
        if(!portapapeles) return;
        if(!DB_TRAZA[mesaSeleccionada]) DB_TRAZA[mesaSeleccionada] = [];
        DB_TRAZA[mesaSeleccionada].push(portapapeles);
        portapapeles = null;
        persistir();
        mostrarTablaTraza();
        actualizarColoresMapas();
    }

    function actualizarBotonPegar() {
        const existente = document.getElementById('zona-pegar');
        if(existente) existente.remove();
        if(portapapeles) {
            const btn = document.createElement('div');
            btn.id = 'zona-pegar';
            btn.innerHTML = `<button class="btn-guardar" style="background:#9b59b6; margin-bottom:15px;" onclick="pegarPlanta()">📋 PEGAR LOTE AQUÍ</button>`;
            const modal = document.getElementById('modalMesa');
            modal.insertBefore(btn, modal.querySelector('table'));
        }
    }

    window.onload = () => {
        inicializarMapas();
        bajarDatos();
    };
</script>
</body>
</html>
