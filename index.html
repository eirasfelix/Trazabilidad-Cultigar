<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CULTIGAR PATA NEGRA - MOD. FITO</title>
    <style>
        body { font-family: sans-serif; background: #333; margin: 0; color: white; padding-bottom: 50px; }
        .cabecera { background: white; padding: 10px; position: sticky; top: 0; z-index: 500; text-align: center; color: black; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* Interruptor de Modo */
        .selector-modo { display: flex; gap: 8px; justify-content: center; margin-bottom: 5px; }
        .btn-modo { flex: 1; max-width: 180px; padding: 12px; border-radius: 25px; border: 2px solid #2e7d32; cursor: pointer; font-weight: bold; font-size: 13px; }
        .activo { background: #2e7d32 !important; color: white !important; }
        .inactivo { background: white; color: #2e7d32; }

        .busqueda-nube { display: flex; gap: 5px; align-items: center; margin-top: 5px; padding: 0 10px; }
        .buscador { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        
        .resumen-stock { background: #e3f2fd; padding: 8px; margin: 5px auto; width: 92%; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; font-size: 12px; color: #0d47a1; border: 1px solid #2196F3; }

        /* EL MAPA (Respetando tus medidas originales) */
        .mapa-real { background: white; margin: 10px auto; padding: 15px; width: 480px; position: relative; border-radius: 8px; }
        .mesa { fill: #fcfcfc; stroke: #333; stroke-width: 1.2; cursor: pointer; transition: 0.2s; }
        .ocupada { fill: #c8e6c9 !important; stroke: #2e7d32; }
        .resaltado { fill: #FF8C00 !important; stroke: #e65100; stroke-width: 3; }
        
        /* Capas de Texto */
        .txt-id { font-size: 9px; font-weight: bold; fill: black; text-anchor: middle; pointer-events: none; }
        .txt-m2 { font-size: 9px; fill: #007bff; font-weight: bold; text-anchor: middle; pointer-events: none; display: none; }
        .txt-fuera { font-size: 8px; fill: #666; display: none; pointer-events: none; }

        /* Colores Fito (Semáforo) */
        .fito-verde { fill: #a5d6a7 !important; }
        .fito-naranja { fill: #ffcc80 !important; }
        .fito-rojo { fill: #ef9a9a !important; }
        .fito-azul { fill: #90caf9 !important; }

        /* Panel Lateral/Emergente */
        #infoPanel { position: fixed; top: 2%; left: 2%; width: 92%; height: 92%; background: #1a1a1a; padding: 15px; border-radius: 15px; display: none; z-index: 10000; border: 4px solid #4CAF50; overflow-y: auto; }
        .seccion-fito { background: #262626; padding: 15px; border-radius: 10px; border: 1px solid #4CAF50; margin-top: 15px; }
        .input-std { width: 92%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; background: #eee; font-size: 16px; color: black; }
        .btn-color { width: 45px; height: 45px; border-radius: 50%; border: 3px solid white; cursor: pointer; display: inline-block; margin: 5px; }
        .btn-accion { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; color: white; }
        
        .tabla-lotes { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        .tabla-lotes th { background: #333; color: #4CAF50; padding: 8px; text-align: left; }
        .tabla-lotes td { padding: 8px; border-bottom: 1px solid #444; }
    </style>
</head>
<body>

<div class="cabecera">
    <div class="selector-modo">
        <button id="btnLotes" class="btn-modo activo" onclick="cambiarPlano('traza')">📍 MODO LOTES</button>
        <button id="btnFito" class="btn-modo inactivo" onclick="cambiarPlano('fito')">🧪 MODO FITO</button>
    </div>
    <div class="busqueda-nube">
        <input type="text" id="busq" class="buscador" placeholder="🔍 Buscar variedad..." onkeyup="buscar()">
        <button onclick="subirANube()" style="background:#4CAF50; border:none; padding:10px; border-radius:5px; color:white;">⬆</button>
    </div>
    <div id="resumenStock" class="resumen-stock">Cargando...</div>
</div>

<div class="mapa-real">
    <svg width="470" height="820" viewBox="0 0 470 820">
        
        <g>
            <rect id="m10-48" class="mesa" x="10" y="70" width="40" height="140" onclick="abrirMesa('10-48', 18)"/>
            <text x="30" y="145" class="txt-id">10-48</text>
            <text x="30" y="145" class="txt-m2">18m²</text>
            <text x="10" y="65" class="txt-fuera">10-48</text>
        </g>

        <g>
            <rect id="m11-49" class="mesa" x="55" y="70" width="40" height="140" onclick="abrirMesa('11-49', 18)"/>
            <text x="75" y="145" class="txt-id">11-49</text>
            <text x="75" y="145" class="txt-m2">18m²</text>
            <text x="55" y="65" class="txt-fuera">11-49</text>
        </g>

        <g>
            <rect id="m4-42" class="mesa" x="10" y="325" width="45" height="200" onclick="abrirMesa('4-42', 24)"/>
            <text x="32" y="425" class="txt-id">4-42</text>
            <text x="32" y="425" class="txt-m2">24m²</text>
            <text x="10" y="320" class="txt-fuera">4-42</text>
        </g>
        <g>
            <rect id="m5-43" class="mesa" x="65" y="325" width="45" height="200" onclick="abrirMesa('5-43', 24)"/>
            <text x="87" y="425" class="txt-id">5-43</text>
            <text x="87" y="425" class="txt-m2">24m²</text>
            <text x="65" y="320" class="txt-fuera">5-43</text>
        </g>
        <g>
            <rect id="m6-44" class="mesa" x="125" y="325" width="45" height="200" onclick="abrirMesa('6-44', 24)"/>
            <text x="147" y="425" class="txt-id">6-44</text>
            <text x="147" y="425" class="txt-m2">24m²</text>
            <text x="125" y="320" class="txt-fuera">6-44</text>
        </g>

        </svg>
</div>

<div id="infoPanel">
    <h1 id="titMesa" style="color:#4CAF50; margin:0;">Mesa</h1>
    <p id="subSuperficie" style="background:#333; padding:5px; border-radius:5px; display:inline-block;">Superficie: 0 m²</p>

    <div id="panelTraza">
        <table class="tabla-lotes">
            <thead><tr><th>Lote</th><th>Caja</th><th>Acción</th></tr></thead>
            <tbody id="listaLotes"></tbody>
        </table>
        <div class="seccion-fito">
            <h3 style="margin:0; color:#4CAF50;">+ NUEVO REGISTRO</h3>
            <input type="text" id="f_ref" class="input-std" placeholder="VARIEDAD">
            <input type="number" id="f_cant" class="input-std" placeholder="CANTIDAD BANDEJAS">
            <button class="btn-accion" style="background:#4CAF50;" onclick="guardarLote()">💾 GUARDAR LOTES</button>
        </div>
    </div>

    <div id="panelFito" style="display:none;">
        <div class="seccion-fito">
            <h3 style="margin:0; color:#2196F3;">🧪 OPERACIÓN FITO</h3>
            <label>Estado de la mesa:</label><br>
            <div class="btn-color fito-verde" onclick="marcarColor('verde')"></div>
            <div class="btn-color fito-naranja" onclick="marcarColor('naranja')"></div>
            <div class="btn-color fito-rojo" onclick="marcarColor('rojo')"></div>
            <div class="btn-color fito-azul" onclick="marcarColor('azul')"></div>
            
            <input type="text" id="fi_app" class="input-std" placeholder="Aplicador">
            <input type="text" id="fi_prod" class="input-std" placeholder="Producto y Registro">
            <input type="text" id="fi_prob" class="input-std" placeholder="Plaga/Problema">
            <input type="text" id="fi_dos" class="input-std" placeholder="Dosis">
            <button class="btn-accion" style="background:#2196F3;" onclick="guardarFito()">💾 REGISTRAR TRATAMIENTO</button>
        </div>
    </div>

    <button class="btn-accion" style="background:#666;" onclick="cerrarPanel()">❌ VOLVER</button>
</div>

<script>
    // Tu lógica de base de datos intacta
    let db = JSON.parse(localStorage.getItem('cul_db')) || {};
    let dbFito = JSON.parse(localStorage.getItem('cul_fito')) || {};
    let modoActual = 'traza';
    let mesaAct = null;

    function cambiarPlano(modo) {
        modoActual = modo;
        const esFito = (modo === 'fito');
        document.getElementById('btnLotes').className = esFito ? 'btn-modo inactivo' : 'btn-modo activo';
        document.getElementById('btnFito').className = esFito ? 'btn-modo activo' : 'btn-modo inactivo';
        
        // Cambiar qué texto se ve dentro de la mesa
        document.querySelectorAll('.txt-id').forEach(t => t.style.display = esFito ? 'none' : 'block');
        document.querySelectorAll('.txt-m2').forEach(t => t.style.display = esFito ? 'block' : 'none');
        document.querySelectorAll('.txt-fuera').forEach(t => t.style.display = esFito ? 'block' : 'none');
        actualizarColoresMapa();
    }

    function abrirMesa(id, m2) {
        mesaAct = id;
        document.getElementById('titMesa').innerText = "Mesa " + id;
        document.getElementById('subSuperficie').innerText = "Superficie: " + m2 + " m²";
        
        // Mostrar el panel que toque
        document.getElementById('panelTraza').style.display = (modoActual === 'traza') ? 'block' : 'none';
        document.getElementById('panelFito').style.display = (modoActual === 'fito') ? 'block' : 'none';
        
        document.getElementById('infoPanel').style.display = 'block';
    }

    function marcarColor(c) {
        if(!dbFito[mesaAct]) dbFito[mesaAct] = {};
        dbFito[mesaAct].color = c;
        localStorage.setItem('cul_fito', JSON.stringify(dbFito));
        actualizarColoresMapa();
    }

    function actualizarColoresMapa() {
        document.querySelectorAll('.mesa').forEach(m => {
            let id = m.id.substring(1);
            m.className.baseVal = 'mesa'; // Limpiar
            
            if (modoActual === 'traza') {
                if(db[id]) m.classList.add('ocupada');
            } else {
                if(dbFito[id] && dbFito[id].color) m.classList.add('fito-' + dbFito[id].color);
            }
        });
    }

    function cerrarPanel() { document.getElementById('infoPanel').style.display = 'none'; }
    // Aquí el resto de tus funciones de guardar, borrar y buscar que ya tenías
</script>
</body>
</html>
