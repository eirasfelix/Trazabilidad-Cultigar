<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CULTIGAR - SISTEMA INTEGRAL COMPLETO</title>
    <style>
        :root { 
            --bg-dark: #2c3e50; 
            --verde-cultigar: #27ae60; 
            --rojo-fito: #c0392b; 
            --azul-nube: #2980b9;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-dark); 
            margin: 0; 
            color: white; 
            padding-bottom: 50px; 
        }

        /* Cabecera Fija */
        .header-sticky { 
            position: sticky; 
            top: 0; 
            background: white; 
            padding: 10px; 
            z-index: 1000; 
            display: flex; 
            gap: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }

        .input-busqueda { 
            flex-grow: 1; 
            padding: 12px; 
            border-radius: 8px; 
            border: 2px solid #ddd; 
            font-size: 16px; 
        }

        .btn-nube { 
            padding: 10px 20px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            color: white; 
        }

        /* Mapas */
        .seccion-mapa { 
            background: #eee; 
            margin: 20px auto; 
            padding: 15px; 
            width: 500px; 
            border-radius: 10px; 
            border: 3px solid #000; 
        }

        .titulo-mapa { 
            text-align: center; 
            padding: 10px; 
            margin: 0; 
            font-weight: bold; 
            text-transform: uppercase; 
        }

        svg { display: block; margin: auto; background: white; }

        .mesa { 
            fill: white; 
            stroke: #333; 
            stroke-width: 1.5; 
            cursor: pointer; 
            transition: 0.2s; 
        }

        .mesa:hover { stroke: #000; stroke-width: 3; }

        .texto-id { 
            font-size: 10px; 
            font-weight: bold; 
            fill: black; 
            pointer-events: none; 
            text-anchor: middle; 
        }

        /* Estados de Mesas */
        .ocupada { fill: #a9dfbf !important; }
        .resaltado { fill: #f39c12 !important; stroke: #d35400; stroke-width: 4; }
        .fito-blanco { fill: #ffffff !important; }
        .fito-amarillo { fill: #f1c40f !important; }
        .fito-naranja { fill: #e67e22 !important; }
        .fito-rojo { fill: #e74c3c !important; }
        .fito-verde { fill: #2ecc71 !important; }

        /* Modales */
        .modal { 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 90%; 
            max-width: 450px; 
            height: 85%; 
            background: #1a1a1a; 
            border: 4px solid #444; 
            border-radius: 15px; 
            display: none; 
            z-index: 2000; 
            padding: 20px; 
            overflow-y: auto; 
        }

        .overlay { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); 
            display: none; 
            z-index: 1500; 
        }

        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 11px; color: #aaa; margin-bottom: 2px; }
        .form-group input, .form-group select { 
            width: 100%; padding: 8px; border-radius: 5px; border: none; font-size: 14px; box-sizing: border-box; 
        }

        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 12px; }
        th { border-bottom: 2px solid var(--verde-cultigar); padding: 5px; text-align: left; color: var(--verde-cultigar); }
        td { padding: 5px; border-bottom: 1px solid #333; }

        .btn-guardar { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header-sticky">
    <input type="text" id="buscador" class="input-busqueda" placeholder="🔍 Buscar Variedad..." onkeyup="ejecutarBusqueda()">
    <button class="btn-nube" style="background: var(--verde-cultigar);" onclick="subirDatos()">⬆ SUBIR</button>
    <button class="btn-nube" style="background: var(--azul-nube);" onclick="bajarDatos()">⬇ BAJAR</button>
</div>

<div class="seccion-mapa">
    <h3 class="titulo-mapa" style="color: var(--verde-cultigar);">Trazabilidad Cultivo</h3>
    <svg width="480" height="780" id="svg-trazabilidad"></svg>
</div>

<div class="seccion-mapa">
    <h3 class="titulo-mapa" style="color: var(--rojo-fito);">Tratamientos Fitos</h3>
    <svg width="480" height="780" id="svg-fito"></svg>
</div>

<div class="overlay" id="overlay" onclick="cerrarModales()"></div>

<div id="modalMesa" class="modal">
    <h2 id="mesaTitulo" style="color: var(--verde-cultigar); display: flex; align-items: center; gap: 10px; font-size: 1.2rem;">Mesa --</h2>
    
    <table>
        <thead><tr><th>Ref</th><th>Lote</th><th>Fecha</th><th>Caja</th><th>Acción</th></tr></thead>
        <tbody id="tablaCuerpoMesa"></tbody>
    </table>

    <div style="background: #222; padding: 12px; border-radius: 10px; border: 1px solid #444;">
        <div class="form-group"><label>Variedad</label><input type="text" id="f_ref"></div>
        <div style="display: flex; gap: 5px;">
            <div class="form-group" style="flex: 2;"><label>Lote</label><input type="text" id="f_lote"></div>
            <div class="form-group" style="flex: 1;"><label>Bnd</label><input type="number" id="f_bandejas"></div>
            <div class="form-group" style="flex: 1;"><label>Pl/Bnd</label><input type="number" id="f_por_bandeja" value="40"></div>
        </div>
        <div style="display: flex; gap: 5px;">
            <div class="form-group" style="flex: 1;"><label>Sustrato</label><input type="text" id="f_sus"></div>
            <div class="form-group" style="flex: 1;"><label>F. Inicio</label><input type="date" id="f_fec"></div>
        </div>
        <div style="display: flex; gap: 5px;">
            <div class="form-group" style="flex: 1;"><label>Caja C.E.</label><input type="text" id="f_caja_ce"></div>
            <div class="form-group" style="flex: 1;"><label>F. C.E.</label><input type="date" id="f_fecha_ce"></div>
        </div>
        <button class="btn-guardar" id="btnGuardarTraza" style="background: var(--verde-cultigar);" onclick="guardarRegistroTrazabilidad()">💾 GUARDAR EN MESA</button>
    </div>
    <button class="btn-guardar" style="background: #555;" onclick="cerrarModales()">CERRAR VENTANA</button>
</div>

<div id="modalFito" class="modal">
    <h2 id="fitoTitulo" style="color: var(--rojo-fito);">Fito --</h2>
    <table>
        <thead><tr><th>Prod</th><th>Estado</th><th>Fecha</th></tr></thead>
        <tbody id="fitoCuerpoMesa"></tbody>
    </table>
    <div class="form-group"><label>Producto Aplicado</label><input type="text" id="fi_prod"></div>
    <div class="form-group"><label>Estado Semáforo</label>
        <select id="fi_estado">
            <option value="blanco">⚪ Blanco (Libre)</option>
            <option value="amarillo">🟡 Amarillo (Tratado)</option>
            <option value="naranja">🟠 Naranja (Plazo Seg.)</option>
            <option value="rojo">🔴 Rojo (PROHIBIDO)</option>
            <option value="verde">🟢 Verde (Apto Envío)</option>
        </select>
    </div>
    <div class="form-group"><label>Fecha</label><input type="date" id="fi_fecha"></div>
    <button class="btn-guardar" style="background: var(--rojo-fito);" onclick="guardarRegistroFito()">💾 REGISTRAR FITO</button>
    <button class="btn-guardar" style="background: #555;" onclick="cerrarModales()">CERRAR</button>
</div>

<script>
    // CONFIGURACIÓN NUBE (Pon aquí tu Token si lo tienes)
    const GIST_ID = "dc4b1ac9b41655086c76352f03ccfafe";
    const GITHUB_TOKEN = "TU_TOKEN_AQUÍ"; // Opcional: para auto-subida

    let DB_TRAZA = JSON.parse(localStorage.getItem('culti_traza')) || {};
    let DB_FITO = JSON.parse(localStorage.getItem('culti_fito')) || {};
    let mesaSeleccionada = "";
    let indexEdicion = null;

    // GEOMETRÍA COMPLETA
    const GEOMETRIA = [
        {id:'10-48', x:10, y:70, w:40, h:140}, {id:'11-49', x:55, y:70, w:40, h:140},
        {id:'12-50', x:105, y:70, w:40, h:140}, {id:'13-51', x:150, y:70, w:40, h:140},
        {id:'7-45', x:15, y:220, w:40, h:65}, {id:'8-46', x:65, y:220, w:45, h:90},
        {id:'9-47', x:135, y:220, w:38, h:90}, {id:'4-42', x:10, y:325, w:45, h:200},
        {id:'5-43', x:65, y:325, w:45, h:200}, {id:'6-44', x:125, y:325, w:45, h:200},
        {id:'1-39', x:10, y:540, w:45, h:210}, {id:'2-40', x:65, y:540, w:45, h:210},
        {id:'3-41', x:125, y:580, w:45, h:170},
        {id:'22-63', x:210, y:70, w:38, h:75}, {id:'23-64', x:255, y:70, w:38, h:75},
        {id:'24-65', x:300, y:70, w:38, h:75}, {id:'22-60', x:210, y:155, w:38, h:100},
        {id:'23-61', x:255, y:155, w:38, h:100}, {id:'24-62', x:300, y:155, w:38, h:100},
        {id:'18-56', x:215, y:360, w:35, h:110}, {id:'19-57', x:255, y:325, w:38, h:200},
        {id:'20-58', x:300, y:325, w:38, h:200}, {id:'21-59', x:345, y:325, w:38, h:200},
        {id:'14-52', x:210, y:540, w:38, h:145}, {id:'15-53', x:255, y:540, w:38, h:145},
        {id:'16-54', x:300, y:540, w:38, h:145}, {id:'17-55', x:345, y:540, w:38, h:145}
    ];

    function inicializarMapas() {
        let trazHtml = "", fitoHtml = "";
        GEOMETRIA.forEach(m => {
            trazHtml += `<rect id="t-${m.id}" class="mesa" x="${m.x}" y="${m.y}" width="${m.w}" height="${m.h}" onclick="abrirTraza('${m.id}')"></rect><text x="${m.x + m.w/2}" y="${m.y + m.h - 5}" class="texto-id">${m.id}</text>`;
            fitoHtml += `<rect id="f-${m.id}" class="mesa" x="${m.x}" y="${m.y}" width="${m.w}" height="${m.h}" onclick="abrirFito('${m.id}')"></rect><text x="${m.x + m.w/2}" y="${m.y + m.h - 5}" class="texto-id">${m.id}</text>`;
        });
        // Pasillo Derecho (1-14)
        for(let i=1; i<=14; i++) {
            let yPos = 70 + (14-i) * 46;
            trazHtml += `<rect id="t-${i}" class="mesa" x="395" y="${yPos}" width="75" height="38" onclick="abrirTraza('${i}')"></rect><text x="432" y="${yPos + 22}" class="texto-id">${i}</text>`;
            fitoHtml += `<rect id="f-${i}" class="mesa" x="395" y="${yPos}" width="75" height="38" onclick="abrirFito('${i}')"></rect><text x="432" y="${yPos + 22}" class="texto-id">${i}</text>`;
        }
        document.getElementById('svg-trazabilidad').innerHTML = trazHtml;
        document.getElementById('svg-fito').innerHTML = fitoHtml;
        actualizarColoresMapas();
    }

    // --- FUNCIONES TRAZABILIDAD ---
    function abrirTraza(id) {
        mesaSeleccionada = id;
        document.getElementById('f_fec').value = new Date().toISOString().split('T')[0];
        mostrarTablaTraza();
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modalMesa').style.display = 'block';
    }

    function mostrarTablaTraza() {
        let html = "", bTot = 0, pTot = 0;
        let datos = DB_TRAZA[mesaSeleccionada] || [];
        datos.forEach((r, i) => {
            let bnd = parseInt(r.bandejas) || 0;
            let pxb = parseInt(r.porBandeja) || 40;
            bTot += bnd; pTot += (bnd * pxb);
            html += `<tr><td>${r.ref}</td><td>${r.lote}</td><td>${r.fec}</td><td>${r.cajaCE || '-'}</td><td><button onclick="prepararEdicion(${i})">✏️</button> <button onclick="borrarTraza(${i})">🗑️</button></td></tr>`;
        });
        // Título con Totales
        document.getElementById('mesaTitulo').innerHTML = `Mesa ${mesaSeleccionada} <span style="font-size:0.85rem; background:#34495e; padding:4px 12px; border-radius:20px; color:white; font-weight:normal; margin-left:10px;">📦 ${bTot} Bnd | 🌱 ${pTot} Pl.</span>`;
        document.getElementById('tablaCuerpoMesa').innerHTML = html || "<tr><td colspan='5' style='text-align:center;'>Mesa vacía</td></tr>";
    }

    function guardarRegistroTrazabilidad() {
        let reg = {
            ref: document.getElementById('f_ref').value.toUpperCase(),
            lote: document.getElementById('f_lote').value,
            bandejas: document.getElementById('f_bandejas').value,
            porBandeja: document.getElementById('f_por_bandeja').value,
            sus: document.getElementById('f_sus').value,
            fec: document.getElementById('f_fec').value,
            cajaCE: document.getElementById('f_caja_ce').value,
            fecCE: document.getElementById('f_fecha_ce').value
        };
        if(!DB_TRAZA[mesaSeleccionada]) DB_TRAZA[mesaSeleccionada] = [];
        if(indexEdicion !== null) { 
            DB_TRAZA[mesaSeleccionada][indexEdicion] = reg; 
            indexEdicion = null; 
        } else { 
            DB_TRAZA[mesaSeleccionada].push(reg); 
        }
        persistir(); 
        mostrarTablaTraza(); 
        actualizarColoresMapas(); 
        limpiarForm();
    }

    function prepararEdicion(i) {
        indexEdicion = i; 
        let r = DB_TRAZA[mesaSeleccionada][i];
        document.getElementById('f_ref').value = r.ref;
        document.getElementById('f_lote').value = r.lote;
        document.getElementById('f_bandejas').value = r.bandejas;
        document.getElementById('f_por_bandeja').value = r.porBandeja || 40;
        document.getElementById('f_sus').value = r.sus;
        document.getElementById('f_fec').value = r.fec;
        document.getElementById('f_caja_ce').value = r.cajaCE || "";
        document.getElementById('f_fecha_ce').value = r.fecCE || "";
        document.getElementById('btnGuardarTraza').innerText = "💾 ACTUALIZAR REGISTRO";
        document.getElementById('btnGuardarTraza').style.background = "#f39c12";
    }

    function borrarTraza(i) {
        if(confirm("¿Borrar este lote?")) {
            DB_TRAZA[mesaSeleccionada].splice(i, 1);
            persistir(); mostrarTablaTraza(); actualizarColoresMapas();
        }
    }

    function limpiarForm() {
        ['f_ref','f_lote','f_bandejas','f_sus','f_caja_ce','f_fecha_ce'].forEach(id => document.getElementById(id).value = "");
        document.getElementById('f_por_bandeja').value = "40";
        document.getElementById('btnGuardarTraza').innerText = "💾 GUARDAR EN MESA";
        document.getElementById('btnGuardarTraza').style.background = "var(--verde-cultigar)";
    }

    // --- FUNCIONES FITOS ---
    function abrirFito(id) {
        mesaSeleccionada = id;
        document.getElementById('fitoTitulo').innerText = "Fito Mesa " + id;
        document.getElementById('fi_fecha').value = new Date().toISOString().split('T')[0];
        mostrarTablaFito();
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modalFito').style.display = 'block';
    }

    function guardarRegistroFito() {
        if(!DB_FITO[mesaSeleccionada]) DB_FITO[mesaSeleccionada] = [];
        DB_FITO[mesaSeleccionada].push({
            p: document.getElementById('fi_prod').value.toUpperCase(),
            e: document.getElementById('fi_estado').value,
            f: document.getElementById('fi_fecha').value
        });
        persistir(); mostrarTablaFito(); actualizarColoresMapas();
    }

    function mostrarTablaFito() {
        let html = "";
        (DB_FITO[mesaSeleccionada] || []).forEach(r => {
            html += `<tr><td>${r.p}</td><td>${r.e}</td><td>${r.f}</td></tr>`;
        });
        document.getElementById('fitoCuerpoMesa').innerHTML = html;
    }

    // --- PERSISTENCIA Y NUBE ---
    function persistir() {
        localStorage.setItem('culti_traza', JSON.stringify(DB_TRAZA));
        localStorage.setItem('culti_fito', JSON.stringify(DB_FITO));
    }

    async function subirDatos() {
        const token = GITHUB_TOKEN === "TU_TOKEN_AQUÍ" ? prompt("Introduce tu GitHub Token:") : GITHUB_TOKEN;
        if(!token) return;
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({
                    files: {
                        "cultigar_db.json": { content: JSON.stringify(DB_TRAZA) },
                        "cultigar_fito.json": { content: JSON.stringify(DB_FITO) }
                    }
                })
            });
            if(res.ok) alert("✅ Sincronizado en la Nube");
        } catch(e) { alert("❌ Error al subir"); }
    }

    async function bajarDatos() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}?cb=${Date.now()}`);
            const data = await res.json();
            if(data.files["cultigar_db.json"]) DB_TRAZA = JSON.parse(data.files["cultigar_db.json"].content);
            if(data.files["cultigar_fito.json"]) DB_FITO = JSON.parse(data.files["cultigar_fito.json"].content);
            actualizarColoresMapas();
            alert("✅ Datos actualizados desde la Nube");
        } catch(e) { console.log("Error al bajar datos"); }
    }

    function actualizarColoresMapas() {
        // Trazabilidad
        document.querySelectorAll('#svg-trazabilidad .mesa').forEach(rect => {
            let id = rect.id.replace('t-', '');
            rect.classList.toggle('ocupada', DB_TRAZA[id] && DB_TRAZA[id].length > 0);
        });
        // Fitos
        document.querySelectorAll('#svg-fito .mesa').forEach(rect => {
            let id = rect.id.replace('f-', '');
            rect.setAttribute('class', 'mesa');
            if(DB_FITO[id] && DB_FITO[id].length > 0) {
                rect.classList.add('fito-' + DB_FITO[id][DB_FITO[id].length-1].e);
            }
        });
    }

    function cerrarModales() {
        document.getElementById('overlay').style.display = 'none';
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        indexEdicion = null;
        limpiarForm();
    }

    function ejecutarBusqueda() {
        let b = document.getElementById('buscador').value.toUpperCase();
        document.querySelectorAll('.mesa').forEach(m => m.classList.remove('resaltado'));
        if(!b) return;
        for(let m in DB_TRAZA) {
            if(DB_TRAZA[m].some(r => r.ref.includes(b))) {
                document.getElementById('t-'+m)?.classList.add('resaltado');
            }
        }
    }

    window.onload = () => {
        inicializarMapas();
        // bajarDatos(); // Descomenta si quieres que cargue la nube al abrir
    };
</script>
</body>
</html>
