<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TRAZABILIDAD CULTIGAR - PRO EDIT</title>
    <style>
        body { font-family: sans-serif; background: #444; margin: 0; padding: 0; }
        .cabecera { background: white; padding: 8px; position: sticky; top: 0; z-index: 500; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .busqueda-nube-container { display: flex; gap: 5px; align-items: center; max-width: 98%; margin: 0 auto 5px auto; }
        .buscador { flex-grow: 1; padding: 10px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; }
        .resumen-stock { background: #e3f2fd; padding: 5px; margin: 2px auto; width: 98%; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; font-size: 11px; max-height: 60px; overflow-y: auto; border: 1px solid #2196F3; }
        .stock-item { background: white; padding: 2px 6px; border-radius: 4px; border: 1px solid #2196F3; font-weight: bold; color: #0d47a1; }
        .btn-nube { padding: 10px 8px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; font-size: 11px; }
        .btn-subir { background: #4CAF50; }
        .btn-bajar { background: #2196F3; }
        .mapa-real { background: white; margin: 10px auto; padding: 10px; border: 1px solid #000; display: block; width: 490px; position: relative; }
        .mesa { fill: white; stroke: black; stroke-width: 1.2; cursor: pointer; }
        .ocupada { fill: #c8e6c9; stroke: #2e7d32; }
        .resaltado { fill: #FF8C00 !important; }
        .texto-mesa { font-size: 9px; font-weight: bold; pointer-events: none; text-anchor: middle; fill: #000; }
        #infoPanel { position: fixed; top: 2%; left: 2%; width: 92%; height: 92%; background: #1a1a1a; color: white; padding: 15px; border-radius: 15px; display: none; border: 4px solid #4CAF50; z-index: 10000; box-shadow: 0 0 50px rgba(0,0,0,0.9); overflow-y: auto; }
        .tabla-lotes { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; background: #222; }
        .tabla-lotes th { background: #333; color: #4CAF50; padding: 8px; text-align: left; border-bottom: 2px solid #4CAF50; }
        .tabla-lotes td { padding: 8px; border-bottom: 1px solid #444; }
        .formulario-lote { background: #333; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px solid #555; }
        .formulario-lote input { width: 95%; padding: 10px; margin: 4px 0; border-radius: 5px; border: none; font-size: 16px; display: block; }
        .label-form { font-size: 11px; color: #aaa; margin-top: 8px; display: block; font-weight: bold; }
        .btn { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-guardar { background: #4CAF50; color: white; }
        .btn-editar-mode { background: #2196F3 !important; }
        .btn-copiar { background: #FF9800; color: white; }
        .btn-pegar { background: #9C27B0; color: white; }
        .btn-mini { padding: 6px; border-radius: 4px; border: none; color: white; font-weight: bold; margin-left: 3px; cursor: pointer; font-size: 10px; }
        .btn-receta { background: #555; color: #fff; padding: 8px; font-size: 11px; width: auto; margin-right: 5px; margin-top: 5px; cursor: pointer; border-radius: 4px; border: 1px solid #777; }
    </style>
</head>
<body>

<div class="cabecera">
    <div class="busqueda-nube-container">
        <input type="text" id="inputBusqueda" class="buscador" placeholder="🔍 Buscar variedad, lote..." onkeyup="buscar()">
        <button class="btn-nube btn-subir" onclick="subirANube()">⬆ SUBIR</button>
        <button class="btn-nube btn-bajar" onclick="cargarDeNube()">⬇ BAJAR</button>
    </div>
    <div id="resumenStock" class="resumen-stock">Cargando datos...</div>
</div>

<div class="mapa-real">
    <svg width="490" height="780" viewBox="0 0 490 780">
        <text x="245" y="25" style="font-size:18px; font-weight:bold; text-anchor:middle; fill:#1a5d1a;">TRAZABILIDAD CULTIGAR</text>
        
        <rect id="m10-48" class="mesa" x="10" y="70" width="40" height="140" onclick="abrirMesa('10-48')" /><text x="30" y="200" class="texto-mesa">10-48</text>
        <rect id="m11-49" class="mesa" x="55" y="70" width="40" height="140" onclick="abrirMesa('11-49')" /><text x="75" y="200" class="texto-mesa">11-49</text>
        <rect id="m12-50" class="mesa" x="105" y="70" width="40" height="140" onclick="abrirMesa('12-50')" /><text x="125" y="200" class="texto-mesa">12-50</text>
        <rect id="m13-51" class="mesa" x="150" y="70" width="40" height="140" onclick="abrirMesa('13-51')" /><text x="170" y="200" class="texto-mesa">13-51</text>
        <rect id="m7-45" class="mesa" x="15" y="220" width="40" height="65" onclick="abrirMesa('7-45')" /><text x="35" y="275" class="texto-mesa">7-45</text>
        <rect id="m8-46" class="mesa" x="65" y="220" width="45" height="90" onclick="abrirMesa('8-46')" /><text x="87" y="300" class="texto-mesa">8-46</text>
        <rect id="m9-47" class="mesa" x="135" y="220" width="38" height="90" onclick="abrirMesa('9-47')" /><text x="154" y="300" class="texto-mesa">9-47</text>
        <rect id="m4-42" class="mesa" x="10" y="325" width="45" height="200" onclick="abrirMesa('4-42')" /><text x="32" y="515" class="texto-mesa">4-42</text>
        <rect id="m5-43" class="mesa" x="65" y="325" width="45" height="200" onclick="abrirMesa('5-43')" /><text x="87" y="515" class="texto-mesa">5-43</text>
        <rect id="m6-44" class="mesa" x="125" y="325" width="45" height="200" onclick="abrirMesa('6-44')" /><text x="147" y="515" class="texto-mesa">6-44</text>
        <rect id="m1-39" class="mesa" x="10" y="540" width="45" height="210" onclick="abrirMesa('1-39')" /><text x="32" y="740" class="texto-mesa">1-39</text>
        <rect id="m2-40" class="mesa" x="65" y="540" width="45" height="210" onclick="abrirMesa('2-40')" /><text x="87" y="740" class="texto-mesa">2-40</text>
        <rect id="m3-41" class="mesa" x="125" y="580" width="45" height="170" onclick="abrirMesa('3-41')" /><text x="147" y="740" class="texto-mesa">3-41</text>
        </svg>

    <div id="infoPanel">
        <h2 id="tituloMesa" style="margin:0; color:#4CAF50;">Mesa</h2>
        
        <table class="tabla-lotes">
            <thead>
                <tr><th>Datos</th><th>Caja/Receta</th><th>F.Trabajo</th><th>Acción</th></tr>
            </thead>
            <tbody id="listaLotes"></tbody>
        </table>

        <div class="formulario-lote">
            <button class="btn btn-pegar" id="btnPegar" onclick="pegarDatos()" style="display:none; margin-bottom:15px;">📋 PEGAR PLANTA MOVIDA AQUÍ</button>

            <h3 id="formTitle" style="margin:0 0 10px 0; font-size:14px; color:#4CAF50;">+ REGISTRO RÁPIDO:</h3>
            
            <input type="hidden" id="editIndex" value="-1"> <span class="label-form">REFERENCIA</span><input type="text" id="f_ref">
            <span class="label-form">LOTE</span><input type="text" id="f_lote">
            <span class="label-form">CANTIDAD BANDEJAS</span><input type="number" id="f_cant">
            
            <span class="label-form">SUSTRATO / RECETA</span>
            <div>
                <button type="button" class="btn-receta" onclick="document.getElementById('f_sustrato').value='F8P16FC, 2AG, 0,75 TRIANUM'">RECETA TRIANUM</button>
            </div>
            <input type="text" id="f_sustrato">
            
            <span class="label-form">Nº CAJA JIFFY</span><input type="text" id="f_caja">
            <span class="label-form">FECHA ENRAIZADO</span><input type="date" id="f_enraizado">
            <span class="label-form">FECHA TRABAJO (Hoy)</span><input type="date" id="f_vivero">
            
            <button id="btnGuardar" class="btn btn-guardar" onclick="guardarLote()">+ REGISTRAR EN MAPA</button>
            <button id="btnCancelarEdit" class="btn" style="background:#666; color:white; display:none;" onclick="resetFormulario()">CANCELAR EDICIÓN</button>
        </div>

        <button class="btn" style="background:#cc0000; color:white;" onclick="cerrarPanel()">CERRAR PANEL</button>
    </div>
</div>

<script>
    const GIST_ID = "dc4b1ac9b41655086c76352f03ccfafe";
    let db = JSON.parse(localStorage.getItem('cultigar_pro_final')) || {};
    let mesaActual = null;
    let memoriaCopiada = null; 

    function abrirMesa(id) {
        mesaActual = id;
        document.getElementById('tituloMesa').innerText = "Mesa " + id;
        document.getElementById('btnPegar').style.display = memoriaCopiada ? 'block' : 'none';
        resetFormulario();
        renderLotes();
        document.getElementById('infoPanel').style.display = 'block';
    }

    function renderLotes() {
        let html = "";
        (db[mesaActual] || []).forEach((l, index) => {
            html += `<tr>
                <td><b>${l.ref}</b><br><small>L-${l.lote} (${l.cant} b.)</small></td>
                <td>Caja: ${l.caja}<br><small>${l.sustrato}</small></td>
                <td>${l.f_vivero}</td>
                <td>
                    <button onclick="prepararEdicion(${index})" class="btn-mini" style="background:#2196F3;">EDITAR</button>
                    <button onclick="copiarParaMover(${index})" class="btn-mini btn-copiar">MOVER</button>
                    <button onclick="borrarLote(${index})" class="btn-mini" style="background:red;">X</button>
                </td></tr>`;
        });
        document.getElementById('listaLotes').innerHTML = html || "<tr><td colspan='4' style='text-align:center;'>Vacía</td></tr>";
    }

    function prepararEdicion(index) {
        let l = db[mesaActual][index];
        document.getElementById('editIndex').value = index;
        document.getElementById('f_ref').value = l.ref;
        document.getElementById('f_lote').value = l.lote;
        document.getElementById('f_cant').value = l.cant;
        document.getElementById('f_sustrato').value = l.sustrato;
        document.getElementById('f_caja').value = l.caja;
        document.getElementById('f_enraizado').value = l.f_enraizado;
        document.getElementById('f_vivero').value = l.f_vivero;

        document.getElementById('formTitle').innerText = "📝 EDITANDO LOTE:";
        document.getElementById('btnGuardar').innerText = "💾 ACTUALIZAR CAMBIOS";
        document.getElementById('btnGuardar').classList.add('btn-editar-mode');
        document.getElementById('btnCancelarEdit').style.display = 'block';
    }

    function resetFormulario() {
        document.getElementById('editIndex').value = "-1";
        document.getElementById('f_ref').value = "";
        document.getElementById('f_lote').value = "";
        document.getElementById('f_cant').value = "";
        document.getElementById('f_sustrato').value = "";
        document.getElementById('f_caja').value = "";
        document.getElementById('f_enraizado').value = "";
        document.getElementById('f_vivero').value = new Date().toISOString().split('T')[0];
        
        document.getElementById('formTitle').innerText = "+ REGISTRO RÁPIDO:";
        document.getElementById('btnGuardar').innerText = "+ REGISTRAR EN MAPA";
        document.getElementById('btnGuardar').classList.remove('btn-editar-mode');
        document.getElementById('btnCancelarEdit').style.display = 'none';
    }

    function guardarLote() {
        let index = parseInt(document.getElementById('editIndex').value);
        let nuevo = {
            ref: document.getElementById('f_ref').value.toUpperCase(),
            lote: document.getElementById('f_lote').value.toUpperCase(),
            caja: document.getElementById('f_caja').value.toUpperCase(),
            sustrato: document.getElementById('f_sustrato').value.toUpperCase(),
            cant: document.getElementById('f_cant').value,
            f_enraizado: document.getElementById('f_enraizado').value,
            f_vivero: document.getElementById('f_vivero').value
        };

        if(!nuevo.ref) return alert("Falta la Referencia");

        if(!db[mesaActual]) db[mesaActual] = [];

        if(index > -1) {
            db[mesaActual][index] = nuevo; // Actualizar existente
        } else {
            db[mesaActual].push(nuevo); // Crear nuevo
        }

        localStorage.setItem('cultigar_pro_final', JSON.stringify(db));
        subirANube();
        resetFormulario();
        renderLotes();
        actualizarMapa();
    }

    function borrarLote(index) {
        if(confirm("¿Seguro que quieres borrar este lote?")) {
            db[mesaActual].splice(index, 1);
            if(db[mesaActual].length === 0) delete db[mesaActual];
            localStorage.setItem('cultigar_pro_final', JSON.stringify(db));
            subirANube();
            renderLotes();
            actualizarMapa();
        }
    }

    // --- Funciones de soporte (Nube, Mapa, etc. se mantienen igual) ---
    async function subirANube() {
        const token = localStorage.getItem('github_token');
        if(!token) return;
        try {
            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({ files: { "cultigar_db.json": { content: JSON.stringify(db) } } })
            });
        } catch (e) { console.error("Error nube"); }
    }

    function actualizarMapa() {
        let totales = {}; let granTotal = 0;
        document.querySelectorAll('.mesa').forEach(m => {
            let id = m.id.substring(1);
            if(db[id]) { 
                m.classList.add('ocupada'); 
                db[id].forEach(l => {
                    totales[l.ref] = (totales[l.ref] || 0) + parseInt(l.cant || 0);
                    granTotal += parseInt(l.cant || 0);
                });
            } else m.classList.remove('ocupada');
        });
        let res = `<div class="stock-item" style="background:#4CAF50; color:white">TOTAL: ${granTotal}</div>`;
        for(let r in totales) res += `<div class="stock-item">${r}: ${totales[r]}</div>`;
        document.getElementById('resumenStock').innerHTML = res || "Vivero Vacío";
    }

    function cerrarPanel() { document.getElementById('infoPanel').style.display = 'none'; }
    actualizarMapa();
</script>
</body>
</html>
