<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CULTIGAR MASTER - VERSIÓN COMPLETA</title>
    <style>
        :root { 
            --bg-dark: #2c3e50; 
            --verde-cultigar: #27ae60; 
            --rojo-fito: #c0392b; 
            --azul-nube: #2980b9;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-dark); 
            margin: 0; 
            color: white; 
            padding-bottom: 50px; 
        }

        /* Cabecera Fija Blanca */
        .header-sticky { 
            position: sticky; 
            top: 0; 
            background: white; 
            padding: 10px 15px; 
            z-index: 1000; 
            display: flex; 
            gap: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }

        .input-busqueda { 
            flex-grow: 1; 
            padding: 12px; 
            border-radius: 8px; 
            border: 2px solid #ddd; 
            font-size: 16px; 
            outline: none;
            color: #333;
        }

        .btn-nube { 
            padding: 10px 20px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            color: white; 
        }

        /* Mapas Estilo Claro */
        .seccion-mapa { 
            background: #fdfdfd; 
            margin: 20px auto; 
            padding: 15px; 
            width: 485px; 
            border-radius: 12px; 
            border: 2px solid #333; 
        }

        .titulo-mapa { 
            text-align: center; 
            padding: 10px; 
            margin: 0; 
            font-weight: bold; 
            text-transform: uppercase; 
            color: #2c3e50;
            border-bottom: 1px solid #eee;
            margin-bottom: 10px;
        }

        svg { display: block; margin: auto; background: white; }

        .mesa { 
            fill: #ffffff; 
            stroke: #555; 
            stroke-width: 1.2; 
            cursor: pointer; 
            transition: 0.2s; 
        }

        .mesa:hover { stroke: #000; stroke-width: 2.5; fill: #f9f9f9; }

        .texto-id { 
            font-size: 10px; 
            font-weight: bold; 
            fill: #333; 
            pointer-events: none; 
            text-anchor: middle; 
        }

        /* Estados de Mesas */
        .ocupada { fill: #a9dfbf !important; } /* Verde suave */
        .resaltado { fill: #f39c12 !important; stroke: #d35400 !important; stroke-width: 4; }
        
        /* Colores Fitos */
        .fito-blanco { fill: #ffffff !important; }
        .fito-amarillo { fill: #f1c40f !important; }
        .fito-naranja { fill: #e67e22 !important; }
        .fito-rojo { fill: #e74c3c !important; }
        .fito-verde { fill: #2ecc71 !important; }

        /* Modales */
        .modal { 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 90%; 
            max-width: 460px; 
            height: 85%; 
            background: #1e272e; 
            border: 4px solid #34495e; 
            border-radius: 20px; 
            display: none; 
            z-index: 2000; 
            padding: 20px; 
            overflow-y: auto; 
            color: white;
        }

        .overlay { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            display: none; 
            z-index: 1500; 
        }

        /* Tablas y Formularios */
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; color: #bdc3c7; margin-bottom: 4px; }
        .form-group input, .form-group select { 
            width: 100%; padding: 10px; border-radius: 6px; border: none; font-size: 14px; box-sizing: border-box; background: #2f3640; color: white;
        }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 13px; background: #2f3640; border-radius: 8px; overflow: hidden; }
        th { background: #3d4652; padding: 10px; text-align: left; color: var(--verde-cultigar); }
        td { padding: 10px; border-bottom: 1px solid #3d4652; }

        .btn-accion { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; margin-top: 5px; font-size: 14px; }
        .btn-peque { padding: 8px; border-radius: 5px; border: none; cursor: pointer; color: white; font-weight: bold; flex: 1; font-size: 11px; }

    </style>
</head>
<body>

<div class="header-sticky">
    <input type="text" id="buscador" class="input-busqueda" placeholder="🔍 Buscar Variedad..." onkeyup="ejecutarBusqueda()">
    <button class="btn-nube" style="background: var(--verde-cultigar);" onclick="subirDatos()">⬆ SUBIR</button>
    <button class="btn-nube" style="background: var(--azul-nube);" onclick="bajarDatos()">⬇ BAJAR</button>
</div>

<div class="seccion-mapa">
    <h3 class="titulo-mapa">🗺️ Trazabilidad de Cultivo</h3>
    <svg width="460" height="780" id="svg-trazabilidad"></svg>
</div>

<div class="seccion-mapa">
    <h3 class="titulo-mapa" style="color: var(--rojo-fito);">🧪 Tratamientos Fitonitarios</h3>
    <svg width="460" height="780" id="svg-fito"></svg>
</div>

<div class="overlay" id="overlay" onclick="cerrarModales()"></div>

<div id="modalMesa" class="modal">
    <h2 id="mesaTitulo" style="color: var(--verde-cultigar); margin-top: 0;">Mesa --</h2>
    
    <div style="display: flex; gap: 8px; margin-bottom: 15px;">
        <button class="btn-peque" style="background: #8e44ad;" onclick="copiarContenido('TRAZA')">📋 COPIAR DATOS</button>
        <button class="btn-peque" style="background: #2980b9;" onclick="pegarContenido('TRAZA')">📥 PEGAR AQUÍ</button>
    </div>

    <table>
        <thead><tr><th>Ref</th><th>Lote</th><th>Bnd</th><th>Acción</th></tr></thead>
        <tbody id="tablaCuerpoMesa"></tbody>
    </table>

    <div style="background: #2c3e50; padding: 15px; border-radius: 12px; border: 1px solid #444;">
        <div class="form-group"><label>Variedad / Referencia</label><input type="text" id="f_ref"></div>
        <div style="display: flex; gap: 8px;">
            <div class="form-group" style="flex: 2;"><label>Lote</label><input type="text" id="f_lote"></div>
            <div class="form-group" style="flex: 1;"><label>Bnd</label><input type="number" id="f_bandejas"></div>
            <div class="form-group" style="flex: 1;"><label>Pl/Bnd</label><input type="number" id="f_por_bandeja" value="40"></div>
        </div>
        <div style="display: flex; gap: 8px;">
            <div class="form-group" style="flex: 1;"><label>Sustrato</label><input type="text" id="f_sus"></div>
            <div class="form-group" style="flex: 1;"><label>Fecha Inicio</label><input type="date" id="f_fec"></div>
        </div>
        <button class="btn-accion" id="btnGuardarTraza" style="background: var(--verde-cultigar);" onclick="guardarRegistroTrazabilidad()">💾 GUARDAR EN MESA</button>
    </div>
    <button class="btn-accion" style="background: #555; margin-top: 15px;" onclick="cerrarModales()">CERRAR VENTANA</button>
</div>

<div id="modalFito" class="modal">
    <h2 id="fitoTitulo" style="color: var(--rojo-fito); margin-top: 0;">Fito --</h2>
    
    <div style="display: flex; gap: 8px; margin-bottom: 15px;">
        <button class="btn-peque" style="background: #8e44ad;" onclick="copiarContenido('FITO')">📋 COPIAR FITO</button>
        <button class="btn-peque" style="background: #2980b9;" onclick="pegarContenido('FITO')">📥 PEGAR FITO</button>
    </div>

    <table>
        <thead><tr><th>Producto</th><th>Estado</th><th>Fecha</th></tr></thead>
        <tbody id="fitoCuerpoMesa"></tbody>
    </table>
    
    <div class="form-group"><label>Producto</label><input type="text" id="fi_prod"></div>
    <div class="form-group"><label>Semaforización</label>
        <select id="fi_estado">
            <option value="blanco">⚪ Blanco (Libre)</option>
            <option value="amarillo">🟡 Amarillo (Tratado)</option>
            <option value="naranja">🟠 Naranja (Plazo Seg.)</option>
            <option value="rojo">🔴 Rojo (BLOQUEADO)</option>
            <option value="verde">🟢 Verde (Apto)</option>
        </select>
    </div>
    <div class="form-group"><label>Fecha</label><input type="date" id="fi_fecha"></div>
    <button class="btn-accion" style="background: var(--rojo-fito);" onclick="guardarRegistroFito()">💾 REGISTRAR TRATAMIENTO</button>
    <button class="btn-accion" style="background: #555; margin-top: 15px;" onclick="cerrarModales()">CERRAR</button>
</div>

<script>
    const GIST_ID = "dc4b1ac9b41655086c76352f03ccfafe";
    let DB_TRAZA = JSON.parse(localStorage.getItem('culti_traza')) || {};
    let DB_FITO = JSON.parse(localStorage.getItem('culti_fito')) || {};
    let mesaSeleccionada = "";
    let indexEdicion = null;
    let PORTAPAPELES_TRAZA = null;
    let PORTAPAPELES_FITO = null;

    const GEOMETRIA = [
        {id:'10-48', x:10, y:70, w:40, h:140}, {id:'11-49', x:55, y:70, w:40, h:140},
        {id:'12-50', x:105, y:70, w:40, h:140}, {id:'13-51', x:150, y:70, w:40, h:140},
        {id:'7-45', x:15, y:220, w:40, h:65}, {id:'8-46', x:65, y:220, w:45, h:90},
        {id:'9-47', x:135, y:220, w:38, h:90}, {id:'4-42', x:10, y:325, w:45, h:200},
        {id:'5-43', x:65, y:325, w:45, h:200}, {id:'6-44', x:125, y:325, w:45, h:200},
        {id:'1-39', x:10, y:540, w:45, h:210}, {id:'2-40', x:65, y:540, w:45, h:210},
        {id:'3-41', x:125, y:580, w:45, h:170},
        {id:'22-63', x:210, y:70, w:38, h:75}, {id:'23-64', x:255, y:70, w:38, h:75},
        {id:'24-65', x:300, y:70, w:38, h:75}, {id:'22-60', x:210, y:155, w:38, h:100},
        {id:'23-61', x:255, y:155, w:38, h:100}, {id:'24-62', x:300, y:155, w:38, h:100},
        {id:'18-56', x:215, y:360, w:35, h:110}, {id:'19-57', x:255, y:325, w:38, h:200},
        {id:'20-58', x:300, y:325, w:38, h:200}, {id:'21-59', x:345, y:325, w:38, h:200},
        {id:'14-52', x:210, y:540, w:38, h:145}, {id:'15-53', x:255, y:540, w:38, h:145},
        {id:'16-54', x:300, y:540, w:38, h:145}, {id:'17-55', x:345, y:540, w:38, h:145}
    ];

    function inicializarMapas() {
        let tHtml = "", fHtml = "";
        // Dibujar Mesas Geométricas
        GEOMETRIA.forEach(m => {
            tHtml += `<rect id="t-${m.id}" class="mesa" x="${m.x}" y="${m.y}" width="${m.w}" height="${m.h}" onclick="abrirTraza('${m.id}')"></rect><text x="${m.x + m.w/2}" y="${m.y + m.h - 5}" class="texto-id">${m.id}</text>`;
            fHtml += `<rect id="f-${m.id}" class="mesa" x="${m.x}" y="${m.y}" width="${m.w}" height="${m.h}" onclick="abrirFito('${m.id}')"></rect><text x="${m.x + m.w/2}" y="${m.y + m.h - 5}" class="texto-id">${m.id}</text>`;
        });
        // Dibujar Mesas Pasillo (1 a 14)
        for(let i=1; i<=14; i++) {
            let yPos = 70 + (14-i) * 46;
            tHtml += `<rect id="t-${i}" class="mesa" x="380" y="${yPos}" width="70" height="38" onclick="abrirTraza('${i}')"></rect><text x="415" y="${yPos + 22}" class="texto-id">${i}</text>`;
            fHtml += `<rect id="f-${i}" class="mesa" x="380" y="${yPos}" width="70" height="38" onclick="abrirFito('${i}')"></rect><text x="415" y="${yPos + 22}" class="texto-id">${i}</text>`;
        }
        document.getElementById('svg-trazabilidad').innerHTML = tHtml;
        document.getElementById('svg-fito').innerHTML = fHtml;
        actualizarColoresMapas();
    }

    // SINCRONIZACIÓN NUBE (COMPLETA)
    async function subirDatos() {
        const token = prompt("Introduce GitHub Token para subir:");
        if(!token) return;
        try {
            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({
                    files: {
                        "cultigar_db.json": { content: JSON.stringify(DB_TRAZA) },
                        "cultigar_fito.json": { content: JSON.stringify(DB_FITO) }
                    }
                })
            });
            alert("✅ Sincronizado en la Nube con éxito.");
        } catch(e) { alert("❌ Error al subir datos."); }
    }

    async function bajarDatos() {
        try {
            const r = await fetch(`https://api.github.com/gists/${GIST_ID}?cb=${Date.now()}`);
            const d = await r.json();
            DB_TRAZA = JSON.parse(d.files["cultigar_db.json"].content);
            DB_FITO = JSON.parse(d.files["cultigar_fito.json"].content);
            persistir(); 
            actualizarColoresMapas(); 
            alert("✅ Datos descargados de la Nube.");
        } catch(e) { alert("❌ Error al bajar datos."); }
    }

    // COPIA Y PEGA
    function copiarContenido(tipo) {
        if(tipo === 'TRAZA') {
            PORTAPAPELES_TRAZA = JSON.parse(JSON.stringify(DB_TRAZA[mesaSeleccionada] || []));
            alert("Copiada Traza de Mesa " + mesaSeleccionada);
        } else {
            PORTAPAPELES_FITO = JSON.parse(JSON.stringify(DB_FITO[mesaSeleccionada] || []));
            alert("Copiado Fito de Mesa " + mesaSeleccionada);
        }
    }

    function pegarContenido(tipo) {
        if(tipo === 'TRAZA' && PORTAPAPELES_TRAZA) {
            DB_TRAZA[mesaSeleccionada] = JSON.parse(JSON.stringify(PORTAPAPELES_TRAZA));
            mostrarTablaTraza();
        } else if(tipo === 'FITO' && PORTAPAPELES_FITO) {
            DB_FITO[mesaSeleccionada] = JSON.parse(JSON.stringify(PORTAPAPELES_FITO));
            mostrarTablaFito();
        }
        persistir(); actualizarColoresMapas();
    }

    // TRAZABILIDAD (LOGICA)
    function abrirTraza(id) {
        mesaSeleccionada = id;
        document.getElementById('f_fec').value = new Date().toISOString().split('T')[0];
        mostrarTablaTraza();
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modalMesa').style.display = 'block';
    }

    function mostrarTablaTraza() {
        let html = "", bT = 0, pT = 0;
        let datos = DB_TRAZA[mesaSeleccionada] || [];
        datos.forEach((r, i) => {
            bT += parseInt(r.bandejas || 0);
            pT += (parseInt(r.bandejas) * parseInt(r.porBandeja || 40));
            html += `<tr><td>${r.ref}</td><td>${r.lote}</td><td>${r.bandejas}</td><td><button onclick="editT(${i})">✏️</button> <button onclick="delT(${i})">🗑️</button></td></tr>`;
        });
        document.getElementById('mesaTitulo').innerHTML = `Mesa ${mesaSeleccionada} <span style="font-size:13px; color:#bdc3c7; margin-left:10px;">📦 ${bT} | 🌱 ${pT}</span>`;
        document.getElementById('tablaCuerpoMesa').innerHTML = html || "<tr><td colspan='4'>Vacía</td></tr>";
    }

    function guardarRegistroTrazabilidad() {
        const reg = {
            ref: document.getElementById('f_ref').value.toUpperCase(),
            lote: document.getElementById('f_lote').value,
            bandejas: document.getElementById('f_bandejas').value,
            porBandeja: document.getElementById('f_por_bandeja').value,
            sus: document.getElementById('f_sus').value,
            fec: document.getElementById('f_fec').value
        };
        if(!DB_TRAZA[mesaSeleccionada]) DB_TRAZA[mesaSeleccionada] = [];
        if(indexEdicion !== null) { DB_TRAZA[mesaSeleccionada][indexEdicion] = reg; indexEdicion = null; }
        else { DB_TRAZA[mesaSeleccionada].push(reg); }
        persistir(); mostrarTablaTraza(); actualizarColoresMapas(); limpiarForm();
    }

    function editT(i) {
        indexEdicion = i; const r = DB_TRAZA[mesaSeleccionada][i];
        document.getElementById('f_ref').value = r.ref; document.getElementById('f_lote').value = r.lote;
        document.getElementById('f_bandejas').value = r.bandejas; document.getElementById('f_por_bandeja').value = r.porBandeja;
        document.getElementById('f_sus').value = r.sus; document.getElementById('f_fec').value = r.fec;
        document.getElementById('btnGuardarTraza').innerText = "💾 ACTUALIZAR REGISTRO";
    }

    function delT(i) { if(confirm("¿Borrar lote?")) { DB_TRAZA[mesaSeleccionada].splice(i, 1); persistir(); mostrarTablaTraza(); actualizarColoresMapas(); } }

    // FITOS (LOGICA)
    function abrirFito(id) {
        mesaSeleccionada = id;
        document.getElementById('fitoTitulo').innerText = "Fitos Mesa " + id;
        document.getElementById('fi_fecha').value = new Date().toISOString().split('T')[0];
        mostrarTablaFito();
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modalFito').style.display = 'block';
    }

    function mostrarTablaFito() {
        let html = "";
        (DB_FITO[mesaSeleccionada] || []).forEach((r, i) => {
            html += `<tr><td>${r.p}</td><td>${r.e}</td><td>${r.f}</td><td><button onclick="delF(${i})">🗑️</button></td></tr>`;
        });
        document.getElementById('fitoCuerpoMesa').innerHTML = html;
    }

    function guardarRegistroFito() {
        if(!DB_FITO[mesaSeleccionada]) DB_FITO[mesaSeleccionada] = [];
        DB_FITO[mesaSeleccionada].push({
            p: document.getElementById('fi_prod').value.toUpperCase(),
            e: document.getElementById('fi_estado').value,
            f: document.getElementById('fi_fecha').value
        });
        persistir(); mostrarTablaFito(); actualizarColoresMapas();
    }

    function delF(i) { DB_FITO[mesaSeleccionada].splice(i, 1); persistir(); mostrarTablaFito(); actualizarColoresMapas(); }

    // AUXILIARES
    function persistir() { localStorage.setItem('culti_traza', JSON.stringify(DB_TRAZA)); localStorage.setItem('culti_fito', JSON.stringify(DB_FITO)); }
    
    function actualizarColoresMapas() {
        document.querySelectorAll('#svg-trazabilidad .mesa').forEach(r => {
            const id = r.id.replace('t-', '');
            r.classList.toggle('ocupada', DB_TRAZA[id] && DB_TRAZA[id].length > 0);
        });
        document.querySelectorAll('#svg-fito .mesa').forEach(r => {
            const id = r.id.replace('f-', '');
            r.setAttribute('class', 'mesa');
            if(DB_FITO[id] && DB_FITO[id].length > 0) {
                r.classList.add('fito-' + DB_FITO[id][DB_FITO[id].length-1].e);
            }
        });
    }

    function ejecutarBusqueda() {
        const b = document.getElementById('buscador').value.toUpperCase();
        document.querySelectorAll('.mesa').forEach(m => m.classList.remove('resaltado'));
        if(!b) return;
        for(let m in DB_TRAZA) {
            if(DB_TRAZA[m].some(r => r.ref.includes(b))) {
                const el = document.getElementById('t-' + m);
                if(el) el.classList.add('resaltado');
            }
        }
    }

    function limpiarForm() {
        ['f_ref','f_lote','f_bandejas','f_sus'].forEach(i => document.getElementById(i).value = "");
        document.getElementById('f_por_bandeja').value = 40;
        document.getElementById('btnGuardarTraza').innerText = "💾 GUARDAR EN MESA";
    }

    function cerrarModales() {
        document.getElementById('overlay').style.display = 'none';
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        indexEdicion = null; limpiarForm();
    }

    window.onload = inicializarMapas;
</script>
</body>
</html>
