<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TRAZABILIDAD CULTIGAR - FINAL</title>
    <style>
        body { font-family: sans-serif; background: #444; margin: 0; padding: 0; }
        .cabecera { background: white; padding: 8px; position: sticky; top: 0; z-index: 500; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        
        /* Contenedor de búsqueda y nube en una sola línea */
        .busqueda-nube-container { display: flex; gap: 5px; align-items: center; max-width: 98%; margin: 0 auto 5px auto; }
        .buscador { flex-grow: 1; padding: 10px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; }
        
        .resumen-stock { background: #e3f2fd; padding: 5px; margin: 2px auto; width: 98%; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; font-size: 11px; max-height: 60px; overflow-y: auto; border: 1px solid #2196F3; }
        .stock-item { background: white; padding: 2px 6px; border-radius: 4px; border: 1px solid #2196F3; font-weight: bold; color: #0d47a1; }
        
        .btn-nube { padding: 10px 8px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; font-size: 11px; white-space: nowrap; }
        .btn-subir { background: #4CAF50; }
        .btn-bajar { background: #2196F3; }

        .mapa-real { background: white; margin: 10px auto; padding: 10px; border: 1px solid #000; display: block; width: 490px; position: relative; }
        .mesa { fill: white; stroke: black; stroke-width: 1.2; cursor: pointer; }
        .ocupada { fill: #c8e6c9; stroke: #2e7d32; }
        .resaltado { fill: #FF8C00 !important; }
        .texto-mesa { font-size: 9px; font-weight: bold; pointer-events: none; text-anchor: middle; fill: #000; }

        #infoPanel { 
            position: fixed; top: 2%; left: 2%; width: 92%; height: 92%; 
            background: #1a1a1a; color: white; padding: 15px; border-radius: 15px; 
            display: none; border: 4px solid #4CAF50; z-index: 10000; 
            box-shadow: 0 0 50px rgba(0,0,0,0.9); overflow-y: auto;
        }
        
        .tabla-lotes { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; background: #222; }
        .tabla-lotes th { background: #333; color: #4CAF50; padding: 8px; text-align: left; border-bottom: 2px solid #4CAF50; }
        .tabla-lotes td { padding: 8px; border-bottom: 1px solid #444; }

        .formulario-lote { background: #333; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px solid #555; }
        .formulario-lote input { width: 95%; padding: 10px; margin: 4px 0; border-radius: 5px; border: none; font-size: 16px; display: block; }
        .label-form { font-size: 11px; color: #aaa; margin-top: 8px; display: block; font-weight: bold; }
        .bloque-etiqueta { border-left: 4px solid #FF9800; padding-left: 10px; margin-top: 10px; background: #3d3d3d; padding-bottom: 5px; border-radius: 0 5px 5px 0; }

        .btn { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-guardar { background: #4CAF50; color: white; }
        .btn-cerrar { background: #cc0000; color: white; margin-top: 20px; }
        .btn-mini { padding: 6px; border-radius: 4px; border: none; color: white; font-weight: bold; margin-left: 3px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="infoPanel">
        <h2 id="tituloMesa" style="margin:0; color:#4CAF50;">Mesa</h2>
        <table class="tabla-lotes">
            <thead>
                <tr><th>Ref/Lote</th><th>Caja/Origen</th><th>F. Enr.</th><th>F. Bandeja</th><th>Acción</th></tr>
            </thead>
            <tbody id="listaLotes"></tbody>
        </table>

        <div class="formulario-lote">
            <h3 id="formTitulo" style="margin:0 0 10px 0; font-size:14px; color:#4CAF50;">+ REGISTRO DE DATOS:</h3>
            <span class="label-form">REFERENCIA</span><input type="text" id="f_ref">
            <span class="label-form">LOTE</span><input type="text" id="f_lote">
            <span class="label-form">SUSTRATO</span><input type="text" id="f_sustrato">
            <span class="label-form">CANTIDAD BANDEJAS</span><input type="number" id="f_cant">
            <div class="bloque-etiqueta">
                <span class="label-form" style="color:#FF9800;">1. FECHA ENRAIZADO</span><input type="date" id="f_enraizado">
                <span class="label-form" style="color:#FF9800;">2. Nº DE CAJA</span><input type="text" id="f_caja">
                <span class="label-form" style="color:#4CAF50;">3. FECHA PASE A BANDEJA</span><input type="date" id="f_vivero">
            </div>
            <button class="btn btn-guardar" id="btnGuardar" onclick="guardarLote()">+ REGISTRAR</button>
            <button id="btnCancelarEdit" style="display:none; background:#666; color:white;" class="btn" onclick="cancelarEdicion()">CANCELAR EDICIÓN</button>
        </div>

        <button class="btn btn-cerrar" onclick="cerrarPanel()">CERRAR PANEL</button>

        <div style="margin-top:20px; border-top:1px dashed #666; padding-top:10px;">
            <p style="font-size:11px; color:#888;">SEGURIDAD MANUAL:</p>
            <div style="display:flex; gap:10px;">
                <button onclick="copiarSeguridad()" style="flex:1; background:#2196F3; color:white; border:none; padding:10px; border-radius:5px; font-weight:bold;">📋 COPIAR COPIA</button>
                <button onclick="restaurarSeguridad()" style="flex:1; background:#FF9800; color:white; border:none; padding:10px; border-radius:5px; font-weight:bold;">📥 RESTAURAR</button>
            </div>
        </div>

</div>

<script>
    const GITHUB_TOKEN = "ghp_LWjzgh29AsGYZDTuH8qC8CZhKDnDWJ3mvJ0e";
    const GIST_ID = "ac4301d0a514d06a92b987c581613533";
    let db = JSON.parse(localStorage.getItem('cultigar_pro_final')) || {};
    let mesaActual = null;
    let editIndex = null;

    async function cargarDeNube() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}?cb=${Date.now()}`);
            const json = await res.json();
            db = JSON.parse(json.files["cultigar_db.json"].content);
            localStorage.setItem('cultigar_pro_final', JSON.stringify(db));
            actualizarMapa();
            alert("✅ Datos bajados de la Nube");
        } catch (e) { alert("❌ Error al bajar datos"); }
    }

    async function guardarEnNube() {
        try {
            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` },
                body: JSON.stringify({ "files": { "cultigar_db.json": { "content": JSON.stringify(db) } } })
            });
            console.log("Sincronizado");
        } catch (e) { console.error("Error nube"); }
    }

    function abrirMesa(id) {
        mesaActual = id; editIndex = null;
        document.getElementById('tituloMesa').innerText = "Mesa " + id;
        cancelarEdicion(); renderLotes();
        document.getElementById('infoPanel').style.display = 'block';
    }

    function formatearFecha(fecha) {
        if(!fecha) return "---";
        let f = fecha.split('-'); return f[2] + "/" + f[1];
    }

    function renderLotes() {
        let html = "";
        (db[mesaActual] || []).forEach((l, index) => {
            html += `<tr><td><b>${l.ref}</b><br><small>L-${l.lote}</small></td>
                <td>Caja: ${l.caja || '?'}<br><small>${l.sustrato}</small></td>
                <td style="color:#FF9800">${formatearFecha(l.f_enraizado)}</td>
                <td style="color:#4CAF50">${formatearFecha(l.f_vivero)}</td>
                <td><button class="btn-mini" style="background:#2196F3" onclick="prepararEdicion(${index})">✍️</button>
                    <button class="btn-mini" style="background:#cc0000" onclick="borrarLote(${index})">X</button></td></tr>`;
        });
        document.getElementById('listaLotes').innerHTML = html || "<tr><td colspan='5' style='text-align:center;'>Mesa vacía</td></tr>";
    }

    function guardarLote() {
        let ref = document.getElementById('f_ref').value.toUpperCase();
        let cant = parseInt(document.getElementById('f_cant').value);
        if(!ref || !cant) return alert("Faltan datos");

        let nuevo = {
            ref, lote: document.getElementById('f_lote').value.toUpperCase(),
            caja: document.getElementById('f_caja').value.toUpperCase(),
            sustrato: document.getElementById('f_sustrato').value.toUpperCase(),
            cant, f_enraizado: document.getElementById('f_enraizado').value,
            f_vivero: document.getElementById('f_vivero').value
        };

        if(!db[mesaActual]) db[mesaActual] = [];
        if(editIndex !== null) db[mesaActual][editIndex] = nuevo;
        else db[mesaActual].push(nuevo);

        localStorage.setItem('cultigar_pro_final', JSON.stringify(db));
        guardarEnNube();
        cancelarEdicion(); renderLotes(); actualizarMapa();
    }

    function prepararEdicion(index) {
        let l = db[mesaActual][index]; editIndex = index;
        document.getElementById('f_ref').value = l.ref;
        document.getElementById('f_lote').value = l.lote;
        document.getElementById('f_caja').value = l.caja || "";
        document.getElementById('f_sustrato').value = l.sustrato;
        document.getElementById('f_cant').value = l.cant;
        document.getElementById('f_enraizado').value = l.f_enraizado;
        document.getElementById('f_vivero').value = l.f_vivero;
        document.getElementById('formTitulo').innerText = "✍️ EDITANDO:";
        document.getElementById('btnGuardar').innerText = "💾 ACTUALIZAR";
        document.getElementById('btnCancelarEdit').style.display = "block";
    }

    function cancelarEdicion() {
        editIndex = null;
        document.querySelectorAll('.formulario-lote input').forEach(i => i.value = "");
        document.getElementById('formTitulo').innerText = "+ REGISTRO DE DATOS:";
        document.getElementById('btnGuardar').innerText = "+ REGISTRAR EN MESA";
        document.getElementById('btnCancelarEdit').style.display = "none";
    }

    function borrarLote(index) {
        if(confirm("¿Eliminar?")) {
            db[mesaActual].splice(index, 1);
            if(db[mesaActual].length === 0) delete db[mesaActual];
            localStorage.setItem('cultigar_pro_final', JSON.stringify(db));
            guardarEnNube();
            renderLotes(); actualizarMapa();
        }
    }

    function actualizarMapa() {
        let totales = {}; let granTotal = 0;
        document.querySelectorAll('.mesa').forEach(m => {
            let id = m.id.substring(1);
            if(db[id]) { m.classList.add('ocupada'); db[id].forEach(l => {
                totales[l.ref] = (totales[l.ref] || 0) + l.cant; granTotal += l.cant;
            }); } else m.classList.remove('ocupada');
        });
        let res = `<div class="stock-item" style="background:#4CAF50; color:white">TOTAL: ${granTotal} b.</div>`;
        for(let r in totales) res += `<div class="stock-item">${r}: ${totales[r]}</div>`;
        document.getElementById('resumenStock').innerHTML = res || "Vivero Vacío";
    }

    function buscar() {
        let t = document.getElementById('inputBusqueda').value.toUpperCase();
        document.querySelectorAll('.mesa').forEach(m => m.classList.remove('resaltado'));
        if(!t) return;
        for(let id in db) {
            if(db[id].some(l => l.ref.includes(t) || l.lote.includes(t) || l.sustrato.includes(t) || (l.caja && l.caja.includes(t)))) {
                let el = document.getElementById('m'+id); if(el) el.classList.add('resaltado');
            }
        }
    }

    function copiarSeguridad() {
        let t = document.createElement("textarea");
        t.value = JSON.stringify(db);
        document.body.appendChild(t); t.select();
        document.execCommand("copy");
        document.body.removeChild(t);
        alert("¡Copiado! Pégalo en tu nota de seguridad.");
    }

    function restaurarSeguridad() {
        let t = prompt("Pega aquí el código:");
        if(t) {
            try {
                db = JSON.parse(t);
                localStorage.setItem('cultigar_pro_final', JSON.stringify(db));
                actualizarMapa();
                alert("✅ Restaurado");
            } catch(e) { alert("❌ Código no válido"); }
        }
    }

    function cerrarPanel() { document.getElementById('infoPanel').style.display = 'none'; }
    
    // Al arrancar, baja los datos de la nube
    cargarDeNube();
</script>
</body>
</html>
